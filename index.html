        const sel=S.level===l.id;
        return `<div class="lv-btn" data-lv="${l.id}" style="border-color:${sel?l.color+"60":"rgba(255,255,255,0.06)"};background:${sel?l.color+"18":"rgba(255,255,255,0.03)"}">
          <div style="font-size:14px;font-weight:700;color:${sel?l.color:"#94a3b8"}">${l.label}</div>
          <div style="font-size:10px;color:#7a8ea5">${l.score}</div>
        </div>`;
      }).join("")}</div>
      <div class="sec-lbl" style="margin:0 0 4px">パート</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${PARTS.map(p=>{
        const sel=S.part===p.id;
        return `<button class="btn-s" data-pt="${p.id}" style="font-size:11px;padding:4px 8px;${sel?"background:rgba(129,140,248,0.2);border-color:rgba(129,140,248,0.4);color:#818cf8":""}">${p.label}</button>`;
      }).join("")}</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn-s" id="stockCreateBtn" ${!S.level||!S.part?"disabled":""} style="flex:1;font-size:13px;padding:10px;background:rgba(129,140,248,0.15);color:#818cf8;font-weight:700">📦+ ストック作成</button>
        <select id="stockCreateNum" style="background:#243040;color:#a0b4c8;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:8px 6px;font-size:12px">
          ${[5,10,15,20,25,30].map(n=>`<option value="${n}" ${S.stockCreateTarget===n?"selected":""}>${n}問</option>`).join("")}
        </select>
      </div>
      <button class="btn-s" id="graphicStockBtn" style="font-size:11px;color:#f472b6;margin-top:6px;width:100%" ${!S.level?"disabled":""}>🖼️ Graphic問題 作成</button>
    </div>
    ${total===0?`<div style="text-align:center;color:#7a8ea5;padding:40px 0">ストックされた問題がありません。<br>問題を解いた後「💾 ストック」ボタンで保存できます。</div>`:""}
    <div style="padding:10px 0">${partSections}</div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap">
      ${total>0?`<button class="btn-s" id="stockExportBtn" style="font-size:12px">📤 エクスポート</button>`:""}
      <button class="btn-s" id="stockImportBtn" style="font-size:12px">📥 インポート</button>
      ${total>0?`<button class="btn-s" id="stockPurgeBtn" style="font-size:12px;color:#fbbf24">🧹 壊れた問題を浄化</button>`:""}
      ${totalMastered>0?`<button class="btn-s" id="stockDelAllMastered" style="font-size:12px;color:#f87171">🗑️ 全パート卒業済${totalMastered}問を一括削除</button>`:""}
      ${totalMastered>0?`<button class="btn-s" id="stockResetMastered" style="font-size:12px;color:#60a5fa">🔄 卒業フラグをリセット</button>`:""}
    </div>
    <input type="file" id="stockFileInput" accept=".json" style="display:none">

    <div style="margin-top:24px;padding:16px;background:rgba(129,140,248,0.05);border:1px solid rgba(129,140,248,0.15);border-radius:10px">
      <div style="font-size:13px;font-weight:700;color:#7b9cf7;margin-bottom:8px">📱 データ移行（スマホ機種変更時）</div>
      <div style="font-size:11px;color:#7a8ea5;margin-bottom:10px">パート別にエクスポートすれば大容量でも安全です</div>
      <div style="font-size:12px;font-weight:600;color:#a0b4c8;margin-bottom:6px">エクスポート</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
        ${PARTS.map(p=>{
          const s = stats[p.id];
          if (!s || !s.total) return "";
          return `<button class="btn-s" data-export-part="${p.id}" style="font-size:10px;padding:3px 8px">${p.icon} ${p.label} (${s.total})</button>`;
        }).join("")}
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
        <button class="btn-s" id="vocabExportBtn" style="font-size:10px;padding:3px 8px;color:#60a5fa">📝 単語帳</button>
        <button class="btn-s" id="judgeExportBtn" style="font-size:10px;padding:3px 8px;color:#4ade80">📊 学習履歴</button>
      </div>
      <div style="font-size:12px;font-weight:600;color:#a0b4c8;margin:8px 0 6px">インポート</div>
      <div style="font-size:10px;color:#7a8ea5;margin-bottom:6px">ストック / 単語帳 / 学習履歴を自動判別</div>
      <button class="btn-s" id="migImportBtn" style="font-size:12px;width:100%">📥 ファイルを選択してインポート</button>
      <input type="file" id="migFileInput" accept=".json" multiple style="display:none">
    </div>

    ${total>0?`<div style="margin-top:60px;text-align:center"><button class="btn-s" id="stockClearBtn" style="color:#f87171;font-size:11px;opacity:0.6">🗑️ 全ストック削除</button></div>`:""}`;

  // パート別エクスポート（1パート1ファイル・ストリーミング）
  document.querySelectorAll("[data-export-part]").forEach(el=>{
    el.onclick=async()=>{
      const partId = el.dataset.exportPart;
      el.textContent="⏳ 準備中...";
      try {
        const r = await stockExportPart(partId, (done, total) => {
          el.textContent = `⏳ ${Math.round(done/total*100)}%...`;
        });
        if (r) el.textContent = `✅ ${r.count}問 (${r.sizeMB}MB)`;
      } catch(e) { el.textContent="❌ 失敗"; console.error("[EXPORT]", partId, e.message || e); alert(`エクスポート失敗: ${e.message || e}`); }
    };
  });
  // 単語帳エクスポート
  const veb=$("vocabExportBtn"); if(veb) veb.onclick=async()=>{
    veb.textContent="⏳...";
    const n = await vocabExportAll();
    if (n) veb.textContent=`✅ ${n}語`;
  };
  // 学習履歴エクスポート
  const jeb=$("judgeExportBtn"); if(jeb) jeb.onclick=async()=>{
    jeb.textContent="⏳...";
    const n = await judgeExportAll();
    if (n) jeb.textContent=`✅ ${n}件`;
  };
  // スマートインポート
  const mib=$("migImportBtn"); if(mib) mib.onclick=()=>$("migFileInput").click();
  const mfi=$("migFileInput"); if(mfi) mfi.onchange=async(e)=>{
    const files = Array.from(e.target.files);
    if (!files.length) return;
    mib.textContent=`⏳ ${files.length}ファイル処理中...`;
    const results = [];
    for (const f of files) {
      try {
        const r = await dataImportSmart(f, (bytes, total) => {
          const pct = total > 0 ? Math.round(bytes/total*100) : 0;
          mib.textContent = `⏳ ${f.name.slice(0,20)}... ${pct}%`;
        });
        results.push(`${f.name}: ${r.type} ${r.count}件追加${r.skipped?` (${r.skipped}件スキップ)`:""}`);
      } catch(err) {
        results.push(`${f.name}: ❌ ${err.message}`);
      }
    }
    alert(`インポート結果:\n${results.join("\n")}`);
    render();
  };  // 卒業済削除（パート別）
  // 卒業済一括削除（全パート）
  const dam=$("stockDelAllMastered"); if(dam)dam.onclick=async()=>{
    dam.textContent="⏳ 読込中...";
    const _all = await stockGetAllLight();
    const mastered = _all.filter(q=>q.mastered);
    if(!mastered.length) { dam.textContent="なし"; return; }
    if(!confirm(`全パートの卒業済${mastered.length}問を削除しますか？\n\n※ 3回連続正解した問題のみ削除されます。学習中の問題は残ります。`)) { render(); return; }
    dam.textContent="⏳ 削除中...";
    for (const item of mastered) { await stockDelete(item.id); }
    alert(`✅ ${mastered.length}問を削除しました`);
    render();
  };

  // 卒業フラグリセット（バグで誤って卒業になった問題を復活）
  const rmb=$("stockResetMastered"); if(rmb)rmb.onclick=async()=>{
    rmb.textContent="⏳ 読込中...";
    const _all = await stockGetAllLight();
    const mastered = _all.filter(q=>q.mastered);
    if(!mastered.length) { rmb.textContent="なし"; return; }
    if(!confirm(`卒業フラグを${mastered.length}問リセットしますか？\n\n問題は削除されません。卒業状態がリセットされ、再度学習対象になります。`)) { render(); return; }
    rmb.textContent="⏳ リセット中...";
    const db = await openStockDB();
    for (const item of mastered) {
      await new Promise((resolve, reject) => {
        const tx = db.transaction("questions","readwrite");
        const req = tx.objectStore("questions").get(item.id);
        req.onsuccess = () => {
          const r = req.result;
          if (r) { r.mastered = false; r.correctStreak = 0; delete r.masteredAt; tx.objectStore("questions").put(r); }
        };
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    alert(`✅ ${mastered.length}問の卒業フラグをリセットしました`);
    render();
  };

  // 順番に再生ボタン（on-demand loading）
  document.querySelectorAll("[data-stock-seq]").forEach(el=>{
    el.onclick=async()=>{
      el.textContent="⏳ 読込中...";
      const items = await stockGetAllLight(el.dataset.stockSeq);
      if(items.length===0) { el.textContent="📋 順番に再生"; return; }
      S._stockReturnScreen = "stockSelect";
      S.stockPlaylist = items.map(it=>({id:it.id, part:it.part}));
      S.stockPlayIdx = 0;
      S._stockPlaylistActive = false;
      await loadStockItem(items[0].id);
    };
  });

  // ランダム再生ボタン（on-demand loading）
  document.querySelectorAll("[data-stock-rnd]").forEach(el=>{
    el.onclick=async()=>{
      el.textContent="⏳ 読込中...";
      const items = await stockGetAllLight(el.dataset.stockRnd);
      if(items.length===0) { el.textContent="🔀 ランダム再生"; return; }
      for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]];}
      S._stockReturnScreen = "stockSelect";
      S.stockPlaylist = items.map(it=>({id:it.id, part:it.part}));
      S.stockPlayIdx = 0;
      S._stockPlaylistActive = false;
      await loadStockItem(items[0].id);
    };
  });

  const eb=$("stockExportBtn"); if(eb)eb.onclick=async()=>{
    await stockExport(); eb.textContent="✅ 保存しました";
  };
  const ib=$("stockImportBtn"); if(ib)ib.onclick=()=>$("stockFileInput").click();
  const fi=$("stockFileInput"); if(fi)fi.onchange=async(e)=>{
    const f=e.target.files[0]; if(!f)return;
    try {
      const n=await stockImport(f);
      let msg = `${n.count}問インポートしました`;
      if (n.skipped > 0) msg += ` (${n.skipped}問は重複スキップ)`;
      msg += `\n\n📚 vocab統計:`;
      msg += `\n  vocab付き問題: ${n.withVocab}/${n.count}問`;
      msg += `\n  vocabエントリ総数: ${n.vocabTotal}個`;
      msg += `\n  単語帳に追加: ${n.vocabAdded}語`;
      if (n.vocabAdded === 0 && n.vocabTotal === 0) {
        msg += `\n\n⚠️ インポートしたJSONにvocabフィールドが含まれていません。\n古いバージョンで生成された問題の可能性があります。`;
      } else if (n.vocabAdded === 0 && n.vocabTotal > 0) {
        msg += `\n\n💡 既存の単語と全て重複したため新規追加はありませんでした。`;
      }
      alert(msg);
      render();
    } catch(err) { alert("インポート失敗: "+err.message); }
  };
  const bb=$("stockBackBtn"); if(bb)bb.onclick=()=>{S.screen="home";render();};

  // Level/Part selection for generation
  document.querySelectorAll("[data-lv]").forEach(el=>{ el.onclick=()=>{S.level=el.dataset.lv;render();}; });
  document.querySelectorAll("[data-pt]").forEach(el=>{ el.onclick=()=>{S.part=el.dataset.pt;render();}; });
  const scNum=$("stockCreateNum"); if(scNum) scNum.onchange=()=>{ S.stockCreateTarget=parseInt(scNum.value); };
  const scBtn=$("stockCreateBtn"); if(scBtn) scBtn.onclick=()=>{
    if(!S.level||!S.part)return;
    S.stockCreateTarget=parseInt($("stockCreateNum")?.value||"10");
    S.screen="stockCreate"; S.stockCreateMode=true; S.stockCreateCount=0; S.stockCreatePaused=false;
    S.stats={correct:0,wrong:0}; S.streak=0; S.sessionNum=0;
    _nextQ=null; _prefetching=false;
    shuffleSessionTypes();
    loadNewSet();
  };
  const gsb=$("graphicStockBtn"); if(gsb)gsb.onclick=()=>{
    if(!S.level)return;
    const gTypes = [];
    ["part3","part4","part7s"].forEach(p=>{
      (TYPES[p]||[]).forEach(t=>{ if(t.type.startsWith("graphic_")) gTypes.push({...t, _gPart:p==="part7s"?"part7":p}); });
    });
    if(!gTypes.length){alert("Graphic types not found");return;}
    S.graphicPool = gTypes;
    S.graphicMode = true;
    S.stockCreateTarget = parseInt($("stockCreateNum")?.value||"10");
    S.screen="stockCreate"; S.stockCreateMode=true; S.stockCreateCount=0; S.stockCreatePaused=false;
    S.stats={correct:0,wrong:0}; S.streak=0; S.sessionNum=0;
    _nextQ=null; _prefetching=false;
    const gt = gTypes[Math.floor(Math.random()*gTypes.length)];
    S.part = gt._gPart;
    shuffleSessionTypes();
    loadNewSet();
  };
  const pb=$("stockPurgeBtn"); if(pb)pb.onclick=async()=>{
    if(!confirm("音声や画像が欠損した問題を削除します。よろしいですか？")) return;
    try {
      const n = await stockPurgeBroken();
      if (n > 0) alert(`🧹 ${n}件の壊れた問題を削除しました`);
      else alert("✅ 壊れた問題はありませんでした");
      render();
    } catch(err) { alert("浄化失敗: "+err.message); }
  };
  const cb=$("stockClearBtn"); if(cb)cb.onclick=async()=>{
    if(!confirm("全ストックを削除しますか？")) return;
    const db=await openStockDB();
    const tx=db.transaction("questions","readwrite");
    tx.objectStore("questions").clear();
    tx.oncomplete=()=>render();
  };

  // Lazy load mastered/unplayed counts per part (runs after UI is visible)
  for (const p of PARTS) {
    if (!stats[p.id]) continue;
    stockMasteredCount(p.id).then(({mastered, unplayed}) => {
      const el = document.getElementById(`stockCount_${p.id}`);
      if (el) {
        const unmastered = stats[p.id].total - mastered;
        el.innerHTML = `${unmastered}問${mastered>0?` <span style="color:#4ade80">✓${mastered}</span>`:""}`;
      }
      const extra = document.getElementById(`stockExtra_${p.id}`);
      if (extra) {
        let h = "";
        if (unplayed > 0) h += `<button class="btn-s" data-stock-new="${p.id}" style="font-size:11px;color:#60a5fa;margin-top:4px">🆕 未回答のみ (${unplayed}問)</button>`;
        if (mastered > 0) h += `<button class="btn-s" data-del-mastered="${p.id}" style="font-size:11px;color:#f87171;margin-top:6px;opacity:0.7">🗑️ 卒業済${mastered}問を削除</button>`;
        extra.innerHTML = h;
        // Bind handlers for newly added buttons
        extra.querySelectorAll("[data-stock-new]").forEach(btn => {
          btn.onclick = async () => {
            btn.textContent="⏳ 読込中...";
            const allItems = await stockGetAllLight(btn.dataset.stockNew);
            const items = allItems.filter(it=>!it.lastPracticed);
            if(items.length===0){ alert("未回答の問題がありません"); btn.textContent="🆕 未回答のみ"; return; }
            S._stockReturnScreen = "stockSelect";
            S.stockPlaylist = items.map(it=>({id:it.id, part:it.part}));
            S.stockPlayIdx = 0; S._stockPlaylistActive = false;
            await loadStockItem(items[0].id);
          };
        });
        extra.querySelectorAll("[data-del-mastered]").forEach(btn => {
          btn.onclick = async () => {
            btn.textContent="⏳ 読込中...";
            const items = await stockGetAllLight(btn.dataset.delMastered);
            const mst = items.filter(it=>it.mastered);
            if(!mst.length) { btn.textContent="なし"; return; }
            if(!confirm(`${btn.dataset.delMastered.toUpperCase()} の卒業済${mst.length}問を削除しますか？`)) { render(); return; }
            btn.textContent="⏳ 削除中...";
            for (const item of mst) { await stockDelete(item.id); }
            alert(`✅ ${mst.length}問を削除しました`); render();
          };
        });
      }
    });
  }
}



/* ── Home ── */
/* ── Stock Create Mode ── */
function renderStockCreate() {
  const cp=PARTS.find(p=>p.id===S.part);
  const cl=LEVELS.find(l=>l.id===S.level);
  const isL=["part1","part2","part3","part4"].includes(S.part);

  let body="";
  if (S.loading) {
    body=`<div class="loading"><div class="spin"></div>${S.loadMsg}</div>`;
  } else if (S.error) {
    body=`<div class="errbox"><div style="white-space:pre-wrap">${esc(S.error)}</div><button id="retryBtn">リトライ</button></div>`;
  } else if (S.qSet) {
    const qs=S.qSet;
    let inner="";

    // 音声ボタン
    if (isL && qs.audio) {
      const cached=qs._audioUrl?" ✓":"";
      inner+=`<button class="btn-au" id="playAudio" data-label="🔊 再生${cached}">🔊 再生${cached}</button>`;
    }

    // 問題プレビュー
    if (S.part==="part2") inner+=`<div style="font-size:13px;color:#a0b4c8;margin:8px 0">${esc(qs.spoken||"")}</div>`;
    if (S.part==="part3"&&qs.conversation) inner+=`<div style="font-size:12px;color:#a0b4c8;margin:8px 0;max-height:80px;overflow:hidden">${esc(qs.conversation.slice(0,150))}...</div>`;
    if (S.part==="part4"&&qs.talk) inner+=`<div style="font-size:12px;color:#a0b4c8;margin:8px 0;max-height:80px;overflow:hidden">${esc(qs.talk.slice(0,150))}...</div>`;
    if (S.part==="part5") inner+=`<div style="font-size:13px;color:#a0b4c8;margin:8px 0">${esc(qs.questions[0]?.question||"")}</div>`;
    if ((S.part==="part6"||S.part==="part7")&&qs.text) inner+=`<div style="font-size:12px;color:#a0b4c8;margin:8px 0;max-height:80px;overflow:hidden">${esc(qs.text?.slice(0,150)||qs.text_1?.slice(0,150)||"")}...</div>`;

    // 自動フロー制御ボタン
    inner+=`<div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn-${S.stockCreatePaused?"p":"s"}" id="scPause" style="flex:1">${S.stockCreatePaused?"▶️ 再開":"⏸ 一時停止"}</button>
      <button class="btn-s" id="scSkip" style="flex:0 0 auto">⏭ スキップ</button>
    </div>`;
    if (S.stockCreatePaused) inner+=`<div style="font-size:11px;color:#fbbf24;text-align:center;margin-top:4px">一時停止中 — 問題を確認できます</div>`;
    else inner+=`<div style="font-size:11px;color:#4ade80;text-align:center;margin-top:4px">🔄 自動ストック中...</div>`;
    inner+=`<div style="font-size:11px;color:#7a8ea5;text-align:center;margin-top:4px">ストック済み: ${S.stockCreateCount||0} / ${S.stockCreateTarget}問</div>`;
    // プログレスバー
    const pct=Math.round(((S.stockCreateCount||0)/S.stockCreateTarget)*100);
    inner+=`<div style="margin-top:6px;height:4px;background:#243040;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:#4ade80;transition:width 0.3s"></div></div>`;

    body=`<div class="q-card">${inner}</div>`;
  }

  app.innerHTML=`
    <div class="topbar">
      <button class="btn-s" id="backBtn">← 終了</button>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="tag" style="background:rgba(251,191,36,0.15);color:#fbbf24">📦 ${S.stockCreateCount||0}/${S.stockCreateTarget}</span>
        <span class="tag" style="background:rgba(129,140,248,0.15);color:#7b9cf7">${cp?.label||""}</span>
      </div>
    </div>
    ${body}`;

  // Event handlers
  const rb=$("retryBtn"); if(rb)rb.onclick=()=>{ S.error=null; loadNewSet(); };
  $("backBtn").onclick=()=>{ stopSpeak(); S.stockCreateMode=false; S.stockCreatePaused=false; S.screen="home"; render(); };

  // Audio
  const pa=$("playAudio");
  if (pa&&S.qSet?.audio) {
    pa.onclick=async()=>{
      if (_curAudio) { stopSpeak(); setAudioBtn(pa,"idle"); return; }
      const qs=S.qSet;
      if (qs._audioUrl) {
        setAudioBtn(pa,"playing");
        await playSeq([qs._audioUrl],()=>{setAudioBtn(pa,"idle");});
      } else {
        setAudioBtn(pa,"loading");
        const isConv=S.part==="part3";
        const fn=isConv ? (t,cb)=>speakConv(t,cb,qs.speakers) : speakGemini;
        await fn(qs.audio,(err)=>{
          setAudioBtn(pa,err?"error":"idle",err?String(err).slice(0,100):"");
          // 音声再生成功 → 自動フローに任せる（何もしない）
        });
        if (_curAudio) setAudioBtn(pa,"playing");
      }
    };
  }

  // Pause / Resume
  const sp=$("scPause"); if(sp) sp.onclick=()=>{
    S.stockCreatePaused = !S.stockCreatePaused;
    if (!S.stockCreatePaused) {
      // 再開 → 自動フロー再開
      autoStockAndNext();
    }
    render();
  };

  // Skip
  const sk=$("scSkip"); if(sk) sk.onclick=()=>{
    stopSpeak();
    S.stockCreatePaused = false;
    loadNewSet();
  };
}

/* ── 実力診断画面 ── */
async function renderDiagnosis() {
  const history = await judgeGetAll();
  const total = history.length;

  // パート別集計
  const byPart = {};
  PARTS.forEach(p => { byPart[p.id] = {correct:0, total:0}; });
  history.forEach(h => {
    if (!byPart[h.part]) byPart[h.part] = {correct:0, total:0};
    byPart[h.part].total++;
    if (h.correct) byPart[h.part].correct++;
  });

  // タイプ別集計（正答率の低い順）
  const byType = {};
  history.forEach(h => {
    const key = `${h.part}:${h.type||"unknown"}`;
    if (!byType[key]) byType[key] = {part:h.part, type:h.type||"unknown", correct:0, total:0};
    byType[key].total++;
    if (h.correct) byType[key].correct++;
  });
  const weakTypes = Object.values(byType)
    .filter(t => t.total >= 2 && t.part !== "vocab") // 最低2問以上、単語クイズは除外
    .map(t => ({...t, rate: Math.round(t.correct/t.total*100)}))
    .sort((a,b) => a.rate - b.rate)
    .slice(0, 8); // 上位8弱点

  // 推定スコア計算 — IRT（項目応答理論）ベースのレベル補正
  // 各レベルの正答率からTOEICスコアを推定する換算テーブル
  // 出典: TOEIC公式換算表 + IRT理論に基づく難易度別期待正答率の逆算
  const SCORE_TABLE = {
    beginner:     [[0,200],[0.50,300],[0.70,400],[0.78,500],[0.85,600],[0.92,700],[0.97,800],[0.99,900],[1.00,950]],
    intermediate: [[0,200],[0.25,300],[0.40,400],[0.52,500],[0.60,600],[0.70,700],[0.83,800],[0.95,900],[1.00,960]],
    advanced:     [[0,200],[0.15,300],[0.25,400],[0.30,500],[0.35,600],[0.45,700],[0.60,800],[0.80,900],[1.00,980]]
  };
  function irtEstimate(accuracy, level) {
    const table = SCORE_TABLE[level] || SCORE_TABLE.intermediate;
    if (accuracy <= 0) return table[0][1];
    for (let i = 1; i < table.length; i++) {
      if (accuracy <= table[i][0]) {
        const [x0,y0] = table[i-1], [x1,y1] = table[i];
        return Math.round(y0 + (accuracy - x0) / (x1 - x0) * (y1 - y0));
      }
    }
    return table[table.length-1][1];
  }

  // レベル別集計
  const byLevel = {};
  history.forEach(h => {
    const lv = h.level || "intermediate";
    if (!byLevel[lv]) byLevel[lv] = {correct:0, total:0};
    byLevel[lv].total++;
    if (h.correct) byLevel[lv].correct++;
  });

  // L/R × レベル別で推定
  function estimateSection(partFilter) {
    const sectionHistory = history.filter(h => partFilter.includes(h.part));
    if (sectionHistory.length === 0) return {score:0, total:0};
    const sByLevel = {};
    sectionHistory.forEach(h => {
      const lv = h.level || "intermediate";
      if (!sByLevel[lv]) sByLevel[lv] = {correct:0, total:0};
      sByLevel[lv].total++;
      if (h.correct) sByLevel[lv].correct++;
    });
    let weightedScore = 0, totalWeight = 0;
    for (const [lv, data] of Object.entries(sByLevel)) {
      if (data.total >= 2) {
        const rate = data.correct / data.total;
        const score = irtEstimate(rate, lv);
        // Multiply by sample size (more data = more confidence)
        weightedScore += score * data.total;
        totalWeight += data.total;
      }
    }
    if (totalWeight === 0) {
      // Fallback: simple rate
      const rate = sectionHistory.filter(h=>h.correct).length / sectionHistory.length;
      return {score: Math.round(rate * 495), total: sectionHistory.length};
    }
    // Scale to 495 max (each section is 5-495)
    const rawEst = weightedScore / totalWeight;  // estimated total score (200-980)
    return {score: Math.min(495, Math.max(5, Math.round(rawEst / 2))), total: totalWeight};
  }

  const lEst = estimateSection(["part1","part2","part3","part4"]);
  const rEst = estimateSection(["part5","part6","part7"]);
  const lScore = lEst.score;
  const rScore = rEst.score;
  const estScore = lScore + rScore;

  // レベル別スコア表示用
  const levelScores = {};
  for (const [lv, data] of Object.entries(byLevel)) {
    if (data.total >= 3) {
      const rate = data.correct / data.total;
      levelScores[lv] = {rate: Math.round(rate*100), est: irtEstimate(rate, lv), total: data.total};
    }
  }

  // レベル提案
  let suggestedLevel = "beginner";
  if (estScore >= 800) suggestedLevel = "advanced";
  else if (estScore >= 600) suggestedLevel = "intermediate";
  const suggestedLabel = LEVELS.find(l=>l.id===suggestedLevel)?.label || "";

  // パート別バー
  const partBars = PARTS.map(p => {
    const d = byPart[p.id];
    if (d.total === 0) return "";
    const rate = Math.round(d.correct/d.total*100);

    return `<div style="margin-bottom:8px">

  // Vocab quiz stats (separate from TOEIC score)

    // By mode

    const modeLabels = {"en_ja":"🇬🇧→🇯🇵 英→日","ja_en":"🇯🇵→🇬🇧 日→英","pos_quiz":"📝 品詞あて"};
    let modeBars = "";

        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">

    // By level

        </div>
        ${totalAttempts > 0 ? `<div style="height:5px;background:#1e293b;border-radius:3px;overflow:hidden;margin-bottom:6px">
          <div style="height:100%;width:${overallVocabRate}%;background:${ovrColor}"></div>

        <div style="text-align:center;padding:6px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:10px">
          <div style="font-size:10px;color:#7a8ea5">推定語彙レベル</div>
          <div style="font-size:15px;font-weight:700;color:#dce6f0">${vocabLv}</div>
          <div style="font-size:10px;color:#7a8ea5">${progressDesc}${totalAttempts > 0 ? ` / 累計${totalAttempts}回答` : ""}</div>
        </div>
        <div style="display:flex;gap:8px;text-align:center;margin-bottom:10px">
          <div style="flex:1;padding:6px;background:rgba(74,222,128,0.08);border-radius:6px">
            <div style="font-size:18px;font-weight:800;color:#4ade80">${mastered.length}</div>
            <div style="font-size:9px;color:#7a8ea5">✅ 習得</div>
          </div>
          <div style="flex:1;padding:6px;background:rgba(248,113,113,0.08);border-radius:6px">
            <div style="font-size:18px;font-weight:800;color:#f87171">${weak.length}</div>
            <div style="font-size:9px;color:#7a8ea5">❌ 苦手</div>
          </div>
          <div style="flex:1;padding:6px;background:rgba(122,142,165,0.08);border-radius:6px">
            <div style="font-size:18px;font-weight:800;color:#7a8ea5">${unseen.length}</div>
            <div style="font-size:9px;color:#7a8ea5">🆕 未学習</div>
          </div>
        </div>
        <div style="font-size:12px;font-weight:600;color:#dce6f0;margin-bottom:6px">レベル別習得率</div>
        ${lvRows}
        ${weakWordsHtml}
        ${masteredHtml}
      </div>`;
    }
  } catch(e) {}

  // 弱点リスト
  const weakList = weakTypes.length > 0
    ? weakTypes.map(t => {
        const color = t.rate >= 60 ? "#fbbf24" : "#f87171";
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span style="font-size:12px;color:#a0b4c8">${t.part} / ${t.type}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:${color};font-weight:700">${t.rate}% (${t.correct}/${t.total})</span>
            <button class="btn-s drill-btn" data-drill-part="${t.part}" style="font-size:10px;padding:2px 8px;color:#f472b6">🔥 特訓</button>
          </div>
        </div>`;
      }).join("")
    : `<div style="font-size:12px;color:#7a8ea5">判定データが不足しています</div>`;

  // 全体正答率
  const toeicHistory = history.filter(h => h.part !== "vocab");
  const overallRate = toeicHistory.length > 0 ? Math.round(toeicHistory.filter(h=>h.correct).length/toeicHistory.length*100) : 0;

  // 週次比較
  const now=Date.now(), oneWeek=7*24*60*60*1000;
  const thisWeek=history.filter(h=>h.timestamp>now-oneWeek);
  const lastWeek=history.filter(h=>h.timestamp>now-2*oneWeek && h.timestamp<=now-oneWeek);
  let weeklyComparison = "";
  if (thisWeek.length >= 3) {
    const twRate=Math.round(thisWeek.filter(h=>h.correct).length/thisWeek.length*100);
    const lwRate=lastWeek.length>=3 ? Math.round(lastWeek.filter(h=>h.correct).length/lastWeek.length*100) : null;
    const twByPart={};
    thisWeek.forEach(h=>{if(!twByPart[h.part])twByPart[h.part]={c:0,t:0};twByPart[h.part].t++;if(h.correct)twByPart[h.part].c++;});
    const lwByPart={};
    lastWeek.forEach(h=>{if(!lwByPart[h.part])lwByPart[h.part]={c:0,t:0};lwByPart[h.part].t++;if(h.correct)lwByPart[h.part].c++;});
    let partDiffs = Object.keys(twByPart).map(p=>{
      const tw=Math.round(twByPart[p].c/twByPart[p].t*100);
      const lw=lwByPart[p]&&lwByPart[p].t>=2?Math.round(lwByPart[p].c/lwByPart[p].t*100):null;
      const diff=lw!==null?tw-lw:null;
      return {part:p,tw,lw,diff};
    });
    weeklyComparison = `<div style="font-size:12px;color:#a0b4c8;margin-bottom:4px">今週: ${twRate}% (${thisWeek.length}問)${lwRate!==null?` ← 先週: ${lwRate}% (${lastWeek.length}問)`:""}</div>`;
    weeklyComparison += partDiffs.map(d=>{
      const arrow=d.diff===null?"":d.diff>0?`<span style="color:#4ade80">▲+${d.diff}%</span>`:d.diff<0?`<span style="color:#f87171">▼${d.diff}%</span>`:`<span style="color:#7a8ea5">→±0</span>`;
      return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0"><span style="color:#a0b4c8">${d.part}</span><span>${d.tw}% ${arrow}</span></div>`;
    }).join("");
  } else {
    weeklyComparison = `<div style="font-size:12px;color:#7a8ea5">今週のデータが不足（3問以上必要）</div>`;
  }

  // 改善アドバイス生成
  let adviceItems = [];
  if (weakTypes.length > 0) {
    const worst = weakTypes[0];
    adviceItems.push(`📕 <strong>${worst.part} / ${worst.type}</strong> が正答率${worst.rate}%で最も弱いポイントです。重点的に練習しましょう。`);
  }
  if (lScore < rScore && lEst.total >= 5) adviceItems.push("🎧 リスニングがリーディングより低いです。Part 3/4のストック学習を増やしましょう。");
  if (rScore < lScore && rEst.total >= 5) adviceItems.push("📖 リーディングがリスニングより低いです。Part 5/7の演習を増やしましょう。");
  const avgElapsed = history.filter(h=>h.elapsed>0);
  if (avgElapsed.length > 0) {
    const avgSec = Math.round(avgElapsed.reduce((a,h)=>a+h.elapsed,0)/avgElapsed.length);
    if (avgSec > 30) adviceItems.push(`⏱ 平均回答時間${avgSec}秒。本番は1問20-30秒が目安です。スピードを意識しましょう。`);
  }
  if (estScore < 600) adviceItems.push("🎯 600点突破には Part 5 の品詞問題と Part 2 の基本WH問題を固めましょう。");
  else if (estScore < 800) adviceItems.push("🎯 800点突破には Part 7 の推測問題と Part 3 の含意問題がカギです。");
  else adviceItems.push("🎯 900点突破には全パートでケアレスミスを減らし、Part 7 のNOT/クロスリファレンスを完璧にしましょう。");
  const advice = adviceItems.length > 0
    ? adviceItems.map(a=>`<div style="font-size:12px;color:#a0b4c8;margin-bottom:6px;line-height:1.5">${a}</div>`).join("")
    : `<div style="font-size:12px;color:#7a8ea5">データが不足しています</div>`;

  app.innerHTML=`
    <div class="header" style="display:flex;justify-content:space-between;align-items:center">
      <div><h1 style="font-size:20px;margin:0">📊 実力診断</h1>
      <div class="sub">判定データ: ${total}問</div></div>
      <button class="btn-s" id="diagBackBtn" style="font-size:12px;padding:6px 14px">← 戻る</button>
    </div>

    ${total === 0 ? `<div style="text-align:center;color:#7a8ea5;padding:40px 0">
      判定データがありません。<br>学習画面で「📊 判定ON」にして問題を解いてください。
    </div>` : `

    <div style="text-align:center;margin:16px 0">
      <div style="font-size:42px;font-weight:800;color:${estScore>=800?"#4ade80":estScore>=600?"#fbbf24":"#f87171"}">${estScore}</div>
      <div style="font-size:13px;color:#7a8ea5">推定TOEICスコア <span style="font-size:10px">(IRT補正)</span></div>
      <div style="font-size:11px;color:#a0b4c8;margin-top:4px">L: ${lScore} ｜ R: ${rScore}</div>
    </div>

    ${Object.keys(levelScores).length > 0 ? `<div style="margin:8px 0;padding:10px;background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid rgba(255,255,255,0.06)">
      <div style="font-size:11px;color:#7a8ea5;margin-bottom:6px">📊 レベル別推定（IRT換算）</div>
      ${Object.entries(levelScores).sort((a,b)=>a[1].est-b[1].est).map(([lv,d])=>{
        const lvLabel = {beginner:"初級",intermediate:"中級",advanced:"上級"}[lv]||lv;
        const lvColor = {beginner:"#22c55e",intermediate:"#f59e0b",advanced:"#ef4444"}[lv]||"#94a3b8";
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px">
          <span style="color:${lvColor}">${lvLabel} (${d.total}問)</span>
          <span style="color:#a0b4c8">正答率 ${d.rate}% → <strong style="color:#dce6f0">${d.est}点相当</strong></span>
        </div>`;
      }).join("")}
      <div style="font-size:10px;color:#64748b;margin-top:6px">※ 上級60%正解≒800点、上級80%≒900点。正確なスコアは模試で測定してください。</div>
    </div>` : ""}

    <div style="display:flex;gap:8px;justify-content:center;margin:12px 0">
      <div style="text-align:center;padding:8px 16px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06)">
        <div style="font-size:20px;font-weight:700;color:#4ade80">${overallRate}%</div>
        <div style="font-size:10px;color:#7a8ea5">全体正答率</div>
      </div>
      <div style="text-align:center;padding:8px 16px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06)">
        <div style="font-size:20px;font-weight:700;color:#7b9cf7">${suggestedLabel}</div>
        <div style="font-size:10px;color:#7a8ea5">推奨レベル</div>
      </div>
    </div>

    ${S.level !== suggestedLevel ? `<div style="text-align:center;margin:8px 0">
      <button class="btn-s" id="applyLevelBtn" style="font-size:12px;color:#fbbf24">💡 レベルを「${suggestedLabel}」に変更する</button>
    </div>` : ""}

    <details style="margin-top:16px">
      <summary style="font-size:13px;font-weight:700;color:#dce6f0;cursor:pointer;margin-bottom:8px">📊 パート別分析</summary>
      ${partBars}
      <div style="margin-top:12px">
        <div style="font-size:13px;font-weight:700;color:#dce6f0;margin-bottom:8px">📕 弱点タイプ（正答率の低い順）</div>
        ${weakList}
      </div>
    </details>

    <details style="margin-top:16px">
      <summary style="font-size:13px;font-weight:700;color:#7b9cf7;cursor:pointer;margin-bottom:8px">📝 単語分析</summary>
      ${vocabSection}
      ${vocabDbSection}
    </details>

    `}

    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:700;color:#dce6f0;margin-bottom:8px">📅 直近7日間の学習量</div>
      ${(()=>{
        const days = [];
        const dayNames = ["日","月","火","水","木","金","土"];
        for (let d=6; d>=0; d--) {
          const start = new Date(); start.setHours(0,0,0,0); start.setDate(start.getDate()-d);
          const end = new Date(start); end.setDate(end.getDate()+1);
          const dayH = history.filter(h=>h.timestamp>=start.getTime()&&h.timestamp<end.getTime());
          const correct = dayH.filter(h=>h.correct).length;
          days.push({label:`${start.getMonth()+1}/${start.getDate()}(${dayNames[start.getDay()]})`, total:dayH.length, correct});
        }
        const maxQ = Math.max(...days.map(d=>d.total), 1);
        if (days.every(d=>d.total===0)) return `<div style="font-size:12px;color:#7a8ea5">データがありません</div>`;
        return `<div style="display:flex;gap:4px;align-items:flex-end;height:80px;padding:4px 0">${days.map(d=>{
          const h = d.total > 0 ? Math.max(8, Math.round(d.total/maxQ*70)) : 4;
          const rate = d.total>0 ? Math.round(d.correct/d.total*100) : 0;
          const color = d.total===0?"#334155":rate>=80?"#4ade80":rate>=60?"#fbbf24":"#f87171";
          return `<div style="flex:1;text-align:center"><div style="height:${h}px;background:${color};border-radius:4px 4px 0 0;margin:0 2px;position:relative" title="${d.total}問 (${rate}%)"></div><div style="font-size:9px;color:#64748b;margin-top:2px">${d.label}</div><div style="font-size:9px;color:#a0b4c8">${d.total||""}</div></div>`;
        }).join("")}</div><div style="font-size:10px;color:#7a8ea5;margin-top:4px">合計: ${days.reduce((a,d)=>a+d.total,0)}問 / 正答率: ${days.reduce((a,d)=>a+d.total,0)>0?Math.round(days.reduce((a,d)=>a+d.correct,0)/days.reduce((a,d)=>a+d.total,0)*100):0}%</div>`;
      })()}
    </div>

    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:700;color:#dce6f0;margin-bottom:8px">📈 今週 vs 先週</div>
      ${weeklyComparison}
    </div>

    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:700;color:#dce6f0;margin-bottom:8px">💡 改善アドバイス</div>
      ${advice}
    </div>

    ${total>0?`<div style="margin-top:40px;text-align:center"><button class="btn-s" id="judgeClearBtn" style="color:#f87171;font-size:11px;opacity:0.6">🗑️ 判定データをリセット</button></div>`:""}`;

  // Handlers
  const db=$("diagBackBtn"); if(db)db.onclick=()=>{S.screen="home";render();};
  const al=$("applyLevelBtn"); if(al)al.onclick=()=>{
    S.level=suggestedLevel;
    al.textContent="✅ 変更しました"; al.disabled=true;
  };
  const jc=$("judgeClearBtn"); if(jc)jc.onclick=async()=>{
    if(!confirm("判定データをすべて削除しますか？")) return;
    await judgeClear();
    render();
  };
  // 🔥 弱点ドリル: そのパートのストックをランダムで開始
  document.querySelectorAll(".drill-btn").forEach(el=>{
    el.onclick=async()=>{
      const part = el.dataset.drillPart;
      const items = await stockGetAllLight(part);
      if (items.length === 0) {
        alert(`${part.toUpperCase()} のストックがありません。\n先にStreamlitで生成してインポートしてください。`);
        return;
      }
      // Shuffle and start playlist
      for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]];}
      S._stockReturnScreen = "diagnosis";
      S.stockPlaylist = items.map(it=>({id:it.id, part:it.part}));
      S.stockPlayIdx = 0;
      S._stockPlaylistActive = false;
      S.judgeMode = true;  // 判定モードONで特訓（結果が記録される）
      localStorage.setItem("judgeMode","true");
      await loadStockItem(items[0].id);
    };
  });
}

/* ── 単語帳画面 ── */
async function renderVocab() {
  const words = await vocabGetAll();
  const POS_LABELS = {noun:"名詞",verb:"動詞",adjective:"形容詞",adverb:"副詞",phrase:"フレーズ",other:"その他"};
  const POS_COLORS = {noun:"#60a5fa",verb:"#4ade80",adjective:"#fbbf24",adverb:"#c084fc",phrase:"#f472b6",other:"#94a3b8"};

  function renderWordList(list) {
    if (!list.length) return `<div style="text-align:center;color:#7a8ea5;padding:20px">この品詞の単語はありません</div>`;
    return list.sort((a,b)=>b.timestamp-a.timestamp).map(w => {
      const meanings = (w.meaning||"").split("\n").filter(Boolean);
      const examples = (w.context||"").split("\n").filter(Boolean);
      const posLabel = POS_LABELS[w.pos]||w.pos||"";
      const posColor = POS_COLORS[w.pos]||"#94a3b8";
      let detailHtml;
      if (meanings.length <= 1) {
        detailHtml = `${meanings[0]?`<div style="font-size:12px;color:#7b9cf7">${esc(meanings[0])}</div>`:""}
          ${examples[0]?`<div style="font-size:11px;color:#a0b4c8;margin-top:2px;display:flex;align-items:center;gap:4px"><button class="vocab-play-ex" data-vex="${esc(examples[0])}" data-vid="${w.id}" style="background:none;border:none;cursor:pointer;font-size:11px;padding:0;flex-shrink:0">🔊</button>${esc(examples[0].slice(0,80))}</div>`:""}`;
      } else {
        detailHtml = meanings.map((m,i) => `<div style="font-size:12px;margin-top:${i?4:0}px">
          <span style="color:#7b9cf7">${"❶❷❸❹❺"[i]||"•"} ${esc(m)}</span>
          ${examples[i]?`<span style="color:#a0b4c8;font-size:11px"> — <button class="vocab-play-ex" data-vex="${esc(examples[i])}" data-vid="${w.id}" style="background:none;border:none;cursor:pointer;font-size:11px;padding:0;display:inline">🔊</button>${esc(examples[i].slice(0,60))}</span>`:""}
        </div>`).join("");
      }
      return `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:start;gap:6px">
        <button class="vocab-play" data-vword="${esc(w.word)}" data-vid="${w.id}" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px;flex-shrink:0">🔊</button>
        <div style="flex:1">
          <div style="font-size:14px;color:#dce6f0;font-weight:600">${esc(w.word)} <span style="font-size:10px;color:${posColor};font-weight:400">${posLabel}</span>${({"A":"<span style='font-size:9px;background:rgba(34,197,94,0.15);color:#22c55e;padding:1px 4px;border-radius:3px;margin-left:4px'>A</span>","B":"<span style='font-size:9px;background:rgba(245,158,11,0.15);color:#f59e0b;padding:1px 4px;border-radius:3px;margin-left:4px'>B</span>","C":"<span style='font-size:9px;background:rgba(239,68,68,0.15);color:#ef4444;padding:1px 4px;border-radius:3px;margin-left:4px'>C</span>"})[w.level]||""}</div>
          ${detailHtml}
        </div>
        <button class="btn-s" data-vdel="${w.id}" style="font-size:10px;color:#f87171;padding:2px 6px;flex-shrink:0">✕</button>
      </div>`}).join("");
  }

  // Group by POS
  const groups = {};
  words.forEach(w => { const p=w.pos||"other"; if(!groups[p])groups[p]=[]; groups[p].push(w); });
  const posKeys = Object.keys(groups).sort();

  // Count for level/progress filters
  const weakWords = words.filter(w=>(w.wrongCount||0)>0);
  const lvA = words.filter(w=>w.level==="A");
  const lvB = words.filter(w=>w.level==="B");
  const lvC = words.filter(w=>w.level==="C");
  const newWords = words.filter(w=>!(w.correctCount||0) && !(w.wrongCount||0));
  const masteredWords = words.filter(w=>(w.correctCount||0)>=3 && (w.correctCount||0)>(w.wrongCount||0)*2);

  // Filter buttons (top row: level/progress)
  const filterBtns = [
    `<button class="filter-tab active" data-filter="all">全て (${words.length})</button>`,
    weakWords.length ? `<button class="filter-tab" data-filter="weak" style="color:#f87171">❌苦手 (${weakWords.length})</button>` : "",
    lvA.length ? `<button class="filter-tab" data-filter="A" style="color:#22c55e">🟢A (${lvA.length})</button>` : "",
    lvB.length ? `<button class="filter-tab" data-filter="B" style="color:#f59e0b">🟡B (${lvB.length})</button>` : "",
    lvC.length ? `<button class="filter-tab" data-filter="C" style="color:#ef4444">🔴C (${lvC.length})</button>` : "",
    newWords.length ? `<button class="filter-tab" data-filter="new" style="color:#60a5fa">🆕未学習 (${newWords.length})</button>` : "",
    masteredWords.length ? `<button class="filter-tab" data-filter="mastered" style="color:#4ade80">✅済 (${masteredWords.length})</button>` : "",
  ].filter(Boolean).join("");

  // POS tab buttons (bottom row)
  const tabBtns = [`<button class="pos-tab active" data-pos="all">All</button>`]
    .concat(posKeys.map(p => `<button class="pos-tab" data-pos="${p}">${POS_LABELS[p]||p} (${groups[p].length})</button>`)).join("");

  app.innerHTML=`
    <div class="header" style="display:flex;justify-content:space-between;align-items:center"><div><h1 style="font-size:20px;margin:0">📝 単語帳</h1><div class="sub">${words.length}語</div></div><button class="btn-s" id="vocabBackBtn" style="font-size:12px;padding:6px 14px">← 戻る</button></div>
    ${words.length>=4?`<div style="display:flex;gap:6px;padding:6px 0;flex-wrap:wrap"><button class="btn-s" id="vocabQuizEnJa" style="flex:1;background:rgba(129,140,248,0.15);color:#7b9cf7">🧠 英→日</button><button class="btn-s" id="vocabQuizJaEn" style="flex:1;background:rgba(244,114,182,0.15);color:#f472b6">🧠 日→英</button><button class="btn-s" id="vocabQuizPos" style="flex:1;background:rgba(251,191,36,0.15);color:#fbbf24">📝 品詞あて</button></div>
    ${weakWords.length>=4?`<div style="padding:0 0 4px"><button class="btn-s" id="vocabQuizWeak" style="width:100%;background:rgba(248,113,113,0.12);color:#f87171;font-size:12px">❌ 苦手語のみ (${weakWords.length}語)</button></div>`:""}`:""}

  // Play audio from base64 Opus (if stored), else fallback to Gemini TTS
  async function playVocabAudio(btn, originalLabel, storedAudio, fallbackText) {
    btn.textContent = "⏳";
    if (storedAudio) {
      try {
        const bin = atob(storedAudio);
        const bytes = new Uint8Array(bin.length);
        for (let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], {type: "audio/webm;codecs=opus"});
        const url = URL.createObjectURL(blob);
        const a = new Audio(url);
        a.onended = () => { URL.revokeObjectURL(url); btn.textContent = originalLabel; };
        a.onerror = () => { URL.revokeObjectURL(url); btn.textContent = originalLabel; };
        await a.play();
        return;
      } catch(e) {
        console.warn("Stored audio playback failed:", e);
      }
    }
    // Fallback 1: Gemini TTS
    if (!fallbackText) { btn.textContent = originalLabel; return; }
    try {
      await new Promise((resolve, reject) => {
        speakGemini(fallbackText, (err) => { if (err) reject(err); else resolve(); });
      });
      btn.textContent = originalLabel;
      return;
    } catch(e) {
      console.warn("Gemini TTS failed for vocab:", e);
    }
    // Fallback 2: Web Speech API (browser built-in)
    try {
      if (window.speechSynthesis) {
        await new Promise(resolve => {
          const utter = new SpeechSynthesisUtterance(fallbackText);
          utter.lang = "en-US"; utter.rate = 0.9;
          utter.onend = () => resolve();
          utter.onerror = () => resolve();
          speechSynthesis.speak(utter);
        });
        btn.textContent = originalLabel;
        return;
      }
    } catch(e) {}
    btn.textContent = "⚠️";
    setTimeout(() => { btn.textContent = originalLabel; }, 2000);
  }

  // Bind audio/delete buttons (called after each filter render)
  function bindVocabButtons(allWords) {
    document.querySelectorAll("[data-vdel]").forEach(el=>{
      el.onclick=async()=>{ await vocabDelete(parseInt(el.dataset.vdel)); render(); };
    });
    document.querySelectorAll(".vocab-play").forEach(btn=>{
      btn.onclick=async()=>{
        const word = btn.dataset.vword;
        const wid = parseInt(btn.dataset.vid);
        if(!word)return;
        const w = allWords.find(w => w.id === wid);
        await playVocabAudio(btn, "🔊", w?.audio || "", word);
      };
    });
    document.querySelectorAll(".vocab-play-ex").forEach(btn=>{
      btn.onclick=async(e)=>{
        e.stopPropagation();
        const ex = btn.dataset.vex;
        const wid = parseInt(btn.dataset.vid);
        if(!ex)return;
        const w = allWords.find(w => w.id === wid);
        await playVocabAudio(btn, "🔊", w?.exampleAudio || "", ex);
      };
    });
  }

  // Dynamic filtering
  let activeFilter = "all";
  let activePos = "all";
  let searchText = "";

  function applyFilters() {
    let filtered = words;
    if (activeFilter === "weak") filtered = filtered.filter(w=>(w.wrongCount||0)>0);
    else if (activeFilter === "A") filtered = filtered.filter(w=>w.level==="A");
    else if (activeFilter === "B") filtered = filtered.filter(w=>w.level==="B");
    else if (activeFilter === "C") filtered = filtered.filter(w=>w.level==="C");
    else if (activeFilter === "new") filtered = filtered.filter(w=>!(w.correctCount||0) && !(w.wrongCount||0));
    else if (activeFilter === "mastered") filtered = filtered.filter(w=>(w.correctCount||0)>=3 && (w.correctCount||0)>(w.wrongCount||0)*2);
    if (activePos !== "all") filtered = filtered.filter(w=>(w.pos||"other")===activePos);
    // Search filter: partial match on word + meaning
    if (searchText) {
      const q = searchText.toLowerCase();
      filtered = filtered.filter(w =>
        (w.word||"").toLowerCase().includes(q) ||
        (w.meaning||"").toLowerCase().includes(q) ||
        (w.context||"").toLowerCase().includes(q)
      );
    }
    const area = $("vocabListArea");
    if (area) {
      const isFiltered = activeFilter!=="all" || activePos!=="all" || searchText;
      const countLabel = isFiltered ? `<div style="font-size:11px;color:#7a8ea5;padding:6px 0">${filtered.length}語 表示中</div>` : "";
      area.innerHTML = countLabel + renderWordList(filtered);
      bindVocabButtons(words);
    }
  }

  // Search input handler
  const searchInput = $("vocabSearch");
  if (searchInput) {
    searchInput.oninput = () => { searchText = searchInput.value.trim(); applyFilters(); };
  }

  // Filter tab click handlers
  document.querySelectorAll(".filter-tab").forEach(tab=>{
    tab.onclick=()=>{
      document.querySelectorAll(".filter-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      activeFilter = tab.dataset.filter;
      applyFilters();
    };
  });
  document.querySelectorAll(".pos-tab").forEach(tab=>{
    tab.onclick=()=>{
      document.querySelectorAll(".pos-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      activePos = tab.dataset.pos;
      applyFilters();
    };
  });
  applyFilters();

  $("vocabBackBtn").onclick=()=>{S.screen="home";render();};
  const dd=$("vocabDedupeBtn"); if(dd)dd.onclick=async()=>{
    dd.textContent="⏳ 整理中...";
    const r = await vocabDedupe();
    alert(`✅ 整理完了\n重複削除: ${r.merged}件\n意味統合: ${r.cleanedInternal}件`);
    render();
  };
  const rb=$("vocabRebuildBtn"); if(rb)rb.onclick=async()=>{
    rb.textContent="⏳ 再構築中...";
    const before = (await vocabGetAll()).length;
    const r = await vocabRebuildFromStocks();
    const after = (await vocabGetAll()).length;
    alert(`✅ 再構築完了\nストック: ${r.processed}/${r.total}問にvocabあり\nvocabエントリ: ${r.foundVocab}個を処理\n単語帳: ${before}語 → ${after}語 (+${after-before})`);
    render();
  };
  // Level classification button
  const lb=$("vocabLevelBtn"); if(lb)lb.onclick=async()=>{
    if (!S.apiKey) { alert("Gemini APIキーを設定してください"); return; }
    const allWords = await vocabGetAll();
    const needLevel = allWords.filter(w => !w.level || !["A","B","C"].includes(w.level));
    if (needLevel.length === 0) { alert("すべての単語にレベルが設定済みです"); return; }
    if (!confirm(`${needLevel.length}語のレベル判定を実行します。\nGemini APIを使用します（${Math.ceil(needLevel.length/30)}回のAPI呼び出し）。\n続行しますか？`)) return;
    lb.textContent = `⏳ 判定中... 0/${needLevel.length}`;
    let done = 0, failed = 0;
    // Process in batches of 30
    for (let i = 0; i < needLevel.length; i += 30) {
      const batch = needLevel.slice(i, i + 30);
      const wordList = batch.map(w => w.word).join(", ");
      const prompt = `Classify each English word/phrase by TOEIC difficulty level.
A = basic vocabulary (~600 level): common everyday/office words like schedule, confirm, available, delay, attend, submit
B = intermediate (600-800 level): business vocabulary like negotiate, reimburse, mandatory, comply, substantial, expedite
C = advanced (800+ level): sophisticated vocabulary like procurement, arbitration, discretionary, remuneration, notwithstanding

Words to classify: ${wordList}

Respond with ONLY a JSON object, no markdown, no backticks:
{"results":[{"word":"...","level":"A"},{"word":"...","level":"B"},...]}`;
      try {
        const raw = await geminiText(prompt, GEMINI_FLASH);
        const cleaned = raw.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(cleaned);
        if (parsed.results && Array.isArray(parsed.results)) {
          for (const r of parsed.results) {
            const lv = (r.level || "").toUpperCase();
            if (!["A","B","C"].includes(lv)) continue;
            const match = batch.find(w => w.word.toLowerCase() === (r.word||"").toLowerCase());
            if (match) {
              await vocabUpdate(match.id, {level: lv});
              done++;
            }
          }
        }
      } catch(e) {
        console.warn("[LEVEL] batch error:", e);
        failed += batch.length;
      }
      lb.textContent = `⏳ 判定中... ${done}/${needLevel.length}`;
      if (i + 30 < needLevel.length) await new Promise(r => setTimeout(r, 1500)); // rate limit
    }
    alert(`✅ レベル判定完了\n判定済み: ${done}語\n失敗: ${failed}語\n既存レベルあり: ${allWords.length - needLevel.length}語`);
    render();
  };
  const qej=$("vocabQuizEnJa"); if(qej)qej.onclick=()=>{S.screen="vocabQuiz";S.vocabQuizMode="en_ja";S.vocabQuizScore={correct:0,total:0};S.vocabQuizQ=null;S._vocabQuizQueue=null;S.vocabQuizWeakOnly=false;render();};
  const qje=$("vocabQuizJaEn"); if(qje)qje.onclick=()=>{S.screen="vocabQuiz";S.vocabQuizMode="ja_en";S.vocabQuizScore={correct:0,total:0};S.vocabQuizQ=null;S._vocabQuizQueue=null;S.vocabQuizWeakOnly=false;render();};
  const qpos=$("vocabQuizPos"); if(qpos)qpos.onclick=()=>{S.screen="vocabQuiz";S.vocabQuizMode="pos_quiz";S.vocabQuizScore={correct:0,total:0};S.vocabQuizQ=null;S._vocabQuizQueue=null;S.vocabQuizWeakOnly=false;render();};
  const qwk=$("vocabQuizWeak"); if(qwk)qwk.onclick=()=>{S.screen="vocabQuiz";S.vocabQuizMode="en_ja";S.vocabQuizScore={correct:0,total:0};S.vocabQuizQ=null;S._vocabQuizQueue=null;S.vocabQuizWeakOnly=true;render();};
}

/* ── 単語クイズ画面 ── */
async function renderVocabQuiz() {
  let words = await vocabGetAll();
  // Weak-only mode: filter to wrongCount > 0
  const weakOnly = S.vocabQuizWeakOnly || false;
  if (weakOnly) {
    words = words.filter(w => (w.wrongCount||0) > 0);
  }
  if (words.length < 4) {
    if (weakOnly) { alert("苦手語が4語未満です。もう少しクイズを解いてからお試しください。"); }
    S.screen="vocab"; S.vocabQuizWeakOnly=false; render(); return;
  }
  const mode = S.vocabQuizMode || "en_ja";
  const score = S.vocabQuizScore || {correct:0,total:0};

  // Generate question if needed
  if (!S.vocabQuizQ) {
    // SRS weighted queue: words with higher wrongCount appear more often
    if (!S._vocabQuizQueue || S._vocabQuizQueue.length === 0) {
      const weighted = [];
      words.forEach((_,i) => {
        const w = words[i];
        const wrong = w.wrongCount || 0;
        const correct = w.correctCount || 0;
        // Weight: 1 (base) + 2 per wrong - 0.5 per correct (min 1)
        const weight = Math.max(1, 1 + wrong * 2 - correct * 0.5);
        for (let j=0; j<Math.round(weight); j++) weighted.push(i);
      });
      // Shuffle and dedupe consecutive repeats
      for (let i=weighted.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [weighted[i],weighted[j]]=[weighted[j],weighted[i]]; }
      // Take unique indices (preserving weighted order)
      const seen = new Set(); const queue = [];
      for (const idx of weighted) { if (!seen.has(idx)) { seen.add(idx); queue.push(idx); } }
      S._vocabQuizQueue = queue;
    }
    const targetIdx = S._vocabQuizQueue.pop();
    const target = words[targetIdx];
    const tMeaning = (target.meaning||"").split("\n")[0];

    if (mode === "pos_quiz") {
      // POS quiz: sentence with blank → choose correct word (tests POS recognition like Part 5)
      const ex = (target.context||"").split("\n")[0] || "";
      // Build blanked sentence: replace target word with -------
      const wordRe = new RegExp(`\\b${target.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\b`, "gi");
      let blanked = ex ? ex.replace(wordRe, "-------") : `The ------- was discussed at the meeting.`;
      if (blanked === ex) blanked = ex.replace(new RegExp(target.word.slice(0,4), "gi"), "-------"); // partial match
      // Distractors: DIFFERENT POS (tests POS identification)
      const targetPos = (target.pos || "other").toLowerCase();
      const diffPos = words.filter(w=>w.word!==target.word && (w.pos||"other").toLowerCase()!==targetPos);
      diffPos.sort(()=>Math.random()-0.5);
      const distractors = diffPos.slice(0,3);
      if (distractors.length < 3) {
        const more = words.filter(w=>w.word!==target.word && !distractors.includes(w));
        more.sort(()=>Math.random()-0.5);
        distractors.push(...more.slice(0, 3-distractors.length));
      }
      const POS_JA = {noun:"名詞",verb:"動詞",adjective:"形容詞",adverb:"副詞",phrase:"フレーズ",other:"その他"};
      let choices = [target.word, ...distractors.slice(0,3).map(w=>w.word)];
      let posLabels = [POS_JA[targetPos]||targetPos, ...distractors.slice(0,3).map(w=>POS_JA[(w.pos||"other").toLowerCase()]||(w.pos||"other"))];
      const indices = choices.map((_,i)=>i).sort(()=>Math.random()-0.5);
      S.vocabQuizQ = {
        target, tMeaning, blanked,
        choices: indices.map(i=>choices[i]),
        posLabels: indices.map(i=>posLabels[i]),
        correct: indices.indexOf(0),
        answered: null
      };
    } else {
      // en_ja / ja_en: Same-POS distractors (harder quiz)
      const targetPos = (target.pos || "other").toLowerCase();
      let samePos = words.filter(w=>w.word!==target.word && (w.pos||"other").toLowerCase()===targetPos);
      let distractorPool;
      if (samePos.length >= 3) {
        samePos.sort(()=>Math.random()-0.5);
        distractorPool = samePos.slice(0,3);
      } else {
        const others = words.filter(w=>w.word!==target.word && !samePos.includes(w));
        others.sort(()=>Math.random()-0.5);
        distractorPool = [...samePos, ...others].slice(0,3);
      }
      let choices;
      if (mode === "en_ja") {
        choices = [tMeaning, ...distractorPool.map(w=>(w.meaning||"").split("\n")[0])];
      } else {
        choices = [target.word, ...distractorPool.map(w=>w.word)];
      }
      const indices = choices.map((_,i)=>i).sort(()=>Math.random()-0.5);
      S.vocabQuizQ = {
        target, tMeaning,
        choices: indices.map(i=>choices[i]),
        correct: indices.indexOf(0),
        answered: null
      };
    }
  }
  const q = S.vocabQuizQ;
  const pct = score.total>0 ? Math.round(score.correct/score.total*100) : 0;
  const lvBadge = {"A":"<span style='font-size:10px;background:rgba(34,197,94,0.15);color:#22c55e;padding:1px 6px;border-radius:4px;margin-left:6px'>A 基礎</span>","B":"<span style='font-size:10px;background:rgba(245,158,11,0.15);color:#f59e0b;padding:1px 6px;border-radius:4px;margin-left:6px'>B 中級</span>","C":"<span style='font-size:10px;background:rgba(239,68,68,0.15);color:#ef4444;padding:1px 6px;border-radius:4px;margin-left:6px'>C 上級</span>"}[q.target.level||""]||"";

  const modeTitle = {"en_ja":"🇬🇧→🇯🇵 英→日","ja_en":"🇯🇵→🇬🇧 日→英","pos_quiz":"📝 品詞あて"}[mode] || mode;
  const weakLabel = weakOnly ? ` <span style="font-size:12px;color:#f87171">(❌苦手${words.length}語)</span>` : "";

  let html = `
    <div class="header">
      <h1 style="font-size:18px">${modeTitle} Quiz${weakLabel}</h1>
      <div class="sub">${score.correct}/${score.total} (${pct}%)</div>
    </div>`;

  if (mode === "pos_quiz") {
    html += `
    <div style="text-align:center;padding:20px;background:rgba(15,23,42,0.8);border-radius:16px;margin:12px 0;border:1px solid rgba(255,255,255,0.06)">
      <div style="font-size:15px;color:#a0b4c8;line-height:1.8">${esc(q.blanked||"")}</div>
    </div>
    <div style="font-size:13px;color:#7a8ea5;text-align:center;margin-bottom:10px">空欄に入る正しい単語は？</div>`;
  } else {
    html += `
    <div style="text-align:center;padding:24px;background:rgba(15,23,42,0.8);border-radius:16px;margin:12px 0;border:1px solid rgba(255,255,255,0.06)">
      <div style="font-size:${mode==="en_ja"?"32px":"26px"};font-weight:700;color:${mode==="en_ja"?"#e2e8f0":"#818cf8"}">${mode==="en_ja"?esc(q.target.word):esc(q.tMeaning)}</div>
      ${mode==="en_ja"?`<button class="btn-s" id="quizPlayWord" style="margin-top:8px;font-size:12px">🔊 発音</button>`:""}
    </div>
    <div style="font-size:13px;color:#7a8ea5;text-align:center;margin-bottom:10px">${mode==="en_ja"?"この単語の意味は？":"この意味の英単語は？"}</div>`;
  }

  // Choices
  q.choices.forEach((c,i) => {
    const isCorrect = i === q.correct;
    let style = "padding:12px;border-radius:10px;margin:6px 0;text-align:center;font-size:15px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);";
    let disabled = "";
    if (q.answered !== null) {
      disabled = "pointer-events:none;opacity:0.7;";
      if (i === q.answered && isCorrect) style += "background:rgba(74,222,128,0.2);border-color:#4ade80;color:#4ade80;";
      else if (i === q.answered && !isCorrect) style += "background:rgba(248,113,113,0.2);border-color:#f87171;color:#f87171;";
      else if (isCorrect) style += "background:rgba(74,222,128,0.1);border-color:#4ade80;color:#4ade80;";
      else style += "background:transparent;color:#7a8ea5;";
    } else {
      style += "background:rgba(255,255,255,0.03);color:#dce6f0;";
    }
    const posTag = (mode==="pos_quiz" && q.posLabels) ? ` <span style="font-size:11px;color:#7a8ea5;margin-left:6px">(${q.posLabels[i]})</span>` : "";
    html += `<div class="quiz-choice" data-qi="${i}" style="${style}${disabled}">${esc(c)}${posTag}</div>`;
  });

  // After answer: show example + level badge + POS info + next
  if (q.answered !== null) {
    const ex = (q.target.context||"").split("\n")[0] || "";
    const posInfo = mode==="pos_quiz" ? ` <span style="font-size:11px;background:rgba(96,165,250,0.15);color:#60a5fa;padding:1px 6px;border-radius:4px">${({"noun":"名詞","verb":"動詞","adjective":"形容詞","adverb":"副詞","phrase":"フレーズ"}[(q.target.pos||"").toLowerCase()]||q.target.pos||"")}</span>` : "";
    html += `<div style="margin-top:12px;padding:12px;background:rgba(129,140,248,0.08);border-radius:10px">`;
    html += `<div style="font-size:14px;font-weight:600;color:#dce6f0;display:flex;align-items:center;gap:6px;flex-wrap:wrap"><button class="btn-s" id="quizPlayWord2" style="font-size:11px;padding:2px 8px">🔊</button>${esc(q.target.word)}${posInfo} — <span style="color:#7b9cf7">${esc(q.tMeaning)}</span>${lvBadge}</div>`;
    if (ex) html += `<div style="font-size:12px;color:#a0b4c8;margin-top:4px">💬 ${esc(ex)}</div>`;
    html += `<button class="btn-s" id="quizPlayEx" style="margin-top:6px;font-size:11px">🔊 例文を聴く</button>`;
    html += `</div>`;
    html += `<button class="btn-s" id="quizNext" style="margin:14px auto;display:block;padding:10px 32px;background:rgba(129,140,248,0.2);color:#7b9cf7;font-size:14px;font-weight:600;border-radius:12px">➡️ Next</button>`;
  }
  html += `<button class="btn-s" id="quizBackBtn" style="margin:16px auto;display:block;font-size:12px;color:#7a8ea5">← 単語帳に戻る</button>`;

  app.innerHTML = html;

  // Handlers
  document.querySelectorAll(".quiz-choice").forEach(el=>{
    el.onclick=()=>{
      if(q.answered!==null) return;
      q.answered = parseInt(el.dataset.qi);
      score.total++;
      if(q.answered===q.correct) score.correct++;
      S.vocabQuizScore = score;
      // SRS: update correctCount/wrongCount in IndexedDB
      const isCorrect = q.answered === q.correct;
      if (q.target.id) {
        vocabUpdate(q.target.id, isCorrect
          ? {correctCount: (q.target.correctCount||0)+1}
          : {wrongCount: (q.target.wrongCount||0)+1}
        ).catch(e=>console.warn("vocab SRS update failed:", e));
      }
      // Save to judgeDB for weakness analysis
      const vocabLevel = {"A":"beginner","B":"intermediate","C":"advanced"}[q.target.level||""]||"intermediate";
      judgeSave("vocab", vocabLevel, mode, 0, isCorrect, q.target.word||"", 0).catch(()=>{});
      render();
    };
  });
  // Word pronunciation buttons (both the top one for en_ja mode and the answer-block one)
  const playWord = async (btn, originalText) => {
    const word = q.target.word;
    const storedAudio = q.target.audio || "";
    if (!word) { alert("単語がありません"); return; }
    btn.textContent="⏳";
    if (storedAudio) {
      try {
        const bin = atob(storedAudio);
        const bytes = new Uint8Array(bin.length);
        for (let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], {type:"audio/webm;codecs=opus"});
        const url = URL.createObjectURL(blob);
        const a = new Audio(url);
        a.onended = () => { URL.revokeObjectURL(url); btn.textContent = originalText; };
        a.onerror = () => { URL.revokeObjectURL(url); btn.textContent = originalText; };
        await a.play();
        return;
      } catch(e) { console.warn("stored audio fail:", e); }
    }
    if (!S.apiKey) { alert("APIキーが設定されていません"); btn.textContent=originalText; return; }
    try {
      speakGemini(word, (err)=>{ if(err)alert("音声エラー: "+err); btn.textContent=originalText; });
      setTimeout(()=>{btn.textContent=originalText;}, 500);

  const pw = $("quizPlayWord");
  if (pw) pw.onclick = () => playWord(pw, "🔊 発音");
  const pw2 = $("quizPlayWord2");
  if (pw2) pw2.onclick = () => playWord(pw2, "🔊");
  const pe = $("quizPlayEx");
  if (pe) pe.onclick = async () => {
    const ex = (q.target.context||"").split("\n")[0];
    if(!ex) return;
    const storedAudio = q.target.exampleAudio || "";
    pe.textContent="⏳";
    if (storedAudio) {
      try {
        const bin = atob(storedAudio);
        const bytes = new Uint8Array(bin.length);
        for (let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], {type:"audio/webm;codecs=opus"});
        const url = URL.createObjectURL(blob);
        const a = new Audio(url);
        a.onended = () => { URL.revokeObjectURL(url); pe.textContent="🔊 例文を聴く"; };
        a.onerror = () => { URL.revokeObjectURL(url); pe.textContent="🔊 例文を聴く"; };
        await a.play();
        return;
      } catch(e) { console.warn("stored example audio fail:", e); }
    }
    try {
      speakGemini(ex, ()=>{ pe.textContent="🔊 例文を聴く"; });
      setTimeout(()=>{pe.textContent="🔊 例文を聴く";}, 500);
    } catch(e) { pe.textContent="🔊 例文を聴く"; }
  };
  const nb=$("quizNext"); if(nb)nb.onclick=()=>{ S.vocabQuizQ=null; render(); };
  const bb=$("quizBackBtn"); if(bb)bb.onclick=()=>{ S.screen="vocab"; render(); };
}

async function renderListenPlay() {
  const playlist = S.listenPlaylist || [];
  const idx = S.listenIdx || 0;
  if (idx >= playlist.length) {
    app.innerHTML = `<div style="text-align:center;padding:40px"><h2>🎧 流し聞き完了</h2><p style="color:#a0b4c8">${playlist.length}問を再生しました</p></div><div style="text-align:right;padding:0 16px"><button class="btn-s" id="listenBackBtn" style="font-size:12px;padding:6px 14px">← 戻る</button></div>`;
    $("listenBackBtn").onclick=()=>{S.listenMode=false;S.screen="home";render();};
    return;
  }
  let item = playlist[idx];
  // Light item from playlist — load full data (with audio) on demand
  if (item.id && (!item.audioOpus && !item.audioPcm)) {
    const full = await stockGetById(item.id);
    if (!full) { console.warn("[LISTEN] item not found:", item.id); S.listenIdx=idx+1; render(); return; }
    item = full;
  }
  const qs = item.qSet || {};
  const questions = qs.questions || [];
  const partLabel = {part2:"Part 2",part3:"Part 3",part4:"Part 4"}[item.part]||item.part;

  app.innerHTML = `
    <div class="header"><h1 style="font-size:18px">🎧 流し聞き</h1><div class="sub">${idx+1}/${playlist.length} ${partLabel}</div></div>
    <div id="listenStatus" style="text-align:center;padding:20px;font-size:16px;color:#7b9cf7">🔊 再生中...</div>
    <div id="listenText" style="padding:12px;background:#243040;border-radius:12px;margin:12px 0;font-size:13px;color:#a0b4c8;max-height:200px;overflow-y:auto"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
      <button class="btn-s" id="listenPauseBtn">⏸️ Pause</button>
      <button class="btn-s" id="listenSkipBtn">⏭️ Skip</button>
      <button class="btn-s" id="listenStopBtn" style="color:#f87171">⏹️ Stop</button>
    </div>`;

  const statusEl = $("listenStatus");
  const textEl = $("listenText");
  let stopped = false;

  $("listenStopBtn").onclick=()=>{ stopped=true; stopSpeak(); S.listenMode=false; S.screen="home"; render(); };
  $("listenSkipBtn").onclick=()=>{ stopped=true; stopSpeak(); S.listenIdx=idx+1; render(); };
  let paused = false;
  $("listenPauseBtn").onclick=()=>{
    paused=!paused;
    $("listenPauseBtn").textContent=paused?"▶️ Resume":"⏸️ Pause";
    if(paused) {
      // Pause current audio without destroying it
      if (_curAudio && !_curAudio.paused) _curAudio.pause();
      if (window.speechSynthesis) speechSynthesis.pause();
    } else {
      // Resume
      if (_curAudio && _curAudio.paused && _curAudio.src) _curAudio.play().catch(()=>{});
      if (window.speechSynthesis) speechSynthesis.resume();
    }
  };

  // Web Speech utility (free, no API calls)
  async function webSpeak(text) {
    return new Promise(resolve => {
      if (stopped || !text || !text.trim()) { resolve(); return; }
      if (!window.speechSynthesis) { resolve(); return; }
      const start = () => {
        if (stopped) { resolve(); return; }
        if (paused) { setTimeout(start, 200); return; }
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "en-US"; utter.rate = 0.95;
        utter.onend = () => resolve();
        utter.onerror = () => resolve();
        speechSynthesis.speak(utter);
      };
      start();
    });
  }
  async function wait(ms) {
    return new Promise(resolve=>{
      const check=()=>{ if(stopped)return resolve(); if(paused)return setTimeout(check,200); setTimeout(resolve,ms); };
      check();
    });
  }

  // Play stored stock audio (Opus/PCM). Returns true if played.
  async function playStoredStock(item) {
    const audioData = item.audioOpus || item.audioPcm;
    if (!audioData) return false;
    try {
      const url = item.audioOpus ? opusToUrl(item.audioOpus) : pcmToUrl(item.audioPcm);
      return new Promise(resolve => {
        const a = new Audio(url);
        _curAudio = a;
        a.onended = () => { URL.revokeObjectURL(url); _curAudio=null; resolve(true); };
        a.onerror = () => { URL.revokeObjectURL(url); _curAudio=null; resolve(false); };
        a.play().catch(e => { URL.revokeObjectURL(url); resolve(false); });
      });
    } catch(e) { console.warn("stored audio fail:", e); return false; }
  }

  // Play sequence — stored audio + Web Speech ONLY (no Gemini API calls)
  try {
    // 1. Announce question number
    statusEl.textContent=`🔊 Question ${idx+1}`;
    await webSpeak(`Question ${idx+1}.`);
    if(stopped) return;

    // 2. Main audio — STORED ONLY
    const audioText = qs.audio || qs.spoken || qs.talk || qs.conversation || "";
    if(audioText) {
      textEl.textContent = audioText.replace(/\\n/g,"\n");
      statusEl.textContent="🔊 問題再生中...";
      const played = await playStoredStock(item);
      if (!played) {
        console.warn(`[LISTEN] Q${idx+1}: no stored audio, Web Speech fallback`);
        await webSpeak(audioText.replace(/(?:Man\s*\d?|Woman\s*\d?|Speaker\s*\d?):\s*/gi,"").replace(/\\n/g," "));
      }
    }
    if(stopped) return;

    // 3. Think pause
    statusEl.textContent="⏳ 考え中...";
    await wait(LISTEN_THINK_MS);
    if(stopped) return;

    // Helper: play stored opus clip, returns true if played
    async function playClip(b64opus) {
      if (!b64opus) return false;
      try {
        const url = opusToUrl(b64opus);
        return new Promise(resolve => {
          const a = new Audio(url);
          _curAudio = a;
          a.onended = () => { URL.revokeObjectURL(url); _curAudio=null; resolve(true); };
          a.onerror = () => { URL.revokeObjectURL(url); _curAudio=null; resolve(false); };
          a.play().catch(() => { URL.revokeObjectURL(url); resolve(false); });
        });
      } catch(e) { return false; }
    }

    // 4. Answers — stored audio (Edge TTS) preferred, Web Speech fallback
    const letters = ["A","B","C","D"];
    for(let qi=0; qi<questions.length; qi++) {
      if(stopped) return;
      const q = questions[qi];
      const correct = q.correct || 0;
      const choices = q.choices || [];
      const correctText = (choices[correct]||"").replace(/^\([A-D]\)\s*/,"");
      const correctLetter = letters[correct] || "A";

      // Question + choices (Part 3/4 only)
      if(questions.length > 1) {
        statusEl.textContent=`🔊 Q${qi+1}: ${q.question?.slice(0,40)}...`;
        if (q.audio_q) {
          await playClip(q.audio_q);
        } else {
          await webSpeak(q.question || "");
          await wait(LISTEN_Q_TO_CHOICES_MS);
          if(stopped) return;
          const needChoiceRead = !["part1","part2"].includes(item.part);
          if (needChoiceRead && choices.length > 0) {
            statusEl.textContent=`🔊 選択肢...`;
            const choicesText = choices.map((c,i)=>`(${letters[i]}) ${c.replace(/^\([A-D]\)\s*/,"")}`).join(". ");
            await webSpeak(choicesText);
          }
        }
        await wait(LISTEN_CHOICES_PAUSE_MS);
        if(stopped) return;
      } else if (["part1","part2"].includes(item.part)) {
        // Part 1/2: choices already in main audio, just think time
        await wait(LISTEN_CHOICES_PAUSE_MS);
        if(stopped) return;
      }

      // Answer + explanation
      statusEl.textContent=`✅ Answer: ${correctLetter}`;
      textEl.textContent = `Answer: (${correctLetter}) ${correctText}`;
      if (q.audio_ans) {
        await playClip(q.audio_ans);
      } else {
        await webSpeak(`The answer is ${correctLetter}. ${correctText}`);
        await wait(LISTEN_AFTER_ANSWER_MS);
        if(stopped) return;
        const explEn = (q.explanation_en || "").trim();
        if(explEn) {
          statusEl.textContent=`💡 ${explEn.slice(0,40)}...`;
          await webSpeak(explEn);
        }
      }
      await wait(LISTEN_AFTER_EXPL_MS);
      if(stopped) return;
    }

    // 5. Auto advance
    statusEl.textContent="➡️ Next...";
    await wait(LISTEN_BETWEEN_ITEMS_MS);
    if(!stopped) { S.listenIdx=idx+1; render(); }
    } catch(e) {
    console.error("Listen error:", e);
    if(!stopped) { S.listenIdx=idx+1; render(); }
  }
}

// TOEIC本番のパート別問題数 (フル200問)
const MOCK_FULL_DIST = {
  part1: 6, part2: 25, part3: 39, part4: 30,  // L: 100
  part5: 30, part6: 16, part7: 54              // R: 100
};
// 注: Part 3/4は1セット3問、Part 6は1セット4問、Part 7は1セット2-5問
// → 必要なストックセット数を計算（切り上げ）
function calcSetsNeeded(part, questions) {
  const perSet = {part1:1, part2:1, part3:3, part4:3, part5:1, part6:4, part7:3}; // part7は平均3問/セット
  return Math.ceil(questions / (perSet[part] || 1));
}

// 公式問題集5ベース換算表 (素点 → スコア中央値)
function scoreFromRaw(raw, isListening) {
  raw = Math.max(0, Math.min(100, raw));
  // 補間用テーブル: [正答数, スコア中央値]
  const tableL = [[0,5],[5,15],[10,30],[15,45],[20,60],[25,80],[30,110],[35,135],[40,170],
                  [45,210],[50,250],[55,290],[60,330],[65,370],[70,400],[75,425],[80,455],
                  [85,475],[90,485],[95,495],[100,495]];
  const tableR = [[0,5],[5,15],[10,25],[15,45],[20,60],[25,75],[30,95],[35,120],[40,150],
                  [45,185],[50,220],[55,255],[60,290],[65,325],[70,355],[75,385],[80,420],
                  [85,445],[90,470],[95,485],[100,495]];
  const tbl = isListening ? tableL : tableR;
  for (let i=0; i<tbl.length-1; i++) {
    const [r1,s1] = tbl[i], [r2,s2] = tbl[i+1];
    if (raw >= r1 && raw <= r2) {
      const ratio = (raw - r1) / (r2 - r1);
      return Math.round((s1 + (s2-s1)*ratio) / 5) * 5; // 5点刻み
    }
  }
  return 5;
}
