<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { min-height:100vh; background:#1a2332; color:#dce6f0; font-family:'Noto Sans JP','Segoe UI',sans-serif; }

/* ─ Buttons ─ */

<body>
<div class="container" id="app"></div>
<script>
/* =============================================
   TOEIC AI Trainer — 公式形式準拠版
   Part3/4: 1会話3問, Part6: 4問, Part7: 3問
   ============================================= */

const GEMINI_LITE        = "gemini-2.5-flash-lite";
const GEMINI_FLASH       = "gemini-2.5-flash";
const GEMINI_3FLASH      = "gemini-3-flash-preview";
const GEMINI_PRO         = "gemini-2.5-pro";
const GEMINI_IMAGE_MODEL = "gemini-3.1-flash-image-preview";
const GEMINI_TTS_MODEL   = "gemini-2.5-flash-preview-tts";
const GEMINI_TTS_MODEL_2 = "gemini-3.1-flash-tts-preview";

// ── Tunable constants (was scattered as magic numbers) ──
const TTS_MAX = 5000;              // Max chars sent to Gemini TTS in one call
const TTS_CACHE_SIZE = 20;         // LRU cache size for generated audio
const API_THROTTLE_MS = 300;       // Delay between sequential API requests
const API_RETRY_DELAY_MS = 3000;   // Wait between retries on 429/500/503
const LISTEN_THINK_MS = 5000;      // Pause after main audio before Q&A (real TOEIC: 5s)
const LISTEN_Q_TO_CHOICES_MS = 2000;  // Pause between question text and choices reading
const LISTEN_CHOICES_PAUSE_MS = 5000; // Pause after choices to think (real TOEIC: 8s, shortened to 5s for practice)
const LISTEN_AFTER_ANSWER_MS = 2000;  // Pause after answer announcement
const LISTEN_AFTER_EXPL_MS = 2000;    // Pause after English explanation
const LISTEN_BETWEEN_QUESTIONS_MS = 1500; // Pause between sub-questions (Part 3/4)
const LISTEN_BETWEEN_ITEMS_MS = 2000;     // Pause before next stock item

// 3-Flash = 高性能+低コスト (2.5 Pro超え、料金1/3)
const PART_MODEL = {
  part1: GEMINI_3FLASH,
  part2: GEMINI_3FLASH,
  part3: GEMINI_3FLASH,    part3_3p: GEMINI_3FLASH,
  part4: GEMINI_3FLASH,
  part5: GEMINI_3FLASH,
  part6: GEMINI_3FLASH,
  part7: GEMINI_3FLASH,    part7s: GEMINI_3FLASH,   part7d: GEMINI_3FLASH,   part7t: GEMINI_3FLASH,
};

const LEVELS = [
  {id:"beginner",     label:"初級", score:"〜600点",    color:"#22c55e"},
  {id:"intermediate", label:"中級", score:"600〜800点", color:"#f59e0b"},
  {id:"advanced",     label:"上級", score:"800点〜",    color:"#ef4444"},
];
const PARTS = [
  {id:"part1",label:"Part 1",desc:"写真描写",   sec:"L",icon:"🖼️", qCount:1},
  {id:"part2",label:"Part 2",desc:"応答問題",   sec:"L",icon:"💬", qCount:1},
  {id:"part3",label:"Part 3",desc:"会話問題",   sec:"L",icon:"🗣️", qCount:3},
  {id:"part4",label:"Part 4",desc:"説明文問題", sec:"L",icon:"🎙️", qCount:3},
  {id:"part5",label:"Part 5",desc:"短文穴埋め", sec:"R",icon:"✏️", qCount:1},
  {id:"part6",label:"Part 6",desc:"長文穴埋め", sec:"R",icon:"📝", qCount:4},
  {id:"part7",label:"Part 7",desc:"読解問題",   sec:"R",icon:"📖", qCount:0, qTag:"2-5問"},
];

/* ── State ── */
const SESSION_SIZE = 5; // 1セッション = 5問

let S = {
  screen: "apikey",
  apiKey: localStorage.getItem("gemini_api_key") || "",
  level: null, part: null,

  qSet: null,      // 現在の問題セット
  qIdx: 0,         // セット内の現在の問い番号
  answers: [],     // [{selected:null, answered:false}, ...]
  sessionNum: 0,   // 現セッションで完了したセット数（0〜5）

  sceneImgUrl: null, imageError: null,
  loading: false, loadMsg: "",
  error: null,
  stats: {correct:0, wrong:0}, streak: 0,
  stockMode: false, stockId: null,
  stockPlaylist: [],   // ストック学習用の問題リスト
  stockPlayIdx: 0,     // プレイリスト内の現在位置
  stockCreateMode: false, stockCreateTarget: 10, stockCreatePaused: false, // ストック作成モード
  judgeMode: JSON.parse(localStorage.getItem("judgeMode")||"false"), // 判定モード
  timerStart: 0, timerFrozen: 0, // 問題表示開始時刻 / 回答時の凍結時間
};

if (S.apiKey) S.screen = "home";

const $ = id => document.getElementById(id);
const app = document.getElementById("app");
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// Normalize text: convert literal \\n to real newlines, trim
function normText(s) {
  if (!s) return "";
  return String(s).replace(/\\n/g, "\n").trim();
}

// Format passage text for display (handles all doc types)
// Returns HTML-safe string with proper line breaks and formatting
function formatPassage(text, docType) {
  if (!text) return "";
  let t = normText(text);
  const escaped = esc(t);

  // For chat/text_message: add extra spacing between messages
  // Pattern: [time] Name: ... or Name [time]: ...
  if (docType && /chat|text_message/i.test(docType)) {
    // Add blank line before each message that starts with [ or a name followed by [
    return escaped
      .replace(/\n/g, "<br>")
      .replace(/<br>(\[)/g, "<br><br>$1")                   // [10:15 AM] style
      .replace(/<br>((?:[A-Z][a-z]+\s?)+\s*\[)/g, "<br><br>$1") // Name [time] style
      .replace(/<br>((?:[A-Z][a-z]+\s?)+:)/g, "<br><br>$1");    // Name: style (if no timestamp)
  }

  // For emails/memos/letters: preserve paragraph breaks (double newline → extra spacing)
  return escaped
    .replace(/\n\n+/g, "<br><br>")  // paragraph breaks
    .replace(/\n/g, "<br>");        // line breaks
}

// Wrap formatted text in a styled container (consistent across study + mock test)
function passageBlock(text, docType, headerHtml) {
  const formatted = formatPassage(text, docType);
  return `<div class="ctx-block">${headerHtml||""}<div style="font-size:14px;line-height:1.9;color:#b8cce8">${formatted}</div></div>`;
}

// Format Part 6 text with blank highlighting (for mock test too)
function formatP6(text, activeBlank) {
  const t = normText(text);
  const escaped = esc(t);
  const withBlanks = escaped.replace(/\((\d)\)/g, (match, n) => {
    const num = parseInt(n);
    const active = num === (activeBlank || 0);
    return `<span class="blank${active ? " active" : ""}">(${n}) _______</span>`;
  });
  return withBlanks.replace(/\n\n+/g, "<br><br>").replace(/\n/g, "<br>");
}

/* ──────────────────────────────────────────────
   API THROTTLE — 全Geminiリクエストを直列化 + 429リトライ
────────────────────────────────────────────── */
let _apiLock = Promise.resolve();

async function throttledFetch(url, opts, maxRetries=2, signal=null) {
  let release;
  const prev = _apiLock;
  _apiLock = new Promise(r => release = r);
  await prev;
  if (signal?.aborted) { release(); throw new DOMException("Aborted","AbortError"); }
  await new Promise(r => setTimeout(r, API_THROTTLE_MS));

  try {
    for (let attempt=0; attempt<=maxRetries; attempt++) {
      if (signal?.aborted) throw new DOMException("Aborted","AbortError");
      const fetchOpts = signal ? {...opts, signal} : opts;
      const res = await fetch(url, fetchOpts);
      if (res.status === 429 || res.status === 503 || res.status === 500) {
        const errText = await res.text().catch(()=>"");
        const wait = API_RETRY_DELAY_MS * Math.pow(2, attempt);
        console.warn(`${res.status}: ${errText.slice(0,100)} | retry ${attempt+1}/${maxRetries} in ${wait/1000}s`);
        if (attempt < maxRetries) { await new Promise(r => setTimeout(r, wait)); continue; }
        throw new Error(`API ${res.status}: ${errText.slice(0,200)}`);
      }
      return res;
    }
    throw new Error("APIエラー。しばらく待ってから再度お試しください。");
  } finally {
    release();
  }
}

/* ──────────────────────────────────────────────
   GEMINI TEXT API
────────────────────────────────────────────── */
async function geminiText(prompt, model) {
  const m = model || GEMINI_3FLASH;
  const genConfig = {temperature:0.9};
  // thinking制御（2.5系: thinkingBudget、3.x系: thinkingLevel）
  if (m.includes("preview")) {
    if (m.includes("pro")) genConfig.thinkingConfig = {thinkingLevel:"low"};
    else genConfig.thinkingConfig = {thinkingLevel:"minimal"};
  } else if (m.includes("2.5-pro")) {
    genConfig.thinkingConfig = {thinkingBudget:1024};  // Pro: 思考必須（最小限）
  } else if (m.includes("2.5")) {
    genConfig.thinkingConfig = {thinkingBudget:0};  // Flash/Lite: 思考OFF
  }
  const res = await throttledFetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${S.apiKey}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({contents:[{role:"user",parts:[{text:prompt}]}],generationConfig:genConfig}) }
  );
  if (!res.ok) throw new Error(`API ${res.status}: ${(await res.text()).slice(0,150)}`);
  const d = await res.json();
  return d.candidates[0].content.parts.map(p=>p.text||"").join("");
}

/* ──────────────────────────────────────────────
   GEMINI IMAGE API
────────────────────────────────────────────── */
async function generateImage(scene, opts={}) {
  const imageSize = "512";
  const isGraphic = !!opts.isGraphic;
  const promptText = isGraphic
    ? `Clean business graphic for a TOEIC test: ${scene}. Simple, professional style. Clear readable text. White background.`
    : `TOEIC test photograph: ${scene}. Realistic, no text overlay.`;
  const res = await throttledFetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_IMAGE_MODEL}:generateContent?key=${S.apiKey}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        contents:[{role:"user",parts:[{text:promptText}]}],
        generationConfig:{responseModalities:["TEXT","IMAGE"],imageConfig:{imageSize}},
      }) }
  );
  if (!res.ok) throw new Error(`ImgAPI ${res.status}: ${(await res.text()).slice(0,100)}`);
  const d = await res.json();
  const img = (d.candidates?.[0]?.content?.parts||[]).find(p=>p.inlineData);
  if (!img) throw new Error("画像データなし");
  return `data:${img.inlineData.mimeType};base64,${img.inlineData.data}`;
}

// Build description string for graphic image generation (same logic as Streamlit)
function buildGraphicDesc(qSet) {
  if (!qSet || !qSet.graphic) return null;
  const g = qSet.graphic;
  let desc = `${g.title || "Business document"}. `;
  if (g.headers && g.rows && g.rows.length) {
    desc += `Table with columns: ${g.headers.join(", ")}. `;
    const sampleRows = g.rows.slice(0, 3).map(r => r.join(", ")).join("; ");
    desc += `Rows: ${sampleRows}. `;
  }
  return desc;
}

/* ──────────────────────────────────────────────
   PROMPTS
────────────────────────────────────────────── */
/* ──────────────────────────────────────────────
   TYPE POOLS — 各パートの出題バリエーション
   セッション開始時にシャッフルし、5問に異なるタイプを割り当て
────────────────────────────────────────────── */
const TYPES = {
  part1: [
    {type:"office_desk", desc:"Person working at desk — typing, reading, organizing"},
    {type:"meeting_conference", desc:"People in conference room — presenting, discussing"},
    {type:"reception_lobby", desc:"Reception area — receptionist greeting, visitor signing in"},
    {type:"copy_room", desc:"Copy/print room — person using copier, sorting papers"},
    {type:"break_room", desc:"Break room — people having coffee, using microwave, vending machine"},
    {type:"server_room", desc:"Server/IT room — technician checking equipment, cables"},
    {type:"mailroom_delivery", desc:"Mailroom — sorting packages, loading cart, delivery person"},
    {type:"filing_cabinet", desc:"Storage/filing area — person opening cabinet, organizing folders"},
    {type:"whiteboard_planning", desc:"Planning session — person writing on whiteboard, sticky notes"},
    {type:"elevator_hallway", desc:"Elevator/hallway — people waiting, walking, carrying items"},
    {type:"staircase_hallway", desc:"Building interior — staircase, hallway, elevator area"},
    {type:"rooftop_terrace", desc:"Office rooftop/terrace — outdoor seating, city view"},
    {type:"retail_shopping", desc:"Store — customer browsing, cashier, trying on clothes"},
    {type:"supermarket_grocery", desc:"Grocery store — shopping cart, produce aisle, checkout"},
    {type:"pharmacy_counter", desc:"Pharmacy — pharmacist behind counter, customer picking up prescription"},
    {type:"bookstore_browsing", desc:"Bookstore — person reading, shelves of books, display table"},
    {type:"electronics_store", desc:"Electronics store — customer looking at laptops, TVs on display"},
    {type:"jewelry_boutique", desc:"Jewelry/boutique shop — display case, customer being shown items"},
    {type:"restaurant_cafe", desc:"Café or restaurant — waiter serving, people dining, barista"},
    {type:"kitchen_cooking", desc:"Kitchen — chef cooking, preparing food, cutting vegetables"},
    {type:"food_truck_vendor", desc:"Street food — food cart, vendor serving, customers queueing"},
    {type:"bakery_counter", desc:"Bakery — bread display, baker arranging pastries, customer pointing"},

/* ── セッション用タイプシャッフル ── */
let _sessionTypes = {};
let _typeQueues = {};  // persistent queues per part — all types used before repeating

function shuffleSessionTypes() {
  _sessionTypes = {};
  for (const [part, pool] of Object.entries(TYPES)) {
    // Refill queue if empty or too short
    if (!_typeQueues[part] || _typeQueues[part].length < SESSION_SIZE) {
      const fresh = [...pool];
      for (let i=fresh.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [fresh[i],fresh[j]]=[fresh[j],fresh[i]]; }
      _typeQueues[part] = (_typeQueues[part] || []).concat(fresh);
    }
    // Take next SESSION_SIZE items from queue
    _sessionTypes[part] = _typeQueues[part].splice(0, SESSION_SIZE);
  }
}

CORRECT ANSWER: direct and clear — answer matches keywords in the question or text with minimal paraphrasing
DISTRACTORS: use common TOEIC traps but keep them identifiable: repeated words from the question in wrong context, similar-sounding words, wrong tense
  Example Part 2: "Where is the meeting room?" → "It's on the second floor." (direct WH-answer)
  Example Part 5: "The packages will be ------- tomorrow morning." → delivered (basic passive future — test word form: deliver/delivery/delivering/delivered)
  Example Part 7: "What is the purpose of this email?" (answer directly stated in the first sentence)

function parseJSON(text) {
  const t = text.replace(/```json|```/g,"").trim();
  function unwrap(result) {
    // [obj, ...] → obj
    if (Array.isArray(result)) {
      if (result.length === 0) throw new Error("Empty array");
      console.warn("[PARSE] Array response, using first");
      return result[0];
    }
    // {"part1": [obj]} or {"part1": obj} → obj
    if (result && typeof result === "object") {
      const keys = Object.keys(result);
      const partKeys = keys.filter(k => /^part[1-7][a-z_]*$/.test(k));
      if (partKeys.length > 0 && partKeys.length === keys.length) {
        const inner = result[partKeys[0]];
        console.warn(`[PARSE] Nested {${partKeys[0]}: ...}, unwrapping`);
        if (Array.isArray(inner)) {
          if (inner.length === 0) throw new Error("Empty nested array");
          return inner[0];
        }
        return inner;
      }
    }
    return result;
  }
  try { return unwrap(JSON.parse(t)); } catch(e) {
    // Fix common issues: unescaped newlines inside strings
    try {
      let out="", inStr=false, esc2=false;
      for (const c of t) {
        if (esc2) { out+=c; esc2=false; continue; }
        if (c==="\\") { esc2=true; out+=c; continue; }
        if (c==='"') { inStr=!inStr; out+=c; continue; }
        if (inStr) {
          if (c==="\n") { out+="\\n"; continue; }
          if (c==="\r") { continue; }
          if (c==="\t") { out+="\\t"; continue; }
        }
        out+=c;
      }
      return unwrap(JSON.parse(out));
    } catch(e2) { throw new Error(`JSON解析エラー: ${e.message}`); }
  }
}

function normalizeSet(raw, part) {
  // Normalize subtypes to base part for storage/display
  if (part === "part3_3p") part = "part3";
  if (part.startsWith("part7") && part !== "part7") part = "part7";
  // Normalize all parts into unified {part, questions:[], audio?, content fields}
  switch(part) {
    case "part1": {
      // ALWAYS rebuild audio from choices to avoid LLM placeholder bugs
      const audio = raw.choices.map((c,i)=>`(${["A","B","C","D"][i]}) ${c.replace(/^\([A-D]\)\s*/,"").replace(/\.+$/,"")}.`).join(" ... ");
      if (raw.audio && (raw.audio.includes("[") && raw.audio.includes("]"))) {
        console.warn("Part1: LLM audio contained placeholders, using reconstructed");
      }
      return { part, scene:raw.scene, audio,
        questions:[{question:"Which statement best describes the photograph?", choices:raw.choices, correct:raw.correct, explanation_ja:raw.explanation_ja, explanation_en:raw.explanation_en}], vocab:raw.vocab||[] };
    }
    case "part2": {
      // ALWAYS rebuild audio from spoken + choices
      const audio = `${raw.spoken}. ... ${raw.choices.map((c,i)=>`(${["A","B","C"][i]}) ${c.replace(/^\([A-C]\)\s*/,"").replace(/\.+$/,"")}.`).join(" ... ")}`;
      if (raw.audio && (raw.audio.includes("[") && raw.audio.includes("]"))) {
        console.warn("Part2: LLM audio contained placeholders, using reconstructed");
      }
      return { part, spoken:raw.spoken, audio,
        questions:[{question:raw.spoken, choices:raw.choices, correct:raw.correct, explanation_ja:raw.explanation_ja, explanation_en:raw.explanation_en}], vocab:raw.vocab||[] };
    }
    case "part3_3p":
    case "part3": {
      // Gender validation
      const conv = raw.conversation || "";
      const lines = conv.split(/\\n|\n/);
      for (const line of lines) {
        const m = line.match(/^(Man|Woman)\s*\d?\s*:\s*(.+)/i);
        if (m) {
          const label = m[1].toLowerCase();
          const text = m[2];
          if (label === "man" && /\bI'm\s+(?:Ms\.|Mrs\.|she|her name is)\b/i.test(text)) {
            console.warn("⚠️ Part 3 gender mismatch: Man line contains female reference:", text.slice(0,60));
          }
          if (label === "woman" && /\bI'm\s+(?:Mr\.|he|his name is)\b/i.test(text)) {
            console.warn("⚠️ Part 3 gender mismatch: Woman line contains male reference:", text.slice(0,60));
          }
        }
      }
      let tja = raw.translation_ja || null;
      if (tja) {
        tja = tja.replace(/女性(\s*\d?\s*):(.+?)(?=男性|女性|$)/g, (m, n, t) => `女性${n}:${t}`);
        tja = tja.replace(/男性(\s*\d?\s*):(.+?)(?=男性|女性|$)/g, (m, n, t) => `男性${n}:${t}`);
      }
      // ALWAYS use conversation as audio (ignore LLM's audio field to avoid placeholders)
      if (raw.audio && raw.audio.trim() !== conv.trim()) {
        if (raw.audio.includes("[") || raw.audio.length < conv.length * 0.5) {
          console.warn("Part3: LLM audio differs from conversation, using conversation");
        }
      }
      return { part, conversation:conv, translation_ja:tja, audio:conv, speakers:raw.speakers||["Man","Woman"], graphic:raw.graphic||null, vocab:raw.vocab||[], questions:raw.questions };
    }
    case "part4": {
      // ALWAYS use talk as audio
      const talk = raw.talk || "";
      if (raw.audio && raw.audio.trim() !== talk.trim()) {
        if (raw.audio.includes("[") || raw.audio.length < talk.length * 0.5) {
          console.warn("Part4: LLM audio differs from talk, using talk");
        }
      }
      return { part, talk, translation_ja:raw.translation_ja||null, talk_type:raw.talk_type||"", audio:talk, graphic:raw.graphic||null, vocab:raw.vocab||[], questions:raw.questions };
    }
    case "part5": {
      // Validate: sentence MUST contain blank (-------)
      let sentence = raw.sentence || "";
      if (!sentence.includes("-------")) {
        // Try to fix: insert blank at correct answer position if possible
        const correct = raw.correct || 0;
        const correctWord = (raw.choices?.[correct] || "").replace(/^\([A-D]\)\s*/, "");
        if (correctWord && sentence.includes(correctWord)) {
          sentence = sentence.replace(correctWord, "-------");
          console.warn(`[Part5] Fixed missing blank: inserted ------- for "${correctWord}"`);
        } else {
          console.warn("[Part5] INVALID: no blank in sentence:", sentence.slice(0,60));
          throw new Error("Part 5: sentence has no blank (-------)");
        }
      }
      return { part,
        questions:[{question:sentence, choices:raw.choices, correct:raw.correct, explanation_ja:raw.explanation_ja, explanation_en:raw.explanation_en}], vocab:raw.vocab||[] };
    }
    case "part6": {
      const text = raw.text || "";
      if (!text.includes("-------")) {
        console.warn("[Part6] WARN: no blanks (-------) in text");
      }
      return { part, doc_type:raw.doc_type||"", header:raw.header||null, text, translation_ja:raw.translation_ja||null, vocab:raw.vocab||[], questions:raw.questions };
    }
    case "part7s":
    case "part7d":
    case "part7t":
    case "part7":
      // Detect triple passage
      if (raw.text_1 && raw.text_2 && raw.text_3) {
        return { part, isTriple:true,
          doc_type_1:raw.doc_type_1||"", header_1:raw.header_1||null, text_1:raw.text_1, translation_ja_1:raw.translation_ja_1||null,
          doc_type_2:raw.doc_type_2||"", header_2:raw.header_2||null, text_2:raw.text_2, translation_ja_2:raw.translation_ja_2||null,
          doc_type_3:raw.doc_type_3||"", header_3:raw.header_3||null, text_3:raw.text_3, translation_ja_3:raw.translation_ja_3||null,
          vocab:raw.vocab||[], questions:raw.questions };
      }
      // Detect double passage
      if (raw.text_1 && raw.text_2) {
        return { part, isDouble:true,
          doc_type_1:raw.doc_type_1||"", header_1:raw.header_1||null, text_1:raw.text_1, translation_ja_1:raw.translation_ja_1||null,
          doc_type_2:raw.doc_type_2||"", header_2:raw.header_2||null, text_2:raw.text_2, translation_ja_2:raw.translation_ja_2||null,
          vocab:raw.vocab||[], questions:raw.questions };
      }
      return { part, isDouble:false, doc_type:raw.doc_type||"", header:raw.header||null, text:raw.text, translation_ja:raw.translation_ja||null, graphic:raw.graphic||null, vocab:raw.vocab||[], questions:raw.questions };
    default:
      throw new Error("Unknown part: "+part);
  }
}

function enforceChoiceCount(qs) {
  const maxC = qs.part === "part2" ? 3 : 4;
  for (const q of (qs.questions || [])) {
    if (q.choices && q.choices.length > maxC) {
      console.warn(`[FIX] ${qs.part}: truncated ${q.choices.length} choices → ${maxC}`);
      q.choices = q.choices.slice(0, maxC);
      if ((q.correct || 0) >= maxC) { q.correct = 0; console.warn("[FIX] correct index reset to 0"); }
    }
  }
  return qs;
}

function shuffleAnswerPositions(qs) {
  const labels = ["(A)","(B)","(C)","(D)"];
  const fwLabels = ["（A）","（B）","（C）","（D）"];
  for (const q of (qs.questions || [])) {
    const choices = q.choices;
    const correctIdx = q.correct || 0;
    if (!choices || correctIdx >= choices.length) continue;
    const n = choices.length;
    const order = Array.from({length:n}, (_,i)=>i);
    for (let i=n-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
    const newChoices = new Array(n);
    let newCorrect = 0;
    // Build old→new position mapping
    const oldToNew = {};  // oldPos → newPos
    for (let np=0; np<n; np++) {
      const op = order[np];
      const c = choices[op].replace(/^\([A-D]\)\s*/, "");
      newChoices[np] = `${labels[np]} ${c}`;
      if (op === correctIdx) newCorrect = np;
      oldToNew[op] = np;
    }
    q.choices = newChoices;
    q.correct = newCorrect;
    // Remap ALL label references in explanations using placeholders to avoid collision
    const needsRemap = Object.entries(oldToNew).some(([o,n]) => parseInt(o) !== n);
    if (needsRemap) {
      for (const f of ["explanation_ja","explanation_en"]) {
        if (!q[f]) continue;
        let text = q[f];
        // Step 1: Replace all labels → placeholders
        for (let i=0; i<n; i++) {
          text = text.replaceAll(labels[i], `__LABEL${i}__`);
          text = text.replaceAll(fwLabels[i], `__FWLABEL${i}__`);
          // Also handle bare letter references like "(A)" without prefix
        }
        // Step 2: Replace placeholders → new labels
        for (let oldPos=0; oldPos<n; oldPos++) {
          const newPos = oldToNew[oldPos];
          text = text.replaceAll(`__LABEL${oldPos}__`, labels[newPos]);
          text = text.replaceAll(`__FWLABEL${oldPos}__`, fwLabels[newPos]);
        }
        q[f] = text;
      }
    }
  }
  // Rebuild audio field to match shuffled choices (Part 1/2 include choices in audio)
  if (qs.part === "part1" && qs.questions && qs.questions[0]) {
    qs.audio = qs.questions[0].choices.map((c,i)=>`(${["A","B","C","D"][i]}) ${c.replace(/^\([A-D]\)\s*/,"").replace(/\.+$/,"")}.`).join(" ... ");
  } else if (qs.part === "part2" && qs.spoken && qs.questions && qs.questions[0]) {
    qs.audio = `${qs.spoken}. ... ${qs.questions[0].choices.map((c,i)=>`(${["A","B","C"][i]}) ${c.replace(/^\([A-C]\)\s*/,"").replace(/\.+$/,"")}.`).join(" ... ")}`;
  }
  return qs;
}

async function generateQuestionSet(partOverride, options) {
  const usePart = partOverride || S.part;
  const model = PART_MODEL[usePart] || GEMINI_PRO;
  const raw = await geminiText(getPrompt(S.level, usePart, options), model);
  const parsed = parseJSON(raw);
  const result = shuffleAnswerPositions(enforceChoiceCount(normalizeSet(parsed, usePart)));
  console.log("Generated:", usePart, "audio:", !!result.audio, "translation_ja:", !!result.translation_ja, "translation_ja_1:", !!result.translation_ja_1);
  return result;
}

function openJudgeDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(JUDGE_DB, JUDGE_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("history")) {
        const store = db.createObjectStore("history", {keyPath:"id", autoIncrement:true});
        store.createIndex("part", "part", {unique:false});
        store.createIndex("timestamp", "timestamp", {unique:false});

  });

async function vocabUpdate(id, data) {
  const db = await openVocabDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("words","readwrite");

    tx.onerror = () => reject(tx.error);

// Basic English lemmatization to dictionary form
function lemmatize(w) {
  w = w.toLowerCase().trim();
  if (w.endsWith("ied") && w.length>4) return w.slice(0,-3)+"y";
  if (w.endsWith("ied")) return w.slice(0,-1);
  if (w.endsWith("ing") && w.length>5 && w[w.length-4]===w[w.length-5]) return w.slice(0,-4);
  if (w.endsWith("ting") && w.length>5) return w.slice(0,-4)+"te";
  if (w.endsWith("ing") && w.length>4) return w.slice(0,-3);
  if (w.endsWith("ed") && w.length>4 && w[w.length-3]===w[w.length-4]) return w.slice(0,-3);
  if (w.endsWith("ed") && w.length>3) return w.slice(0,-2);
  if (w.endsWith("es") && w.length>4) return w.slice(0,-2);
  if (w.endsWith("s") && !w.endsWith("ss") && w.length>3) return w.slice(0,-1);
  return w;
}
// Normalize Japanese meaning into a set of segments for comparison
function meaningSegments(m) {
  if (!m) return new Set();
  return new Set(m.trim().split(/[、,（()）)・「」【】]/).map(s=>s.trim()).filter(Boolean));
}
function jaCore(s) {
  s = s.trim().replace(/^[～〜を]/,"");
  s = s.replace(/[をにがでとのはもな]+$/, "");
  s = s.replace(/(する|して|した|している|させる|される|しない|すること|するもの)$/, "する");
  s = s.replace(/(いる|いて|いた|いない)$/, "いる");
  s = s.replace(/(れる|れて|れた)$/, "れる");
  s = s.replace(/(ある|あって|あった)$/, "ある");
  s = s.replace(/的な$/, "的");
  s = s.replace(/のある$/, "");
  return s;
}
function meaningsMatch(m1, m2) {
  if (!m1 || !m2) return false;
  if (m1.trim() === m2.trim()) return true;
  const s1 = meaningSegments(m1);
  const s2 = meaningSegments(m2);
  for (const seg of s1) if (s2.has(seg)) return true;
  const c1 = new Set([...s1].map(jaCore).filter(s=>s.length>=1));
  const c2 = new Set([...s2].map(jaCore).filter(s=>s.length>=1));
  for (const c of c1) if (c2.has(c)) return true;
  for (const a of c1) {
    for (const b of c2) {
      if (a.length >= 2 && b.length >= 2 && (a.includes(b) || b.includes(a))) return true;
    }
  }
  // Kanji root extraction + substring
  const kanjiRe = /[\u4e00-\u9fff]{2,}/g;
  const k1 = new Set([...s1].flatMap(s=>(s.match(kanjiRe)||[])));
  const k2 = new Set([...s2].flatMap(s=>(s.match(kanjiRe)||[])));
  if (k1.size > 0 && k2.size > 0) {
    for (const k of k1) if (k2.has(k)) return true;
    for (const a of k1) { for (const b of k2) { if (a.length>=2 && b.length>=2 && (a.includes(b)||b.includes(a))) return true; } }
  }
  return false;
}
// Auto-save: if ANY segment of new meaning matches existing, treat as same
// FIX: Read words once, batch updates within single transaction to avoid race conditions
async function vocabAutoSave(vocabArr, part) {
  if (!vocabArr || !vocabArr.length) return {added:0, updated:0};
  try {
    const db = await openVocabDB();
    // Read all existing words once
    const existing = await new Promise((resolve, reject) => {
      const tx = db.transaction("words", "readonly");
      const req = tx.objectStore("words").getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    // Group existing by lemmatized word for fast lookup
    const byBase = {};
    for (const w of existing) {
      const b = lemmatize(w.word);
      if (!byBase[b]) byBase[b] = w; // keep first match
    }
    // Plan changes
    const toAdd = [];
    const toUpdate = [];
    for (const v of vocabArr) {
      if (!v.word) continue;
      const baseWord = lemmatize(v.word);
      const newMeaning = (v.ja || "").trim();
      const newExample = (v.example || "").trim();
      const match = byBase[baseWord];
      if (match) {
        const meanings = (match.meaning || "").split("\n").map(s=>s.trim()).filter(Boolean);
        const hasOverlap = meanings.some(m => meaningsMatch(m, newMeaning));
        const updates = {};
        if (!hasOverlap && newMeaning) {
          updates.meaning = meanings.concat(newMeaning).join("\n");
          const examples = (match.context || "").split("\n").map(s=>s.trim()).filter(Boolean);
          updates.context = examples.concat(newExample).join("\n");
        }
        if (v.audio && !match.audio) updates.audio = v.audio;
        if (v.example_audio && !match.exampleAudio) updates.exampleAudio = v.example_audio;
        if (v.level && !match.level) updates.level = v.level;
        if (Object.keys(updates).length > 0) {
          toUpdate.push({id: match.id, updates});
          // Update local cache so subsequent vocab in same batch see updates
          Object.assign(match, updates);
        }
      } else {
        const pos = (v.pos || "other").toLowerCase();
        const newRecord = {
          word: v.word,
          meaning: newMeaning,
          context: newExample,
          part: part || "",
          pos,
          level: (v.level || "").toUpperCase(),  // A/B/C word difficulty
          audio: v.audio || "",
          exampleAudio: v.example_audio || "",
          correctCount: 0, wrongCount: 0,
          timestamp: Date.now()
        };
        toAdd.push(newRecord);
        // Add to local cache so duplicates within same batch are detected
        byBase[baseWord] = {...newRecord, id: -toAdd.length}; // placeholder id
      }
    }
    // Apply all changes in a single transaction
    if (toAdd.length || toUpdate.length) {
      await new Promise((resolve, reject) => {
        const tx = db.transaction("words", "readwrite");
        const store = tx.objectStore("words");
        for (const rec of toAdd) store.add(rec);
        for (const {id, updates} of toUpdate) {
          const req = store.get(id);
          req.onsuccess = () => {
            const r = req.result;
            if (r) { Object.assign(r, updates); store.put(r); }
          };
        }
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    return {added: toAdd.length, updated: toUpdate.length};
  } catch(e) {
    console.warn("vocabAutoSave error:", e);
    return {added:0, updated:0, error:e.message};
  }
}

// Cleanup: deduplicate existing entries by merging same base word with overlapping meanings
async function vocabDedupe() {
  const words = await vocabGetAll();
  const byBase = {};
  for (const w of words) {
    const b = lemmatize(w.word);
    if (!byBase[b]) byBase[b] = [];
    byBase[b].push(w);
  }
  let merged = 0, cleanedInternal = 0;
  for (const base in byBase) {
    const group = byBase[base];
    // Merge multiple entries with same base word
    if (group.length > 1) {
      const keep = group[0];
      const allMeanings = [];
      const allExamples = [];
      for (const g of group) {
        const ms = (g.meaning||"").split("\n").filter(Boolean);
        const es = (g.context||"").split("\n").filter(Boolean);
        ms.forEach((m,i) => {
          // Check if any existing meaning has segment overlap
          const hasOverlap = allMeanings.some(existing => meaningsMatch(existing, m));
          if (!hasOverlap) {
            allMeanings.push(m);
            allExamples.push(es[i] || "");
          }
        });
      }
      await vocabUpdate(keep.id, {meaning: allMeanings.join("\n"), context: allExamples.join("\n")});
      for (let i=1; i<group.length; i++) {
        await vocabDelete(group[i].id);
        merged++;
      }
    } else {
      // Single entry: clean internal duplicates in meaning field
      const w = group[0];
      const ms = (w.meaning||"").split("\n").filter(Boolean);
      const es = (w.context||"").split("\n").filter(Boolean);
      if (ms.length <= 1) continue;
      const keptM = [], keptE = [];
      ms.forEach((m,i) => {
        const hasOverlap = keptM.some(existing => meaningsMatch(existing, m));
        if (!hasOverlap) { keptM.push(m); keptE.push(es[i]||""); }
      });
      if (keptM.length !== ms.length) {
        await vocabUpdate(w.id, {meaning: keptM.join("\n"), context: keptE.join("\n")});
        cleanedInternal++;
      }
    }
  }
  return {merged, cleanedInternal};
}

function openStockDB() {
  return new Promise((resolve, reject) => {

async function stockSave(part, level, qSet, imgUrl) {
  // STRICT VALIDATION — reject incomplete items
  // Rule 1: Listening parts (1-4) require audio
  const isListening = part && ["part1","part2","part3","part4"].includes(part);
  const hasAudio = !!(qSet._audioOpus || qSet._audioPcm);
  if (isListening && !hasAudio) {
    console.warn(`[STOCK REJECT] ${part}: listening question without audio`);
    throw new Error(`${part} requires audio but none generated`);
  }
  // Rule 2: Part 1 requires image
  if (part === "part1" && !imgUrl) {
    console.warn(`[STOCK REJECT] part1: photograph question without image`);
    throw new Error(`part1 requires an image but none generated`);
  }
  // Rule 3: Graphic questions require table data (headers+rows).
  // Image is optional — if absent, renderGraphic() displays as HTML table.
  if (qSet && qSet.graphic) {
    const g = qSet.graphic;
    if (!g.headers || !g.rows || !g.rows.length) {
      console.warn(`[STOCK REJECT] ${part}: graphic missing headers/rows`);
      throw new Error(`${part} graphic question missing table data`);
    }
  }
  // Rule 4: questions list non-empty
  if (!qSet || !qSet.questions || qSet.questions.length === 0) {
    console.warn(`[STOCK REJECT] ${part}: no questions`);
    throw new Error(`${part} has no questions`);
  }
  const db = await openStockDB();
  const data = {
    part, level,
    qSet: JSON.parse(JSON.stringify(qSet)),  // deep clone (strip _audioUrl)
    imgUrl: imgUrl || null,
    createdAt: Date.now(),
  };
  // Audio: save Opus if available, otherwise save PCM and encode Opus in background
  let savedId = null;
  if (qSet._audioOpus) {
    data.audioOpus = qSet._audioOpus;
    data.audioFormat = "opus";
  } else if (qSet._audioPcm) {
    // Save PCM temporarily for immediate storage (fast)
    data.audioPcm = qSet._audioPcm;
    data.audioFormat = "pcm_pending";
  }
  delete data.qSet._audioUrl;
  delete data.qSet._audioPcm;
  delete data.qSet._audioOpus;
  savedId = await new Promise((resolve, reject) => {
    const tx = db.transaction("questions","readwrite");
    const store = tx.objectStore("questions");
    const req = store.add(data);
    req.onsuccess = () => resolve(req.result);
    tx.onerror = () => reject(tx.error);
  });
  // Background Opus encoding: convert PCM→Opus and update the record
  if (data.audioFormat === "pcm_pending" && data.audioPcm && savedId != null) {
    encodeOpus(data.audioPcm).then(async opus => {
      try {
        const db2 = await openStockDB();
        const tx2 = db2.transaction("questions","readwrite");
        const store2 = tx2.objectStore("questions");
        const getReq = store2.get(savedId);
        getReq.onsuccess = () => {
          const rec = getReq.result;
          if (rec) {
            rec.audioOpus = opus;
            rec.audioFormat = "opus";
            delete rec.audioPcm;
            store2.put(rec);
            console.log(`[BG OPUS] id=${savedId} encoded OK`);
          }
        };
      } catch(e) { console.warn("[BG OPUS] update failed:", e); }
    }).catch(e => console.warn("[BG OPUS] encode failed:", e));
  }
}

// Validation helper (matches stockSave rules)
// Rules:
// - Listening parts (1-4) MUST have audio
// - Part 1 MUST have image
// - Graphic questions MUST have image (maps, floor plans, etc. can't be rendered as table)
// - Graphic data (headers+rows) is also required for table display alongside image
// - questions list non-empty
function validateStockItem(item) {
  if (!item || !item.part) return {ok:false, reason:"no part"};
  const isListening = ["part1","part2","part3","part4"].includes(item.part);
  if (isListening && !item.audioOpus && !item.audioPcm) return {ok:false, reason:"listening without audio"};
  if (item.part === "part1" && !item.imgUrl) return {ok:false, reason:"part1 without image"};
  // Graphic questions: require table data (headers+rows). Image is optional.
  if (item.qSet && item.qSet.graphic) {
    const g = item.qSet.graphic;
    if (!g.headers || !g.rows || !g.rows.length) {
      return {ok:false, reason:"graphic missing headers/rows"};
    }
  }
  if (!item.qSet || !item.qSet.questions || item.qSet.questions.length === 0) return {ok:false, reason:"no questions"};
  return {ok:true};
}

  const db = await openStockDB();
  let purged = 0;
  const ids = await new Promise((resolve, reject) => {
    const tx = db.transaction("questions","readonly");
    const req = tx.objectStore("questions").openCursor();
    const badIds = [];
    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) {
        const v = cursor.value;
        // Quick validation: check field existence without full deserialization overhead
        const item = {id:v.id, part:v.part, qSet:v.qSet, imgUrl:v.imgUrl,
          audioOpus:!!v.audioOpus, audioPcm:!!v.audioPcm};  // boolean flags only
        const isListening = ["part1","part2","part3","part4"].includes(item.part);
        if (isListening && !v.audioOpus && !v.audioPcm) { badIds.push(v.id); }
        else if (item.part === "part1" && !v.imgUrl) { badIds.push(v.id); }
        else if (!v.qSet || !v.qSet.questions || v.qSet.questions.length === 0) { badIds.push(v.id); }
        cursor.continue();
      } else {
        resolve(badIds);
      }
    };
    req.onerror = () => reject(req.error);
  });
  for (const id of ids) {
    console.warn(`[PURGE] id=${id}`);
    await new Promise((resolve, reject) => {
      const tx = db.transaction("questions","readwrite");
      tx.objectStore("questions").delete(id);
      tx.oncomplete = () => { purged++; resolve(); };
      tx.onerror = () => reject(tx.error);
    });
  }
  return purged;
}

// Generic file download helper
function downloadFile(data, filename) {
  const file = new File([data], filename, {type:"application/json"});
  if (navigator.canShare && navigator.canShare({files:[file]})) {
    navigator.share({files:[file], title:filename}).catch((e)=>{
      if (e.name === "AbortError") return;
      console.warn("[DOWNLOAD] Share failed, using download:", e);
      const url = URL.createObjectURL(file);
      const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    });
    return;
  }
  const url = URL.createObjectURL(file);
  const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
}

// Per-part export (streaming: loads 100 items at a time, outputs 1 file)
// Each chunk is immediately Blob-ified so the JSON string can be GC'd
async function stockExportPart(partId, onProgress) {
  const db = await openStockDB();
  const ids = await new Promise((resolve, reject) => {
    const arr = [];
    const tx = db.transaction("questions","readonly");
    const req = tx.objectStore("questions").openCursor();
    req.onsuccess = (e) => {
      const c = e.target.result;
      if (c) { if (c.value.part === partId) arr.push(c.value.id); c.continue(); }
      else resolve(arr);
    };
    req.onerror = () => reject(req.error);
  });
  if (ids.length === 0) { alert(`${partId} のストックがありません`); return null; }

  // Build Blob from sub-Blobs: each chunk's string → Blob → GC-eligible
  const CHUNK = 100;
  const blobChunks = [new Blob(["["])];
  let totalSize = 2; // [ and ]
  const totalPasses = Math.ceil(ids.length / CHUNK);

  for (let ci = 0; ci < totalPasses; ci++) {
    const chunkIds = ids.slice(ci * CHUNK, (ci + 1) * CHUNK);
    const items = [];
    for (const id of chunkIds) {
      const item = await stockGetById(id);
      if (item) items.push(item);
    }
    const json = JSON.stringify(items);
    const inner = json.slice(1, -1); // strip [ ]
    if (ci > 0) blobChunks.push(new Blob([","]));
    blobChunks.push(new Blob([inner])); // inner string becomes GC-eligible after this
    totalSize += inner.length + (ci > 0 ? 1 : 0);
    if (onProgress) onProgress(ci + 1, totalPasses);
  }
  blobChunks.push(new Blob(["]"]));

  const blob = new Blob(blobChunks, {type: "application/json"});
  const d = new Date().toISOString().slice(0,10);
  const filename = `toeic-stock-${partId}-${d}.json`;
  const file = new File([blob], filename, {type: "application/json"});

  if (navigator.canShare && navigator.canShare({files:[file]})) {
    try { await navigator.share({files:[file], title:filename}); }
    catch(e) {
      if (e.name === "AbortError") return {count: ids.length, sizeMB: (totalSize / 1024 / 1024).toFixed(1)};
      // Share failed (file too large?) — fallback to download
      console.warn("[EXPORT] Share failed, falling back to download:", e);
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    }
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
  }
  return {count: ids.length, sizeMB: (totalSize / 1024 / 1024).toFixed(1)};
}

// Smart import: detect file type and import accordingly
// Stock files use streaming parser to avoid OOM on large files
async function dataImportSmart(file, onProgress) {
  // Peek at first bytes to detect type without loading entire file
  const peekSlice = file.slice(0, 512);
  const peek = await peekSlice.text();
  const trimmed = peek.trim();

  // Vocab file: {"type":"vocab",...} — small, parse normally
  if (trimmed.startsWith('{"type":"vocab"') || trimmed.startsWith('{"type": "vocab"')) {
    const text = await file.text();
    const parsed = JSON.parse(text);
    const db = await openVocabDB();
    let added = 0;
    for (const w of (parsed.data||[])) {
      await new Promise((resolve) => {
        const tx = db.transaction("words","readwrite");
        const entry = {...w}; delete entry.id;
        tx.objectStore("words").add(entry);
        tx.oncomplete = () => { added++; resolve(); };
        tx.onerror = () => resolve();
      });
    }
    return {type:"vocab", count: added, total: (parsed.data||[]).length};
  }

  // Judge file: {"type":"judge",...} — small, parse normally
  if (trimmed.startsWith('{"type":"judge"') || trimmed.startsWith('{"type": "judge"')) {
    const text = await file.text();
    const parsed = JSON.parse(text);
    const db = await openJudgeDB();
    let added = 0;
    for (const h of (parsed.data||[])) {
      await new Promise((resolve) => {
        const tx = db.transaction("history","readwrite");
        const entry = {...h}; delete entry.id;
        tx.objectStore("history").add(entry);
        tx.oncomplete = () => { added++; resolve(); };
        tx.onerror = () => resolve();
      });
    }
    return {type:"judge", count: added, total: (parsed.data||[]).length};
  }

  // Stock file: [...] — use classic parser
  if (trimmed.startsWith("[")) {
    const r = await stockImportClassic(file);
    return {type:"stock", ...r};
  }

  throw new Error("不明なファイル形式です");
}

// Streaming stock import: parse one JSON object at a time from a file stream
// Never holds entire file in memory — only current object + DB write buffer
async function stockImportStream(file, onProgress) {
  const db = await openStockDB();
  const existing = await new Promise((resolve, reject) => {
    const set = new Set();
    const tx = db.transaction("questions","readonly");
    const req = tx.objectStore("questions").openCursor();
    req.onsuccess = (e) => {
      const c = e.target.result;
      if (c) { set.add(c.value.createdAt); c.continue(); }
      else resolve(set);
    };
    req.onerror = () => reject(req.error);
  });

  const vocabBefore = (await vocabGetAll()).length;
  let count = 0, skipped = 0, withVocab = 0, vocabTotal = 0;
  let bytesRead = 0;

  // Stream reader
  const reader = file.stream().pipeThrough(new TextDecoderStream()).getReader();
  let buffer = "";
  let depth = 0;
  let inString = false;
  let escape = false;
  let objStart = -1;
  let scanPos = 0; // Track where we last scanned to — never re-scan leftover

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buffer += value;
    bytesRead += value.length;

    // Scan from where we left off (not from 0 — avoids re-scanning leftover)
    let lastObjEnd = -1;
    while (scanPos < buffer.length) {
      const ch = buffer[scanPos];
      if (escape) { escape = false; scanPos++; continue; }
      if (ch === "\\" && inString) { escape = true; scanPos++; continue; }
      if (ch === '"') { inString = !inString; scanPos++; continue; }
      if (inString) { scanPos++; continue; }
      if (ch === "{") {
        if (depth === 0) objStart = scanPos;
        depth++;
      } else if (ch === "}") {
        depth--;
        if (depth === 0 && objStart >= 0) {
          const objStr = buffer.slice(objStart, scanPos + 1);
          lastObjEnd = scanPos + 1;
          try {
            const item = JSON.parse(objStr);
            if (item.part && item.qSet) {
              const ts = item.createdAt || Date.now();
              if (existing.has(ts)) { skipped++; }
              else {
                existing.add(ts);
                const data = {part:item.part, level:item.level, qSet:item.qSet, imgUrl:item.imgUrl||null, createdAt:ts};
                if (item.audioOpus) { data.audioOpus = item.audioOpus; data.audioFormat = "opus"; }
                else if (item.audioPcm) { data.audioPcm = item.audioPcm; data.audioFormat = "pcm_pending"; }
                await new Promise((resolve, reject) => {
                  const tx = db.transaction("questions","readwrite");
                  tx.objectStore("questions").add(data);
                  tx.oncomplete = () => { count++; resolve(); };
                  tx.onerror = () => reject(tx.error);
                });
                const vocab = item.qSet.vocab;
                if (vocab && Array.isArray(vocab) && vocab.length > 0) {
                  withVocab++;
                  vocabTotal += vocab.length;
                  await vocabAutoSave(vocab, item.part).catch(()=>{});
                }
              }
            }
          } catch(e) { console.warn("[STREAM IMPORT] parse error:", e); }
          objStart = -1;
        }
      }
      scanPos++;
    }
    // Trim processed portion from buffer, adjust positions
    if (lastObjEnd > 0) {
      buffer = buffer.slice(lastObjEnd);
      scanPos -= lastObjEnd;
      objStart = objStart >= 0 ? objStart - lastObjEnd : -1;
    }
    if (onProgress) onProgress(bytesRead, file.size);
  }

  const vocabAfter = (await vocabGetAll()).length;
  const vocabAdded = vocabAfter - vocabBefore;
  return {count, skipped, vocabAdded, withVocab, vocabTotal};
}

// Classic import: loads entire file into memory (works on all browsers)
async function stockImportClassic(file) {
  const text = await file.text();
  const items = JSON.parse(text);
  if (!Array.isArray(items)) throw new Error("無効なファイル形式");
  const db = await openStockDB();
  const existing = await new Promise((resolve, reject) => {
    const set = new Set();
    const tx = db.transaction("questions","readonly");
    const req = tx.objectStore("questions").openCursor();
    req.onsuccess = (e) => {
      const c = e.target.result;
      if (c) { set.add(c.value.createdAt); c.continue(); }
      else resolve(set);
    };
    req.onerror = () => reject(req.error);
  });
  let count = 0, skipped = 0, vocabAdded = 0, vocabTotal = 0, withVocab = 0;
  const vocabBefore = (await vocabGetAll()).length;
  for (const item of items) {
    if (!item.part || !item.qSet) continue;
    const ts = item.createdAt || Date.now();
    if (existing.has(ts)) { skipped++; continue; }
    existing.add(ts);
    const data = {part:item.part, level:item.level, qSet:item.qSet, imgUrl:item.imgUrl||null, createdAt:ts};
    if (item.audioOpus) { data.audioOpus = item.audioOpus; data.audioFormat = "opus"; }
    else if (item.audioPcm) { data.audioPcm = item.audioPcm; data.audioFormat = "pcm_pending"; }
    await new Promise((resolve, reject) => {
      const tx = db.transaction("questions","readwrite");
      tx.objectStore("questions").add(data);
      tx.oncomplete = () => { count++; resolve(); };
      tx.onerror = () => reject(tx.error);
    });
    const vocab = item.qSet.vocab;
    if (vocab && Array.isArray(vocab) && vocab.length > 0) {
      withVocab++;
      vocabTotal += vocab.length;
      await vocabAutoSave(vocab, item.part).catch(()=>{});
    }
  }
  const vocabAfter = (await vocabGetAll()).length;
  vocabAdded = vocabAfter - vocabBefore;
  return {count, skipped, vocabAdded, withVocab, vocabTotal};
}

function pickVoice(gender="any") {
  const pool = gender==="female" ? TTS_FEMALE : gender==="male" ? TTS_MALE : [...TTS_FEMALE,...TTS_MALE];
  return pool[Math.floor(Math.random()*pool.length)];
}

function pcmToUrl(b64, rate) {
  const raw = atob(b64), bytes = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  const sr=rate||24000,ch=1,bps=16,hdr=new ArrayBuffer(44),v=new DataView(hdr);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,"RIFF"); v.setUint32(4,36+bytes.length,true); ws(8,"WAVE"); ws(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,ch,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*ch*bps/8,true);
  v.setUint16(32,ch*bps/8,true); v.setUint16(34,bps,true); ws(36,"data"); v.setUint32(40,bytes.length,true);
  const wav=new Uint8Array(44+bytes.length); wav.set(new Uint8Array(hdr)); wav.set(bytes,44);
  return URL.createObjectURL(new Blob([wav],{type:"audio/wav"}));
}

// Opus/WebMエンコード（PCM base64 → Opus base64）バックグラウンド実行
async function encodeOpus(b64pcm, srcRate=24000) {
  const raw=atob(b64pcm), numSamples=raw.length/2;
  const f32=new Float32Array(numSamples);
  for(let i=0;i<numSamples;i++){
    const lo=raw.charCodeAt(i*2), hi=raw.charCodeAt(i*2+1);
    let v=lo|(hi<<8); if(v>=0x8000)v-=0x10000; f32[i]=v/32768;
  }
  const ctx=new AudioContext({sampleRate:srcRate});
  const buf=ctx.createBuffer(1,numSamples,srcRate);
  buf.getChannelData(0).set(f32);
  const dest=ctx.createMediaStreamDestination();
  const src=ctx.createBufferSource();
  src.buffer=buf; src.connect(dest);
  const recorder=new MediaRecorder(dest.stream,{mimeType:"audio/webm;codecs=opus",audioBitsPerSecond:24000});
  const chunks=[];
  recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  return new Promise((resolve,reject)=>{
    recorder.onstop=async()=>{
      await ctx.close();
      const blob=new Blob(chunks,{type:"audio/webm;codecs=opus"});
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result.split(",")[1]);
      reader.onerror=reject;
      reader.readAsDataURL(blob);
    };
    src.onended=()=>setTimeout(()=>recorder.stop(),100);
    recorder.start(); src.start();
  });
}


// Get playable URL from stock item (Opus preferred, PCM fallback)
function stockAudioUrl(item) {
  if (item.audioOpus) return opusToUrl(item.audioOpus);
  if (item.audioPcm) return pcmToUrl(item.audioPcm);
  return null;
}
// Opus base64 → 再生用URL
function opusToUrl(b64) {
  const raw=atob(b64), bytes=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  return URL.createObjectURL(new Blob([bytes],{type:"audio/webm;codecs=opus"}));
}

async function callTTS(text, config, signal=null) {
  const body = JSON.stringify({contents:[{parts:[{text:text.slice(0,TTS_MAX)}]}],generationConfig:{responseModalities:["AUDIO"],speechConfig:config}});
  for (const model of [GEMINI_TTS_MODEL, GEMINI_TTS_MODEL_2]) {
    try {
      if (signal?.aborted) throw new DOMException("Aborted","AbortError");
      const res = await throttledFetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${S.apiKey}`,
        { method:"POST", headers:{"Content-Type":"application/json"}, body },
        2, signal
      );
      if (!res.ok) {
        const errBody = await res.text();
        console.warn(`TTS ${model} error ${res.status}:`, errBody.slice(0,100));
        continue;
      }
      const d = await res.json();
      const pcm = d.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
      if (!pcm) { console.warn(`TTS ${model}: no audio data`); continue; }
      return pcm;
    } catch(e) {
      if (e.name === "AbortError") throw e;  // propagate abort
      console.warn(`TTS ${model} failed:`, e.message);
      continue;
    }
  }
  throw new Error("TTS: both models failed");
}

/* ── Dispatch ── */
async function speak(text, onEnd) {
  await speakGemini(text, onEnd);
}
let _curAudio=null;
const _ttsCache=new Map();
let _seqId=0;

async function speakGemini(text, onEnd, {signal}={}) {
  stopSpeak();
  try {
    let url=_ttsCache.get(text);
    if (!url) {
      const pcm=await callTTS(text,{voiceConfig:{prebuiltVoiceConfig:{voiceName:pickVoice()}}}, signal);
      url=pcmToUrl(pcm);
      if(_ttsCache.size>=TTS_CACHE_SIZE){const k=_ttsCache.keys().next().value;URL.revokeObjectURL(_ttsCache.get(k));_ttsCache.delete(k);}
      _ttsCache.set(text,url);
      if(S.qSet&&!S.qSet._audioPcm){S.qSet._audioPcm=pcm;S.qSet._audioUrl=url;if(S.stockMode&&S.stockId)stockUpdateAudio(S.stockId,pcm).catch(e=>console.warn('stock audio update failed:', e));
        encodeOpus(pcm).then(opus=>{if(S.qSet)S.qSet._audioOpus=opus;}).catch(e=>console.warn('opus encode failed:', e));
      }
    }
    const a=new Audio(url); _curAudio=a;
    a.onended=()=>{_curAudio=null;onEnd&&onEnd();};
    a.onerror=()=>{_curAudio=null;onEnd&&onEnd();};
    await a.play();
  } catch(e) {
    console.error("TTS failed:", e.message);
    if(onEnd)onEnd("⚠️ 音声生成に失敗: " + e.message);
  }
}

/* ── Gemini TTS (multi-speaker for conversations) ── */
async function speakConv(text, onEnd, speakers, {signal}={}) {
  stopSpeak();
  try {
    const key="conv:"+text;
    let url=_ttsCache.get(key);
    if (!url) {
      // Build speaker configs: ensure 1 male + 1 female (Gemini TTS max 2 configs)
      const spkNames = speakers || ["Man","Woman"];
      const maleVoice = pickVoice("male");
      const femaleVoice = pickVoice("female");
      const males = spkNames.filter(s => !/woman|female/i.test(s));
      const females = spkNames.filter(s => /woman|female/i.test(s));
      const voiceConfigs = [];
      if (males.length > 0) voiceConfigs.push({speaker:males[0], voiceConfig:{prebuiltVoiceConfig:{voiceName:maleVoice}}});
      if (females.length > 0) voiceConfigs.push({speaker:females[0], voiceConfig:{prebuiltVoiceConfig:{voiceName:femaleVoice}}});
      const res=await throttledFetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TTS_MODEL}:generateContent?key=${S.apiKey}`,
        {method:"POST",headers:{"Content-Type":"application/json"},
         body:JSON.stringify({contents:[{parts:[{text:text.slice(0,TTS_MAX)}]}],
           generationConfig:{responseModalities:["AUDIO"],speechConfig:{
             multiSpeakerVoiceConfig:{speakerVoiceConfigs:voiceConfigs}
           }}})},
        3, signal
      );
      if (!res.ok) { return speakGemini(text.replace(/(?:Man\s*\d?|Woman\s*\d?|Speaker\s*\d?):\s*/gi,""), onEnd, {signal}); }
      const d=await res.json();
      const pcm=d.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
      if (!pcm) { return speakGemini(text.replace(/(?:Man\s*\d?|Woman\s*\d?|Speaker\s*\d?):\s*/gi,""), onEnd, {signal}); }
      url=pcmToUrl(pcm);
      if(_ttsCache.size>=TTS_CACHE_SIZE){const k=_ttsCache.keys().next().value;URL.revokeObjectURL(_ttsCache.get(k));_ttsCache.delete(k);}
      _ttsCache.set(key,url);
      if(S.qSet&&!S.qSet._audioPcm){S.qSet._audioPcm=pcm;S.qSet._audioUrl=url;if(S.stockMode&&S.stockId)stockUpdateAudio(S.stockId,pcm).catch(e=>console.warn('stock audio update failed:', e));
        encodeOpus(pcm).then(opus=>{if(S.qSet)S.qSet._audioOpus=opus;}).catch(e=>console.warn('opus encode failed:', e));
      }
    }
    const a=new Audio(url); _curAudio=a;
    a.onended=()=>{_curAudio=null;onEnd&&onEnd();};
    a.onerror=()=>{_curAudio=null;onEnd&&onEnd();};
    await a.play();
  } catch(e) {
    if (e.name === "AbortError") { if(onEnd)onEnd("aborted"); return; }
    console.warn("Multi-speaker TTS failed, trying single voice");
    try { return await speakGemini(text.replace(/(?:Man\s*\d?|Woman\s*\d?|Speaker\s*\d?):\s*/gi,""), onEnd, {signal}); }
    catch(e2) { console.error("TTS failed:", e2.message); if(onEnd)onEnd("⚠️ 音声生成に失敗: " + e2.message); }
  }
}

/* ── Sequential playback ── */
async function playSeq(urls, onEnd) {
  const myId=++_seqId;
  for (const url of urls.filter(Boolean)) {
    if (_seqId!==myId) break;
    await new Promise(r=>{
      const a=new Audio(url); _curAudio=a;
      a.onended=()=>{if(_curAudio===a)_curAudio=null;r();};
      a.onerror=()=>{if(_curAudio===a)_curAudio=null;r();};
      a.play().catch(()=>{if(_curAudio===a)_curAudio=null;r();});
    });
  }
  if (_seqId===myId) onEnd&&onEnd();
}

function stopSpeak() {
  ++_seqId;
  if (_curAudio) { _curAudio.onended=null;_curAudio.onerror=null;_curAudio.pause();_curAudio.src="";_curAudio=null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
}

/* ── Audio button state helper ── */
function setAudioBtn(btn, st, err) {
  if (!btn) return;
  btn.disabled=(st==="loading");
  if      (st==="loading") { btn.classList.add("pl");    btn.textContent="🔄 音声を生成中..."; }
  else if (st==="playing") { btn.classList.add("pl");    btn.textContent="⏹ 停止"; }
  else if (st==="error")   { btn.classList.remove("pl"); btn.textContent=`⚠️ ${err||"エラー"}`; }
  else                     { btn.classList.remove("pl"); btn.disabled=false; btn.textContent=btn.dataset.label||"🔊 再生"; }
}

/* ──────────────────────────────────────────────
   AUDIO PRE-GENERATION（順次実行キュー）
   並列リクエストによるレート制限を防止
────────────────────────────────────────────── */
// 音声はオンデマンド生成のみ（再生ボタン押下時）
async function preGenAudio(qs) {
  const part=qs.part;
  if (!["part1","part2","part3","part4"].includes(part)) return;
  const audio = qs.audio || "";
  if (!audio) return;
  try {
    if (part==="part3") {
      const convText = audio.slice(0, TTS_MAX);
      const spkNames = qs.speakers || ["Man","Woman"];
      const uniqueSpeakers = [...new Set(spkNames)];

      if (uniqueSpeakers.length <= 2) {
        // ── 2人会話: multi-speaker API (1リクエスト) ──
        const maleVoice = pickVoice("male");
        const femaleVoice = pickVoice("female");
        const males = uniqueSpeakers.filter(s => !/woman|female/i.test(s));
        const females = uniqueSpeakers.filter(s => /woman|female/i.test(s));
        const voiceConfigs = [];
        if (males.length > 0) voiceConfigs.push({speaker:males[0], voiceConfig:{prebuiltVoiceConfig:{voiceName:maleVoice}}});
        if (females.length > 0) voiceConfigs.push({speaker:females[0], voiceConfig:{prebuiltVoiceConfig:{voiceName:femaleVoice}}});
        try {
          const res=await throttledFetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TTS_MODEL}:generateContent?key=${S.apiKey}`,
            {method:"POST",headers:{"Content-Type":"application/json"},
             body:JSON.stringify({contents:[{parts:[{text:convText}]}],
               generationConfig:{responseModalities:["AUDIO"],speechConfig:{
                 multiSpeakerVoiceConfig:{speakerVoiceConfigs:voiceConfigs}
               }}})},
            3
          );
          if (res.ok) {
            const d=await res.json();
            const pcm=d.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            if (pcm) { qs._audioPcm=pcm; qs._audioUrl=pcmToUrl(pcm); return; }
          }
        } catch(e) { console.warn("multi-speaker TTS failed:", e.message); }
      } else {
        // ── 3人以上: 行ごとにTTS生成 → PCM結合 ──
        console.log(`[TTS] 3-speaker mode: ${uniqueSpeakers.join(", ")}`);
        // Assign distinct voices to each speaker
        const voiceMap = {};
        const malePool = [...TTS_MALE].sort(()=>Math.random()-0.5);
        const femalePool = [...TTS_FEMALE].sort(()=>Math.random()-0.5);
        let mi=0, fi=0;
        for (const spk of uniqueSpeakers) {
          if (/woman|female/i.test(spk)) { voiceMap[spk] = femalePool[fi++ % femalePool.length]; }
          else { voiceMap[spk] = malePool[mi++ % malePool.length]; }
        }
        console.log("[TTS] Voice map:", JSON.stringify(voiceMap));

        // Parse conversation lines
        const lines = convText.split(/\n/).map(l=>l.trim()).filter(Boolean);
        const parsed = [];
        for (const line of lines) {
          const m = line.match(/^((?:Man|Woman|Speaker)\s*\d?\s*\d?):\s*(.+)/i);
          if (m) { parsed.push({speaker:m[1].trim(), text:m[2]}); }
          else if (parsed.length) { parsed[parsed.length-1].text += " " + line; }
        }
        if (!parsed.length) { parsed.push({speaker:"Narrator", text:convText}); }

        // Generate TTS per line + silence gap (0.3s = 7200 samples)
        const SILENCE_SAMPLES = 7200; // 24000Hz * 0.3s
        const silenceBytes = new Uint8Array(SILENCE_SAMPLES * 2); // 16-bit = 2 bytes/sample
        const pcmChunks = [];
        let okCount = 0;
        for (const {speaker, text} of parsed) {
          const voice = voiceMap[speaker] || pickVoice();
          try {
            const pcm = await callTTS(text, {voiceConfig:{prebuiltVoiceConfig:{voiceName:voice}}});
            const raw = atob(pcm);
            const bytes = new Uint8Array(raw.length);
            for (let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
            pcmChunks.push(bytes);
            pcmChunks.push(silenceBytes);
            okCount++;
          } catch(e) {
            console.warn(`[TTS] Line failed (${speaker}): ${e.message}`);
          }
        }
        if (okCount > 0) {
          // Concatenate all PCM chunks
          const totalLen = pcmChunks.reduce((s,c) => s + c.length, 0);
          const merged = new Uint8Array(totalLen);
          let offset = 0;
          for (const chunk of pcmChunks) { merged.set(chunk, offset); offset += chunk.length; }
          // Base64 encode
          let b64 = "";
          const CHUNK = 8192;
          for (let i=0; i<merged.length; i+=CHUNK) {
            b64 += String.fromCharCode.apply(null, merged.subarray(i, Math.min(i+CHUNK, merged.length)));
          }
          qs._audioPcm = btoa(b64);
          qs._audioUrl = pcmToUrl(qs._audioPcm);
          console.log(`[TTS] 3-speaker: ${okCount}/${parsed.length} lines OK, ${(totalLen/1024).toFixed(0)}KB`);
          return;
        }
      }
      // Final fallback: single voice
      const pcm=await callTTS(convText.replace(/(?:Man\s*\d?|Woman\s*\d?|Speaker\s*\d?):\s*/gi,""),{voiceConfig:{prebuiltVoiceConfig:{voiceName:pickVoice()}}});
      qs._audioPcm=pcm; qs._audioUrl=pcmToUrl(pcm);
    } else {
      const pcm=await callTTS(audio.slice(0,TTS_MAX),{voiceConfig:{prebuiltVoiceConfig:{voiceName:pickVoice()}}});
      qs._audioPcm=pcm; qs._audioUrl=pcmToUrl(pcm);
    }
  } catch(e) { console.error("preGenAudio:",e.message); }
  // 音声準備完了 → 再生ボタンに✓を表示
  if (qs._audioUrl) {
    const pa=document.getElementById("playAudio");
    if (pa && pa.dataset.label && !pa.classList.contains("pl")) {
      pa.dataset.label="🔊 音声を再生 ✓";
      pa.textContent="🔊 音声を再生 ✓";
    }
  }
}

/* ──────────────────────────────────────────────
   SESSION MANAGEMENT (1問先読み)
────────────────────────────────────────────── */
let _nextQ = null;       // 先読み済みの次の問題
let _prefetching = false; // 先読み中フラグ

/* ──────────────────────────────────────────────
   LOAD NEW QUESTION SET (1問ずつ生成)
────────────────────────────────────────────── */
// 1問分を生成（テキスト＋画像のみ。音声は再生時にオンデマンド）
async function generateOneQuestion(sessionIdx, {skipTTS=false}={}) {
  const partKey = S.part === "part7" ? (["part7s","part7d","part7t"][Math.floor(Math.random()*3)]) : S.part;
  const usePartOverride = (S.part==="part3" && sessionIdx===2) ? "part3_3p" : (S.part==="part7" ? partKey : null);
  const typePool = _sessionTypes[partKey] || _sessionTypes[S.part] || [];
  const typeObj = typePool[sessionIdx] || undefined;

  const qs = await generateQuestionSet(usePartOverride, typeObj);

  // Pre-generate audio for Listening parts — but NOT during prefetch (saves API calls)
  const isListening = ["part1","part2","part3","part4"].includes(S.part);
  if (isListening && qs.audio && !skipTTS) {
    try {
      await preGenAudio(qs);
    } catch(e) {
      console.warn("preGenAudio failed:", e.message);
    }
  }

  let imgUrl=null, imgErr=null;
  if (S.part==="part1" && qs.scene) {
    // Part 1 photograph
    try { imgUrl = await generateImage(qs.scene); }
    catch(e) { imgErr = e.message; }
  } else if (qs.graphic) {
    // Graphic question (Part 3/4/7) — maps, floor plans, charts need actual images
    const desc = buildGraphicDesc(qs);
    if (desc) {
      try { imgUrl = await generateImage(desc, {isGraphic: true}); }
      catch(e) { imgErr = e.message; }
    }
  }
  return {qs, imgUrl, imgErr};
}

// バックグラウンドで次の1問を先読み（3秒後に開始して現在のリクエストと被らない）
function prefetchNext() {
  if (_prefetching || _nextQ) return;
  if (S.sessionNum >= SESSION_SIZE) return;
  setTimeout(() => {
    if (_prefetching || _nextQ || S.sessionNum >= SESSION_SIZE) return;
    _prefetching = true;
    generateOneQuestion(S.sessionNum, {skipTTS:true}).then(result => {
      _nextQ = result;
      _prefetching = false;
      const nb = document.getElementById("nextSetBtn");
      if (nb) nb.textContent = `次の問題 (${S.sessionNum+1}/${SESSION_SIZE}) →`;
    }).catch(e => {
      console.error("prefetch:", e.message);
      _prefetching = false;
    });
  }, 2000);
}

async function loadNewSet() {
  stopSpeak();
  S.answers=[]; S.qIdx=0; S.error=null; S.sceneImgUrl=null; S.imageError=null;

  // ストック作成モードはセッション制限なし
  if (S.stockCreateMode && S.sessionNum >= SESSION_SIZE) {
    S.sessionNum = 0;
    shuffleSessionTypes();
  }

  // 先読み済みがあれば即表示（先読み中でも待たない）
  if (_nextQ) {
    const cached = _nextQ;
    _nextQ = null;
    S.qSet = cached.qs;
    S.sceneImgUrl = cached.imgUrl || null;
    S.imageError = cached.imgErr || null;
    S.answers = S.qSet.questions.map(() => ({selected:null, answered:false}));
    S.sessionNum++;
    S.loading = false;
    render();
    prefetchNext();
    triggerAutoStock();
    S.timerStart=["part1","part2","part3","part4"].includes(S.part)?0:Date.now();
    S.timerFrozen=0;
    return;
  }

  // 先読みがなければローディング表示して生成
  S.loading=true; S.qSet=null;
  S.loadMsg=`問題を生成中... (${S.sessionNum+1}/${SESSION_SIZE})`;
  render();

  try {
    const result = await generateOneQuestion(S.sessionNum);
    S.qSet = result.qs;
    S.sceneImgUrl = result.imgUrl || null;
    S.imageError = result.imgErr || null;
    S.answers = S.qSet.questions.map(() => ({selected:null, answered:false}));
    S.sessionNum++;
  } catch(e) {
    if (S.stockCreateMode) {
      // ストック作成モード: 3秒後に自動リトライ
      S.loadMsg=`⚠️ 生成失敗…3秒後にリトライ`;
      render();
      await new Promise(r => setTimeout(r, API_RETRY_DELAY_MS));
      S.error=null; loadNewSet(); return;
    }
    S.error = `問題の生成に失敗しました:\n${e.message}`;
  }

  S.loading=false;
  S.timerStart=["part1","part2","part3","part4"].includes(S.part)?0:Date.now();
  S.timerFrozen=0;
  render();
  prefetchNext();
  triggerAutoStock(); // ストック作成モード: 自動フロー開始
}

// ストック作成モード: 自動フロー開始トリガー
function triggerAutoStock() {
  if (!S.stockCreateMode || !S.qSet) return;
  const isL = ["part1","part2","part3","part4"].includes(S.part);
  if (isL) {
    const qs = S.qSet;
    // Stock creation mode: skip full playback — just verify audio exists and save
    if (qs._audioOpus || qs._audioPcm || qs._audioUrl) {
      // Audio exists — save immediately (Opus encoding happens in background via stockSave)
      autoStockAndNext();
      return;
    }
    // No stored audio — try live TTS to generate (not play, just capture)
    if (qs.audio) {
      const isConv = S.part==="part3";
      // For stock creation, use preGenAudio-style generation instead of playback
      (async () => {
        try {
          await preGenAudio(qs);
          if (qs._audioPcm || qs._audioUrl) {
            autoStockAndNext();
          } else {
            console.warn(`[STOCK SKIP] ${S.part}: TTS generated no audio`);
            setTimeout(()=>{ if(S.stockCreateMode) loadNewSet(); }, 1000);
          }
        } catch(e) {
          console.warn(`[STOCK SKIP] ${S.part}: TTS failed: ${e.message}`);
          setTimeout(()=>{ if(S.stockCreateMode) loadNewSet(); }, 1000);
        }
      })();
    } else {
      console.warn(`[STOCK SKIP] ${S.part}: no audio field`);
      setTimeout(()=>{ if(S.stockCreateMode) loadNewSet(); }, 1000);
    }
  } else {
    // Readingパート: 即座に自動ストック（プレビュー不要）
    setTimeout(()=>{
      if (S.stockCreateMode && !S.stockCreatePaused) autoStockAndNext();
    }, 500);
  }
}

// ストック作成: 自動保存して次へ
async function autoStockAndNext() {
  if (!S.stockCreateMode || S.stockCreatePaused || !S.qSet) return;
  let saved = false;
  try {
    await stockSave(S.part, S.level, S.qSet, S.sceneImgUrl);
    saved = true;
    // Auto-save vocab from this question set
    if (S.qSet.vocab && S.qSet.vocab.length) {
      await vocabAutoSave(S.qSet.vocab, S.part).catch(e=>console.warn('vocab auto-save failed:', e));
    }
    S.stockCreateCount = (S.stockCreateCount||0) + 1;
  } catch(e) {
    // Listening audio missing = expected skip, not an error
    if (e.message && e.message.includes("requires audio")) {
      console.warn(`[SKIP] ${S.part}: no audio generated, retrying with new question`);
    } else {
      console.error("auto-stock error:", e);
    }
  }
  // 目標達成チェック
  if (S.stockCreateCount >= S.stockCreateTarget) {
    stopSpeak(); S.stockCreateMode=false; S.graphicMode=false; S.screen="home";
    alert(`✅ ${S.stockCreateCount}問ストックしました！`);
    render(); return;
  }
  render(); // 進捗更新
  setTimeout(()=>{
    if(!S.stockCreateMode) return;
    // Graphic mode: cycle through graphic types, changing part
    if (S.graphicMode && S.graphicPool && S.graphicPool.length) {
      const gt = S.graphicPool[S.stockCreateCount % S.graphicPool.length];
      S.part = gt._gPart;
      // Override session type to this graphic type
      _sessionTypes[S.part] = [gt];
      S.sessionNum = 0;
    }
    loadNewSet();
  }, 500);
}

function handleAnswer(idx) {
  stopSpeak();
  const qi=S.qIdx, q=S.qSet.questions[qi];
  S.answers[qi]={selected:idx, answered:true};
  const isCorrect = idx===q.correct;
  if (isCorrect) { S.stats.correct++; S.streak++; }
  else           { S.stats.wrong++;   S.streak=0;  }
  // タイマー: 経過時間を記録、最終設問でのみ停止
  const elapsed=S.timerStart?Math.round((Date.now()-S.timerStart)/1000):0;
  const isLastQ=S.qIdx>=S.qSet.questions.length-1;
  if(isLastQ) {
    S.timerFrozen=elapsed;
    S.timerStart=0; // 最終設問 → 停止
  }
  // （途中の設問ではタイマー継続）
  // 判定モードON → 記録 + 不正解は自動ストック
  if (S.judgeMode && !S.stockCreateMode) {
    // Determine question type from multiple sources
    let qType = "unknown";
    // 1. Fresh generation: _sessionTypes has the type
    const typePool = _sessionTypes[S.part] || [];
    const typeObj = typePool[S.sessionNum-1] || {};
    if (typeObj.type) { qType = typeObj.type; }
    // 2. Stock item: extract type from explanation_ja (pattern: 出題: xxx or 出題タイプ: xxx)
    if (qType === "unknown" && q.explanation_ja) {
      const m = q.explanation_ja.match(/出題[タイプ]*[:：]\s*([a-z0-9_]+)/);
      if (m) qType = m[1];
    }
    // 3. Stock item: try qSet-level type fields (talk_type for Part4, doc_type for Part6/7, _questionType for new)
    if (qType === "unknown" && S.qSet) {
      qType = S.qSet._questionType || S.qSet.talk_type || S.qSet.doc_type || S.qSet.doc_type_1 || "unknown";
    }
    // 4. Part 5: infer type from choices structure
    if (qType === "unknown" && S.part === "part5" && q.choices) {
      const ch = q.choices.map(c=>c.replace(/^\([A-D]\)\s*/,"").toLowerCase());
      const preps = ["in","on","at","by","for","to","with","from","of","about","during","since","until","between","among","through","within","toward"];
      const conjs = ["although","because","however","therefore","unless","whereas","while","despite","moreover","furthermore","nevertheless","since","though","if"];
      if (ch.every(c=>preps.includes(c.trim()))) qType = "preposition_basic";
      else if (ch.some(c=>conjs.includes(c.trim()))) qType = "conjunction_contrast";
      else {
        // Check word form: do choices share a root (first 4 letters)?
        const roots = ch.map(c=>c.replace(/[^a-z]/g,"").slice(0,4));
        if (roots[0].length >= 4 && roots.filter(r=>r===roots[0]).length >= 3) qType = "word_form";
        else qType = "vocab_context";
      }
    }
    // 5. Part 3: infer scenario from conversation keywords
    if (qType === "unknown" && S.part === "part3" && S.qSet) {
      const conv = (S.qSet.conversation||"").toLowerCase();
      const kw = [
        ["printer|copier|computer|server|network","office_equipment"],["schedule|reschedule|postpone|cancel the meeting","schedule_change"],
        ["project|deadline|milestone|progress","project_discussion"],["hotel|check.in|check.out|room","hotel_checkin"],
        ["restaurant|reserv|table for|menu","restaurant_order"],["flight|airport|boarding|luggage","airport_travel"],
        ["repair|fix|broken|maintenance","repair_maintenance"],["interview|candidate|hiring|resume","hiring_interview"],
        ["train|workshop|certification|seminar","training_workshop"],["client|contract|proposal|negotiate","client_negotiation"],
        ["complaint|refund|dissatisfied|apologize","complaint_resolution"],["new employee|orientation|first day","new_employee"],
        ["transfer|promotion|department|position","promotion_transfer"],["event|conference|venue|catering","event_planning"],
      ];
      for (const [pattern, type] of kw) {
        if (new RegExp(pattern).test(conv)) { qType = type; break; }
      }
      if (qType === "unknown") qType = "office_general";
    }
    judgeSave(S.part, S.level, qType, qi, isCorrect, q.question, elapsed).catch(e=>console.warn('judge save failed:', e));
    // 不正解 → 苦手問題として自動ストック（同一qSetで1回だけ）
    if (!isCorrect && S.qSet && !S.qSet._weakStocked) {
      S.qSet._weakStocked = true;
      stockSave(S.part, S.level, S.qSet, S.sceneImgUrl).then(()=>{
        console.log("📕 苦手問題を自動ストック");
      }).catch(()=>{});
    }
  }
  // ストック学習中: 正解ストリーク+lastPracticed追跡（判定モードに関係なく常時記録）
  // IMPORTANT: Only update streak after the LAST question in the set (not per-question)
  if (S.stockMode && S.stockId && !S.stockCreateMode && isLastQ) {
    const allCorrect = S.answers.every((a,ai) => a.answered && a.selected === (S.qSet.questions[ai]||{}).correct);
    updateStockStreak(S.stockId, allCorrect).catch(e=>console.warn('stock streak update failed:', e));
  }
  // Vocab SRS linkage: update correctCount/wrongCount for ALL practice modes
  // (not just judgeMode — stock practice and normal practice also count)
  if (!S.stockCreateMode && S.qSet && S.qSet.vocab && S.qSet.vocab.length && !S.qSet._vocabSrsUpdated) {
    if (isLastQ || qi === S.qSet.questions.length - 1) {
      S.qSet._vocabSrsUpdated = true;  // once per qSet, at last question
      const anyWrong = S.answers.some((a,ai) => a.answered && a.selected !== (S.qSet.questions[ai]||{}).correct);
      (async () => {
        try {
          const allVocab = await vocabGetAll();
          const vocabByBase = {};
          for (const w of allVocab) vocabByBase[lemmatize(w.word)] = w;
          for (const v of S.qSet.vocab) {
            const match = vocabByBase[lemmatize(v.word || "")];
            if (match) {
              if (anyWrong) {
                await vocabUpdate(match.id, {wrongCount: (match.wrongCount||0)+1});
              } else {
                await vocabUpdate(match.id, {correctCount: (match.correctCount||0)+1});
              }
            }
          }
        } catch(e) { console.warn("vocab SRS linkage error:", e); }
      })();
    }
  }
  // Auto-save vocabulary from this question set (once per qSet)
  if (S.qSet && S.qSet.vocab && S.qSet.vocab.length && !S.qSet._vocabSaved) {
    S.qSet._vocabSaved = true;
    vocabAutoSave(S.qSet.vocab, S.part).then(()=>{
      console.log("📚 vocab auto-saved:", S.qSet.vocab.map(v=>v.word).join(", "));
    }).catch(()=>{});
  }
  render();
}

function advanceQuestion() {
  S.qIdx++;

  S.timerFrozen=0;

function renderP6Text(text, activeBlank) {
  const escaped=esc(normText(text));
  return escaped.replace(/\((\d)\)/g, (match, n) => {
    const num=parseInt(n);
    const active=num===activeBlank;
    return `<span class="blank${active?" active":""}">(${n}) _______</span>`;
  });
}

/* ── ストック問題をStudy画面にロード (IDまたはfull item対応) ── */
async function loadStockItem(itemOrId) {
  stopSpeak();
  // Accept either full item object or just an ID (lazy load from IndexedDB)
  let item = itemOrId;
  if (typeof itemOrId === "number" || (typeof itemOrId === "object" && !itemOrId.qSet)) {
    const id = typeof itemOrId === "number" ? itemOrId : itemOrId.id;
    item = await stockGetById(id);
    if (!item) { console.warn("[STOCK] item not found:", id); return; }
  }
  S.part=item.part; S.level=item.level;
  S.screen="study"; S.stockMode=true; S.stockId=item.id;
  // Don't reset stats when advancing through a playlist — accumulate across sessions
  if (!S._stockPlaylistActive) {
    S.stats={correct:0,wrong:0}; S.streak=0;
  }
  S._stockPlaylistActive = true;
  // 音声URLを再生成（Opus形式のみ対応）
  if (item.audioOpus || item.audioPcm) {
    item.qSet._audioUrl = stockAudioUrl(item);
  }
  S.qSet=item.qSet;
  S.qSet.part=item.part; // partフィールドを復元
  S.sceneImgUrl=item.imgUrl||null;
  S.imageError=null;
  S.answers=S.qSet.questions.map(()=>({selected:null,answered:false}));
  S.qIdx=0; S.sessionNum=1;
  S.timerStart=Date.now(); S.timerFrozen=0;  // Reset timer for new stock item
  S.loading=false; S.error=null;
  render();
}
