body { min-height:100vh; background:linear-gradient(160deg,#0a0e1a 0%,#0f172a 40%,#1a1040 100%); color:#e2e8f0; font-family:'Noto Sans JP','Segoe UI',sans-serif; }

.ctx-lbl { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#818cf8; margin-bottom:8px; font-weight:600; }

<script>
/* =============================================
   TOEIC AI Trainer — 公式形式準拠版
   Part3/4: 1会話3問, Part6: 4問, Part7: 3問
   ============================================= */

const GEMINI_LITE        = "gemini-2.5-flash-lite";
const GEMINI_FLASH       = "gemini-2.5-flash";
const GEMINI_PRO         = "gemini-2.5-pro";
const GEMINI_IMAGE_MODEL = "gemini-3.1-flash-image-preview";
const GEMINI_TTS_MODEL   = "gemini-2.5-flash-preview-tts";

// 3段階モデル構成: Lite(単純) / Flash(中程度) / Pro(複雑)
const PART_MODEL = {
  part1: GEMINI_LITE,   // シーン描写のみ
  part2: GEMINI_LITE,   // 短文Q&A
  part3: GEMINI_FLASH,  part3_3p: GEMINI_FLASH, // 会話生成
  part4: GEMINI_FLASH,  // モノローグ
  part5: GEMINI_LITE,   // 単文文法
  part6: GEMINI_PRO,    // 文書+文挿入
  part7: GEMINI_PRO,    part7s: GEMINI_PRO,   part7d: GEMINI_PRO,   part7t: GEMINI_PRO, // 長文読解
};

const LEVELS = [
  {id:"beginner",     label:"初級", score:"〜600点",    color:"#22c55e"},
  {id:"intermediate", label:"中級", score:"600〜800点", color:"#f59e0b"},
  {id:"advanced",     label:"上級", score:"800点〜",    color:"#ef4444"},
];
const PARTS = [
  {id:"part1",label:"Part 1",desc:"写真描写",   sec:"L",icon:"🖼️", qCount:1},
  {id:"part2",label:"Part 2",desc:"応答問題",   sec:"L",icon:"💬", qCount:1},
  {id:"part3",label:"Part 3",desc:"会話問題",   sec:"L",icon:"🗣️", qCount:3},
  {id:"part4",label:"Part 4",desc:"説明文問題", sec:"L",icon:"🎙️", qCount:3},
  {id:"part5",label:"Part 5",desc:"短文穴埋め", sec:"R",icon:"✏️", qCount:1},
  {id:"part6",label:"Part 6",desc:"長文穴埋め", sec:"R",icon:"📝", qCount:4},
  {id:"part7",label:"Part 7",desc:"読解問題",   sec:"R",icon:"📖", qCount:0, qTag:"2-5問"},
];

/* ── State ── */
const SESSION_SIZE = 5; // 1セッション = 5問

let S = {
  screen: "apikey",
  apiKey: localStorage.getItem("gemini_api_key") || "",
  level: null, part: null,

  qSet: null,      // 現在の問題セット
  qIdx: 0,         // セット内の現在の問い番号
  answers: [],     // [{selected:null, answered:false}, ...]
  sessionNum: 0,   // 現セッションで完了したセット数（0〜5）

  sceneImgUrl: null, imageError: null,
  loading: false, loadMsg: "",
  error: null,
  stats: {correct:0, wrong:0}, streak: 0,
  stockMode: false, stockId: null,
  stockPlaylist: [],   // ストック学習用の問題リスト
  stockPlayIdx: 0,     // プレイリスト内の現在位置
  stockCreateMode: false, stockCreateTarget: 10, stockCreatePaused: false, // ストック作成モード
  judgeMode: JSON.parse(localStorage.getItem("judgeMode")||"false"), // 判定モード
  timerStart: 0, timerFrozen: 0, // 問題表示開始時刻 / 回答時の凍結時間
};

if (S.apiKey) S.screen = "home";

const $ = id => document.getElementById(id);
const app = document.getElementById("app");
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

/* ──────────────────────────────────────────────
   API THROTTLE — 全Geminiリクエストを直列化 + 429リトライ
────────────────────────────────────────────── */
let _apiLock = Promise.resolve();

async function throttledFetch(url, opts, maxRetries=1) {
  let release;
  const prev = _apiLock;
  _apiLock = new Promise(r => release = r);
  await prev;
  await new Promise(r => setTimeout(r, 300));

  try {
    for (let attempt=0; attempt<=maxRetries; attempt++) {
      const res = await fetch(url, opts);
      if (res.status === 429 || res.status === 503 || res.status === 500) {
        const errText = await res.text().catch(()=>"");
        console.warn(`${res.status}: ${errText.slice(0,100)} | attempt ${attempt+1}/${maxRetries+1}`);
        if (attempt < maxRetries) { await new Promise(r => setTimeout(r, 3000)); continue; }
        throw new Error(`API ${res.status}: ${errText.slice(0,200)}`);
      }
      return res;
    }
    throw new Error("APIエラー。しばらく待ってから再度お試しください。");
  } finally {
    release();
  }
}

/* ──────────────────────────────────────────────
   GEMINI TEXT API
────────────────────────────────────────────── */
async function geminiText(prompt, model) {
  const m = model || GEMINI_LITE;
  const genConfig = {temperature:0.9};
  // thinking制御（2.5系: thinkingBudget、3.x系: thinkingLevel）
  if (m.includes("preview")) {
    if (m.includes("pro")) genConfig.thinkingConfig = {thinkingLevel:"low"};
    else genConfig.thinkingConfig = {thinkingLevel:"minimal"};
  } else if (m.includes("2.5-pro")) {
    genConfig.thinkingConfig = {thinkingBudget:1024};  // Pro: 思考必須（最小限）
  } else if (m.includes("2.5")) {
    genConfig.thinkingConfig = {thinkingBudget:0};  // Flash/Lite: 思考OFF
  }
  const res = await throttledFetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${S.apiKey}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({contents:[{role:"user",parts:[{text:prompt}]}],generationConfig:genConfig}) }
  );
  if (!res.ok) throw new Error(`API ${res.status}: ${(await res.text()).slice(0,150)}`);
  const d = await res.json();
  return d.candidates[0].content.parts.map(p=>p.text||"").join("");
}

/* ──────────────────────────────────────────────
   GEMINI IMAGE API
────────────────────────────────────────────── */
async function generateImage(scene) {
  const res = await throttledFetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_IMAGE_MODEL}:generateContent?key=${S.apiKey}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        contents:[{role:"user",parts:[{text:`TOEIC test photograph: ${scene}. Realistic, no text overlay.`}]}],
        generationConfig:{responseModalities:["TEXT","IMAGE"],imageConfig:{imageSize:"1K"}},
      }) }
  );
  if (!res.ok) throw new Error(`ImgAPI ${res.status}: ${(await res.text()).slice(0,100)}`);
  const d = await res.json();
  const img = (d.candidates?.[0]?.content?.parts||[]).find(p=>p.inlineData);
  if (!img) throw new Error("画像データなし");
  return `data:${img.inlineData.mimeType};base64,${img.inlineData.data}`;
}

   PROMPTS
────────────────────────────────────────────── */

────────────────────────────────────────────── */

function shuffleSessionTypes() {
  _sessionTypes = {};
  for (const [part, pool] of Object.entries(TYPES)) {
    const arr = [...pool];
    for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    _sessionTypes[part] = arr.slice(0, SESSION_SIZE);
  }
}

function parseJSON(text) {
  const t = text.replace(/```json|```/g,"").trim();
  try { return JSON.parse(t); } catch(e) {
    // Fix common issues: unescaped newlines inside strings
    try {
      let out="", inStr=false, esc2=false;
      for (const c of t) {
        if (esc2) { out+=c; esc2=false; continue; }
        if (c==="\\") { esc2=true; out+=c; continue; }
        if (c==='"') { inStr=!inStr; out+=c; continue; }
        if (inStr) {
          if (c==="\n") { out+="\\n"; continue; }
          if (c==="\r") { continue; }
          if (c==="\t") { out+="\\t"; continue; }
        }
        out+=c;
      }
      return JSON.parse(out);
    } catch(e2) { throw new Error(`JSON解析エラー: ${e.message}`); }
  }
}

function normalizeSet(raw, part) {
  // Normalize all parts into unified {part, questions:[], audio?, content fields}
  switch(part) {
    case "part1": {
      const audio = raw.audio || raw.choices.map((c,i)=>`${["A","B","C","D"][i]}. ${c.replace(/^\([A-D]\)\s*/,"")}`).join(". ");
      return { part, scene:raw.scene, audio,
        questions:[{question:"Which statement best describes the photograph?", choices:raw.choices, correct:raw.correct, explanation_ja:raw.explanation_ja}], vocab:raw.vocab||[] };
    }
    case "part2": {
      const audio = raw.audio || `${raw.spoken}. ${raw.choices.map((c,i)=>`${["A","B","C"][i]}. ${c.replace(/^\([A-C]\)\s*/,"")}`).join(". ")}`;
      return { part, spoken:raw.spoken, audio,
        questions:[{question:raw.spoken, choices:raw.choices, correct:raw.correct, explanation_ja:raw.explanation_ja}], vocab:raw.vocab||[] };
    }
    case "part3": {
      // Gender validation: check conversation lines match speaker labels
      const conv = raw.conversation || "";
      const lines = conv.split(/\\n|\n/);
      for (const line of lines) {
        const m = line.match(/^(Man|Woman)\s*\d?\s*:\s*(.+)/i);
        if (m) {
          const label = m[1].toLowerCase();
          const text = m[2];
          // Check for obvious gender mismatches
          if (label === "man" && /\bI'm\s+(?:Ms\.|Mrs\.|she|her name is)\b/i.test(text)) {
            console.warn("⚠️ Part 3 gender mismatch: Man line contains female reference:", text.slice(0,60));
          }
          if (label === "woman" && /\bI'm\s+(?:Mr\.|he|his name is)\b/i.test(text)) {
            console.warn("⚠️ Part 3 gender mismatch: Woman line contains male reference:", text.slice(0,60));
          }
        }
      }
      // Fix translation_ja labels if swapped
      let tja = raw.translation_ja || null;
      if (tja) {
        tja = tja.replace(/女性(\s*\d?\s*):(.+?)(?=男性|女性|$)/g, (m, n, t) => `女性${n}:${t}`);
        tja = tja.replace(/男性(\s*\d?\s*):(.+?)(?=男性|女性|$)/g, (m, n, t) => `男性${n}:${t}`);
      }
      return { part, conversation:conv, translation_ja:tja, audio:raw.audio||conv, speakers:raw.speakers||["Man","Woman"], graphic:raw.graphic||null, vocab:raw.vocab||[], questions:raw.questions };
    }
    case "part4":
      return { part, talk:raw.talk, translation_ja:raw.translation_ja||null, talk_type:raw.talk_type||"", audio:raw.audio||raw.talk, graphic:raw.graphic||null, vocab:raw.vocab||[], questions:raw.questions };
    case "part5":
      return { part,
        questions:[{question:raw.sentence, choices:raw.choices, correct:raw.correct, explanation_ja:raw.explanation_ja}], vocab:raw.vocab||[] };
    case "part6":
      return { part, doc_type:raw.doc_type||"", header:raw.header||null, text:raw.text, translation_ja:raw.translation_ja||null, vocab:raw.vocab||[], questions:raw.questions };
    case "part7":
      // Detect triple passage
      if (raw.text_1 && raw.text_2 && raw.text_3) {
        return { part, isTriple:true,
          doc_type_1:raw.doc_type_1||"", header_1:raw.header_1||null, text_1:raw.text_1, translation_ja_1:raw.translation_ja_1||null,
          doc_type_2:raw.doc_type_2||"", header_2:raw.header_2||null, text_2:raw.text_2, translation_ja_2:raw.translation_ja_2||null,
          doc_type_3:raw.doc_type_3||"", header_3:raw.header_3||null, text_3:raw.text_3, translation_ja_3:raw.translation_ja_3||null,
          vocab:raw.vocab||[], questions:raw.questions };
      }
      // Detect double passage
      if (raw.text_1 && raw.text_2) {
        return { part, isDouble:true,
          doc_type_1:raw.doc_type_1||"", header_1:raw.header_1||null, text_1:raw.text_1, translation_ja_1:raw.translation_ja_1||null,
          doc_type_2:raw.doc_type_2||"", header_2:raw.header_2||null, text_2:raw.text_2, translation_ja_2:raw.translation_ja_2||null,
          vocab:raw.vocab||[], questions:raw.questions };
      }
      return { part, isDouble:false, doc_type:raw.doc_type||"", header:raw.header||null, text:raw.text, translation_ja:raw.translation_ja||null, graphic:raw.graphic||null, vocab:raw.vocab||[], questions:raw.questions };
    default:
      throw new Error("Unknown part: "+part);
  }
}

async function generateQuestionSet(partOverride, options) {
  const usePart = partOverride || S.part;
  const model = PART_MODEL[usePart] || GEMINI_FLASH;
  const raw = await geminiText(getPrompt(S.level, usePart, options), model);

  console.log("Generated:", S.part, "audio:", !!result.audio, "translation_ja:", !!result.translation_ja, "translation_ja_1:", !!result.translation_ja_1);
  return result;
}

// Basic English lemmatization to dictionary form
function lemmatize(w) {
  w = w.toLowerCase().trim();
  if (w.endsWith("ied") && w.length>4) return w.slice(0,-3)+"y";
  if (w.endsWith("ied")) return w.slice(0,-1);
  if (w.endsWith("ing") && w.length>5 && w[w.length-4]===w[w.length-5]) return w.slice(0,-4);
  if (w.endsWith("ting") && w.length>5) return w.slice(0,-4)+"te";
  if (w.endsWith("ing") && w.length>4) return w.slice(0,-3);
  if (w.endsWith("ed") && w.length>4 && w[w.length-3]===w[w.length-4]) return w.slice(0,-3);
  if (w.endsWith("ed") && w.length>3) return w.slice(0,-2);
  if (w.endsWith("es") && w.length>4) return w.slice(0,-2);
  if (w.endsWith("s") && !w.endsWith("ss") && w.length>3) return w.slice(0,-1);
  return w;
}
// Normalize Japanese meaning into a set of segments for comparison
function meaningSegments(m) {
  if (!m) return new Set();
  // Split by 、, (, （ and normalize each segment
  return new Set(m.trim().split(/[、,（()]/).map(s=>s.trim()).filter(Boolean));
}
// Check if two meanings share at least one common segment
function meaningsMatch(m1, m2) {
  const s1 = meaningSegments(m1);
  const s2 = meaningSegments(m2);
  for (const seg of s1) if (s2.has(seg)) return true;
  return false;
}
// Auto-save: if ANY segment of new meaning matches existing, treat as same
async function vocabAutoSave(vocabArr, part) {
  if (!vocabArr || !vocabArr.length) return;
  try {
    const existing = await vocabGetAll();
    for (const v of vocabArr) {
      if (!v.word) continue;
      const baseWord = lemmatize(v.word);
      const newMeaning = (v.ja||"").trim();
      const newExample = (v.example||"").trim();
      const match = existing.find(e => lemmatize(e.word) === baseWord);
      if (match) {
        const meanings = (match.meaning||"").split("\n").map(s=>s.trim()).filter(Boolean);
        // Check overlap with any existing meaning
        const hasOverlap = meanings.some(m => meaningsMatch(m, newMeaning));
        if (hasOverlap) continue; // at least one segment matches → skip
        const updatedMeaning = meanings.concat(newMeaning).join("\n");
        const examples = (match.context||"").split("\n").map(s=>s.trim()).filter(Boolean);
        const updatedContext = examples.concat(newExample).join("\n");
        await vocabUpdate(match.id, {meaning: updatedMeaning, context: updatedContext});
        match.meaning = updatedMeaning; match.context = updatedContext;
      } else {
        const pos = (v.pos||"other").toLowerCase();
        await vocabSave(v.word, newMeaning, newExample, part, pos);
        existing.push({id:Date.now(), word:v.word, meaning:newMeaning, context:newExample, pos});
      }
    }
  } catch(e) { console.warn("vocabAutoSave error:", e); }
}

    if (vocab && Array.isArray(vocab) && vocab.length > 0) {
      foundVocab += vocab.length;
      await vocabAutoSave(vocab, item.part).catch(()=>{});
      processed++;
    }
  }
  console.log(`[REBUILD] ${processed}/${all.length} stocks had vocab, ${foundVocab} vocab entries processed`);
  return {processed, total: all.length, foundVocab};
}
// Cleanup: deduplicate existing entries by merging same base word with overlapping meanings
async function vocabDedupe() {
  const words = await vocabGetAll();
  const byBase = {};
  for (const w of words) {
    const b = lemmatize(w.word);
    if (!byBase[b]) byBase[b] = [];
    byBase[b].push(w);
  }
  let merged = 0, cleanedInternal = 0;
  for (const base in byBase) {
    const group = byBase[base];
    // Merge multiple entries with same base word
    if (group.length > 1) {
      const keep = group[0];
      const allMeanings = [];
      const allExamples = [];
      for (const g of group) {
        const ms = (g.meaning||"").split("\n").filter(Boolean);
        const es = (g.context||"").split("\n").filter(Boolean);
        ms.forEach((m,i) => {
          // Check if any existing meaning has segment overlap
          const hasOverlap = allMeanings.some(existing => meaningsMatch(existing, m));
          if (!hasOverlap) {
            allMeanings.push(m);
            allExamples.push(es[i] || "");
          }
        });
      }
      await vocabUpdate(keep.id, {meaning: allMeanings.join("\n"), context: allExamples.join("\n")});
      for (let i=1; i<group.length; i++) {
        await vocabDelete(group[i].id);
        merged++;
      }
    } else {
      // Single entry: clean internal duplicates in meaning field
      const w = group[0];
      const ms = (w.meaning||"").split("\n").filter(Boolean);
      const es = (w.context||"").split("\n").filter(Boolean);
      if (ms.length <= 1) continue;
      const keptM = [], keptE = [];
      ms.forEach((m,i) => {
        const hasOverlap = keptM.some(existing => meaningsMatch(existing, m));
        if (!hasOverlap) { keptM.push(m); keptE.push(es[i]||""); }
      });
      if (keptM.length !== ms.length) {
        await vocabUpdate(w.id, {meaning: keptM.join("\n"), context: keptE.join("\n")});
        cleanedInternal++;
      }
    }
  }
  return {merged, cleanedInternal};
}

function openStockDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(STOCK_DB, STOCK_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("questions")) {
        const store = db.createObjectStore("questions", {keyPath:"id", autoIncrement:true});
        store.createIndex("part", "part", {unique:false});
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function stockSave(part, level, qSet, imgUrl) {
  const db = await openStockDB();
  const data = {
    part, level,
    qSet: JSON.parse(JSON.stringify(qSet)),  // deep clone (strip _audioUrl)
    imgUrl: imgUrl || null,
    createdAt: Date.now(),
  };
  // Opus優先、なければ12kHz+gzipにフォールバック
  if (qSet._audioOpus) {
    data.audioOpus = qSet._audioOpus;
    data.audioFormat = "opus";
  } else if (qSet._audioPcm) {
    const ds = downsamplePcm(qSet._audioPcm);
    data.audioGzip = await compressB64(ds);
    data.audioRate = 12000;
    data.audioFormat = "gzip";
  }
  delete data.qSet._audioUrl;
  delete data.qSet._audioPcm;
  return new Promise((resolve, reject) => {
    const tx = db.transaction("questions","readwrite");
    tx.objectStore("questions").add(data);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function stockImport(file) {
  const text = await file.text();
  const items = JSON.parse(text);
  if (!Array.isArray(items)) throw new Error("無効なファイル形式");
  const db = await openStockDB();
  // 既存のcreatedAtを取得して重複チェック用セットを作る
  const existing = await new Promise((resolve, reject) => {
    const tx = db.transaction("questions","readonly");
    const req = tx.objectStore("questions").getAll();
    req.onsuccess = () => resolve(new Set(req.result.map(r => r.createdAt)));
    req.onerror = () => reject(req.error);
  });
  let count = 0, skipped = 0, vocabAdded = 0, vocabTotal = 0, withVocab = 0;
  console.log(`[IMPORT] Processing ${items.length} items...`);
  for (const item of items) {
    if (!item.part || !item.qSet) continue;
    const ts = item.createdAt || Date.now();
    if (existing.has(ts)) { skipped++; continue; } // 重複スキップ
    existing.add(ts); // 同一ファイル内の重複も防止
    const data = {part:item.part, level:item.level, qSet:item.qSet, imgUrl:item.imgUrl||null, createdAt:ts};
    if (item.audioOpus) { data.audioOpus = item.audioOpus; data.audioFormat = "opus"; }
    else if (item.audioGzip) { data.audioGzip = item.audioGzip; data.audioRate = item.audioRate||12000; data.audioFormat = "gzip"; }
    else if (item.audioPcm) data.audioPcm = item.audioPcm;
    await new Promise((resolve, reject) => {
      const tx = db.transaction("questions","readwrite");
      tx.objectStore("questions").add(data);
      tx.oncomplete = () => { count++; resolve(); };
      tx.onerror = () => reject(tx.error);
    });
    // Auto-save vocabulary from imported question
    const vocab = item.qSet.vocab;
    if (vocab && Array.isArray(vocab) && vocab.length > 0) {
      withVocab++;
      vocabTotal += vocab.length;
      const before = (await vocabGetAll()).length;
      await vocabAutoSave(vocab, item.part).catch(e=>console.warn("vocab save failed:", e));
      const after = (await vocabGetAll()).length;
      vocabAdded += (after - before);
    }
  }
  console.log(`[IMPORT] Complete: ${count} items, ${withVocab} with vocab, ${vocabTotal} vocab entries found, ${vocabAdded} new added to dictionary`);
  return {count, skipped, vocabAdded, withVocab, vocabTotal};
}

function pickVoice(gender="any") {
  const pool = gender==="female" ? TTS_FEMALE : gender==="male" ? TTS_MALE : [...TTS_FEMALE,...TTS_MALE];
  return pool[Math.floor(Math.random()*pool.length)];
}

function pcmToUrl(b64, rate) {
  const raw = atob(b64), bytes = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  const sr=rate||24000,ch=1,bps=16,hdr=new ArrayBuffer(44),v=new DataView(hdr);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,"RIFF"); v.setUint32(4,36+bytes.length,true); ws(8,"WAVE"); ws(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,ch,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*ch*bps/8,true);
  v.setUint16(32,ch*bps/8,true); v.setUint16(34,bps,true); ws(36,"data"); v.setUint32(40,bytes.length,true);
  const wav=new Uint8Array(44+bytes.length); wav.set(new Uint8Array(hdr)); wav.set(bytes,44);
  return URL.createObjectURL(new Blob([wav],{type:"audio/wav"}));
}

// 24kHz→12kHz ダウンサンプル（16bit mono: 2バイト/サンプル、1つ飛ばし）
function downsamplePcm(b64) {
  const raw = atob(b64);
  const srcLen = raw.length;
  const dst = new Uint8Array(Math.floor(srcLen/2));
  for (let i=0,j=0; i<srcLen-3; i+=4,j+=2) {
    dst[j]   = raw.charCodeAt(i);
    dst[j+1] = raw.charCodeAt(i+1);
  }
  let bin=""; for(let i=0;i<dst.length;i++) bin+=String.fromCharCode(dst[i]);
  return btoa(bin);
}

// gzip圧縮（base64 → compressed base64）
async function compressB64(b64) {
  const raw=atob(b64), bytes=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  const cs=new CompressionStream("gzip");
  const w=cs.writable.getWriter();
  w.write(bytes); w.close();
  const chunks=[]; const r=cs.readable.getReader();
  while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);}
  const blob=new Blob(chunks);
  const ab=await blob.arrayBuffer();
  const u8=new Uint8Array(ab);
  let bin="";for(let i=0;i<u8.length;i++) bin+=String.fromCharCode(u8[i]);
  return btoa(bin);
}

// gzip解凍（compressed base64 → base64）
async function decompressB64(b64) {
  const raw=atob(b64), bytes=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  const ds=new DecompressionStream("gzip");
  const w=ds.writable.getWriter();
  w.write(bytes); w.close();
  const chunks=[]; const r=ds.readable.getReader();
  while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);}
  const blob=new Blob(chunks);
  const ab=await blob.arrayBuffer();
  const u8=new Uint8Array(ab);
  let bin="";for(let i=0;i<u8.length;i++) bin+=String.fromCharCode(u8[i]);
  return btoa(bin);
}

// Opus/WebMエンコード（PCM base64 → Opus base64）バックグラウンド実行
async function encodeOpus(b64pcm, srcRate=24000) {
  const raw=atob(b64pcm), numSamples=raw.length/2;
  const f32=new Float32Array(numSamples);
  for(let i=0;i<numSamples;i++){
    const lo=raw.charCodeAt(i*2), hi=raw.charCodeAt(i*2+1);
    let v=lo|(hi<<8); if(v>=0x8000)v-=0x10000; f32[i]=v/32768;
  }
  const ctx=new AudioContext({sampleRate:srcRate});
  const buf=ctx.createBuffer(1,numSamples,srcRate);
  buf.getChannelData(0).set(f32);
  const dest=ctx.createMediaStreamDestination();
  const src=ctx.createBufferSource();
  src.buffer=buf; src.connect(dest);
  const recorder=new MediaRecorder(dest.stream,{mimeType:"audio/webm;codecs=opus",audioBitsPerSecond:24000});
  const chunks=[];
  recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  return new Promise((resolve,reject)=>{
    recorder.onstop=async()=>{
      await ctx.close();
      const blob=new Blob(chunks,{type:"audio/webm;codecs=opus"});
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result.split(",")[1]);
      reader.onerror=reject;
      reader.readAsDataURL(blob);
    };
    src.onended=()=>setTimeout(()=>recorder.stop(),100);
    recorder.start(); src.start();
  });
}

// Opus base64 → 再生用URL
function opusToUrl(b64) {
  const raw=atob(b64), bytes=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  return URL.createObjectURL(new Blob([bytes],{type:"audio/webm;codecs=opus"}));
}

async function callTTS(text, config) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TTS_MODEL}:generateContent?key=${S.apiKey}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({contents:[{parts:[{text:text.slice(0,TTS_MAX)}]}],generationConfig:{responseModalities:["AUDIO"],speechConfig:config}}) }
  );
  if (!res.ok) {
    const errBody = await res.text();
    console.error(`TTS error ${res.status}:`, errBody);
    if (res.status === 429) throw new Error("⚠️ TTS制限中です。数分待ってから再生してください");
    if (res.status === 503) throw new Error("⚠️ TTSサーバー混雑中。しばらく待ってから再生してください");
    throw new Error(`TTS ${res.status}: ${errBody.slice(0,150)}`);
  }
  const d = await res.json();
  const pcm = d.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
  if (!pcm) throw new Error("TTS: 音声データなし");
  return pcm;
}

/* ── Dispatch ── */
async function speak(text, onEnd) {
  await speakGemini(text, onEnd);
}
let _curAudio=null;
const _ttsCache=new Map();
let _seqId=0;

async function speakGemini(text, onEnd) {
  stopSpeak();
  try {
    let url=_ttsCache.get(text);
    if (!url) {
      const pcm=await callTTS(text,{voiceConfig:{prebuiltVoiceConfig:{voiceName:pickVoice()}}});
      url=pcmToUrl(pcm);
      if(_ttsCache.size>=20){const k=_ttsCache.keys().next().value;URL.revokeObjectURL(_ttsCache.get(k));_ttsCache.delete(k);}
      _ttsCache.set(text,url);
      if(S.qSet&&!S.qSet._audioPcm){S.qSet._audioPcm=pcm;S.qSet._audioUrl=url;if(S.stockMode&&S.stockId)stockUpdateAudio(S.stockId,pcm).catch(()=>{});
        encodeOpus(pcm).then(opus=>{if(S.qSet)S.qSet._audioOpus=opus;}).catch(()=>{});
      }
    }
    const a=new Audio(url); _curAudio=a;
    a.onended=()=>{_curAudio=null;onEnd&&onEnd();};
    a.onerror=()=>{_curAudio=null;onEnd&&onEnd();};
    await a.play();
  } catch(e) {
    console.error("TTS failed:", e.message);
    if(onEnd)onEnd("⚠️ 音声生成に失敗: " + e.message);
  }
}

/* ── Gemini TTS (multi-speaker for conversations) ── */
async function speakConv(text, onEnd, speakers) {
  stopSpeak();
  try {
    const key="conv:"+text;
    let url=_ttsCache.get(key);
    if (!url) {
      // Build speaker configs from speakers array (max 2 voices for Gemini TTS)
      const spkNames = speakers || ["Man","Woman"];
      const maleVoice = pickVoice("male");
      const femaleVoice = pickVoice("female");
      const voiceConfigs = [];
      const usedNames = new Set();
      for (const spk of spkNames) {
        if (usedNames.has(spk)) continue; // skip duplicates
        usedNames.add(spk);
        const isFemale = /woman|female|her|she/i.test(spk);
        if (voiceConfigs.length < 2) {
          voiceConfigs.push({
            speaker: spk,
            voiceConfig:{prebuiltVoiceConfig:{voiceName: isFemale ? femaleVoice : maleVoice}}
          });
        }
        // 3rd speaker: Gemini TTS only supports 2, so we skip (their lines will be read by closest match)
      }
      const res=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TTS_MODEL}:generateContent?key=${S.apiKey}`,
        {method:"POST",headers:{"Content-Type":"application/json"},
         body:JSON.stringify({contents:[{parts:[{text:text.slice(0,TTS_MAX)}]}],
           generationConfig:{responseModalities:["AUDIO"],speechConfig:{
             multiSpeakerVoiceConfig:{speakerVoiceConfigs:voiceConfigs}
           }}})}
      );
      if (!res.ok) { return speakGemini(text.replace(/(?:Man\s*\d?|Woman\s*\d?|Speaker\s*\d?):\s*/gi,""), onEnd); }
      const d=await res.json();
      const pcm=d.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
      if (!pcm) { return speakGemini(text.replace(/(?:Man\s*\d?|Woman\s*\d?|Speaker\s*\d?):\s*/gi,""), onEnd); }
      url=pcmToUrl(pcm);
      if(_ttsCache.size>=20){const k=_ttsCache.keys().next().value;URL.revokeObjectURL(_ttsCache.get(k));_ttsCache.delete(k);}
      _ttsCache.set(key,url);
      if(S.qSet&&!S.qSet._audioPcm){S.qSet._audioPcm=pcm;S.qSet._audioUrl=url;if(S.stockMode&&S.stockId)stockUpdateAudio(S.stockId,pcm).catch(()=>{});
        encodeOpus(pcm).then(opus=>{if(S.qSet)S.qSet._audioOpus=opus;}).catch(()=>{});
      }
    }
    const a=new Audio(url); _curAudio=a;
    a.onended=()=>{_curAudio=null;onEnd&&onEnd();};
    a.onerror=()=>{_curAudio=null;onEnd&&onEnd();};
    await a.play();
  } catch(e) {
    console.warn("Multi-speaker TTS failed, trying single voice");
    try { return await speakGemini(text.replace(/(?:Man\s*\d?|Woman\s*\d?|Speaker\s*\d?):\s*/gi,""), onEnd); }
    catch(e2) { console.error("TTS failed:", e2.message); if(onEnd)onEnd("⚠️ 音声生成に失敗: " + e2.message); }
  }
}

/* ── Sequential playback ── */
async function playSeq(urls, onEnd) {
  const myId=++_seqId;
  for (const url of urls.filter(Boolean)) {
    if (_seqId!==myId) break;
    await new Promise(r=>{
      const a=new Audio(url); _curAudio=a;
      a.onended=()=>{if(_curAudio===a)_curAudio=null;r();};
      a.onerror=()=>{if(_curAudio===a)_curAudio=null;r();};
      a.play().catch(()=>{if(_curAudio===a)_curAudio=null;r();});
    });
  }
  if (_seqId===myId) onEnd&&onEnd();
}

function stopSpeak() {
  ++_seqId;
  if (_curAudio) { _curAudio.onended=null;_curAudio.onerror=null;_curAudio.pause();_curAudio.src="";_curAudio=null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
}

/* ── Audio button state helper ── */
function setAudioBtn(btn, st, err) {
  if (!btn) return;
  btn.disabled=(st==="loading");
  if      (st==="loading") { btn.classList.add("pl");    btn.textContent="🔄 音声を生成中..."; }
  else if (st==="playing") { btn.classList.add("pl");    btn.textContent="⏹ 停止"; }
  else if (st==="error")   { btn.classList.remove("pl"); btn.textContent=`⚠️ ${err||"エラー"}`; }
  else                     { btn.classList.remove("pl"); btn.disabled=false; btn.textContent=btn.dataset.label||"🔊 再生"; }
}

/* ──────────────────────────────────────────────
   AUDIO PRE-GENERATION（順次実行キュー）
   並列リクエストによるレート制限を防止
────────────────────────────────────────────── */
// 音声はオンデマンド生成のみ（再生ボタン押下時）
async function preGenAudio(qs) {
  const part=qs.part;
  if (!["part1","part2","part3","part4"].includes(part)) return;
  const audio = qs.audio || "";
  if (!audio) return;
  try {
    if (part==="part3") {
      // Multi-speaker conversation audio with dynamic speakers
      const convText = audio.slice(0, TTS_MAX);
      const spkNames = qs.speakers || ["Man","Woman"];
      const maleVoice = pickVoice("male");
      const femaleVoice = pickVoice("female");
      const voiceConfigs = [];
      const usedNames = new Set();
      for (const spk of spkNames) {
        if (usedNames.has(spk)) continue;
        usedNames.add(spk);
        const isFemale = /woman|female/i.test(spk);
        if (voiceConfigs.length < 2) {
          voiceConfigs.push({speaker:spk, voiceConfig:{prebuiltVoiceConfig:{voiceName:isFemale?femaleVoice:maleVoice}}});
        }
      }
      try {
        const res=await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TTS_MODEL}:generateContent?key=${S.apiKey}`,
          {method:"POST",headers:{"Content-Type":"application/json"},
           body:JSON.stringify({contents:[{parts:[{text:convText}]}],
             generationConfig:{responseModalities:["AUDIO"],speechConfig:{
               multiSpeakerVoiceConfig:{speakerVoiceConfigs:voiceConfigs}
             }}})}
        );
        if (res.ok) {
          const d=await res.json();
          const pcm=d.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
          if (pcm) { qs._audioPcm=pcm; qs._audioUrl=pcmToUrl(pcm); return; }
        }
      } catch(e) {}
      // Fallback: single voice
      const pcm=await callTTS(convText.replace(/(?:Man\s*\d?|Woman\s*\d?|Speaker\s*\d?):\s*/gi,""),{voiceConfig:{prebuiltVoiceConfig:{voiceName:pickVoice()}}});
      qs._audioPcm=pcm; qs._audioUrl=pcmToUrl(pcm);
    } else {
      const pcm=await callTTS(audio.slice(0,TTS_MAX),{voiceConfig:{prebuiltVoiceConfig:{voiceName:pickVoice()}}});
      qs._audioPcm=pcm; qs._audioUrl=pcmToUrl(pcm);
    }
  } catch(e) { console.error("preGenAudio:",e.message); }
  // 音声準備完了 → 再生ボタンに✓を表示
  if (qs._audioUrl) {
    const pa=document.getElementById("playAudio");
    if (pa && pa.dataset.label && !pa.classList.contains("pl")) {
      pa.dataset.label="🔊 音声を再生 ✓";
      pa.textContent="🔊 音声を再生 ✓";
    }
  }
}

/* ──────────────────────────────────────────────
   SESSION MANAGEMENT (1問先読み)
────────────────────────────────────────────── */
let _nextQ = null;       // 先読み済みの次の問題
let _prefetching = false; // 先読み中フラグ

/* ──────────────────────────────────────────────
   LOAD NEW QUESTION SET (1問ずつ生成)
────────────────────────────────────────────── */
// 1問分を生成（テキスト＋画像のみ。音声は再生時にオンデマンド）
async function generateOneQuestion(sessionIdx) {
  const partKey = S.part === "part7" ? (["part7s","part7d","part7t"][Math.floor(Math.random()*3)]) : S.part;
  const usePartOverride = (S.part==="part3" && sessionIdx===2) ? "part3_3p" : (S.part==="part7" ? partKey : null);
  const typePool = _sessionTypes[partKey] || _sessionTypes[S.part] || [];
  const typeObj = typePool[sessionIdx] || undefined;

  const qs = await generateQuestionSet(usePartOverride, typeObj);
  let imgUrl=null, imgErr=null;
  if (S.part==="part1" && qs.scene) {
    try { imgUrl = await generateImage(qs.scene); }
    catch(e) { imgErr = e.message; }
  }
  return {qs, imgUrl, imgErr};
}

// バックグラウンドで次の1問を先読み（3秒後に開始して現在のリクエストと被らない）
function prefetchNext() {
  if (_prefetching || _nextQ) return;
  if (S.sessionNum >= SESSION_SIZE) return;
  setTimeout(() => {
    if (_prefetching || _nextQ || S.sessionNum >= SESSION_SIZE) return;
    _prefetching = true;
    generateOneQuestion(S.sessionNum).then(result => {
      _nextQ = result;
      _prefetching = false;
      const nb = document.getElementById("nextSetBtn");
      if (nb) nb.textContent = `次の問題 (${S.sessionNum+1}/${SESSION_SIZE}) →`;
    }).catch(e => {
      console.error("prefetch:", e.message);
      _prefetching = false;
    });
  }, 2000);
}

async function loadNewSet() {
  stopSpeak();
  S.answers=[]; S.qIdx=0; S.error=null; S.sceneImgUrl=null; S.imageError=null;

  // ストック作成モードはセッション制限なし
  if (S.stockCreateMode && S.sessionNum >= SESSION_SIZE) {
    S.sessionNum = 0;
    shuffleSessionTypes();
  }

  // 先読み済みがあれば即表示（先読み中でも待たない）
  if (_nextQ) {
    const cached = _nextQ;
    _nextQ = null;
    S.qSet = cached.qs;
    S.sceneImgUrl = cached.imgUrl || null;
    S.imageError = cached.imgErr || null;
    S.answers = S.qSet.questions.map(() => ({selected:null, answered:false}));
    S.sessionNum++;
    S.loading = false;
    render();
    prefetchNext();
    triggerAutoStock();
    S.timerStart=["part1","part2","part3","part4"].includes(S.part)?0:Date.now();
    S.timerFrozen=0;
    return;
  }

  // 先読みがなければローディング表示して生成
  S.loading=true; S.qSet=null;
  S.loadMsg=`問題を生成中... (${S.sessionNum+1}/${SESSION_SIZE})`;
  render();

  try {
    const result = await generateOneQuestion(S.sessionNum);
    S.qSet = result.qs;
    S.sceneImgUrl = result.imgUrl || null;
    S.imageError = result.imgErr || null;
    S.answers = S.qSet.questions.map(() => ({selected:null, answered:false}));
    S.sessionNum++;
  } catch(e) {
    if (S.stockCreateMode) {
      // ストック作成モード: 3秒後に自動リトライ
      S.loadMsg=`⚠️ 生成失敗…3秒後にリトライ`;
      render();
      await new Promise(r => setTimeout(r, 3000));
      S.error=null; loadNewSet(); return;
    }
    S.error = `問題の生成に失敗しました:\n${e.message}`;
  }

  S.loading=false;
  S.timerStart=["part1","part2","part3","part4"].includes(S.part)?0:Date.now();
  S.timerFrozen=0;
  render();
  prefetchNext();
  triggerAutoStock(); // ストック作成モード: 自動フロー開始
}

// ストック作成モード: 自動フロー開始トリガー
function triggerAutoStock() {
  if (!S.stockCreateMode || !S.qSet) return;
  const isL = ["part1","part2","part3","part4"].includes(S.part);
  if (isL && S.qSet.audio) {
    // Listeningパート: 音声自動再生 → 完了後に自動ストック
    const qs = S.qSet;
    const pa = document.getElementById("playAudio");
    if (pa) {
      setAudioBtn(pa, "loading");
      const isConv = S.part==="part3";
      const fn = isConv ? (t,cb)=>speakConv(t,cb,qs.speakers) : speakGemini;
      fn(qs.audio, (err) => {
        setAudioBtn(pa, err?"error":"idle", err?String(err).slice(0,100):"");
        if (!err) {
          autoStockAndNext();
        } else {
          setTimeout(()=>{
            if (!S.stockCreateMode) return;
            setAudioBtn(pa, "loading");
            fn(qs.audio, (err2) => {
              setAudioBtn(pa, err2?"error":"idle", err2?String(err2).slice(0,60):"");
              if (!err2) { autoStockAndNext(); }
              else { loadNewSet(); }
            });
          }, 3000);
        }
      });
    }
  } else {
    // Readingパート: 2秒プレビュー後に自動ストック
    setTimeout(()=>{
      if (S.stockCreateMode && !S.stockCreatePaused) autoStockAndNext();
    }, 2000);
  }
}

// ストック作成: 自動保存して次へ
async function autoStockAndNext() {
  if (!S.stockCreateMode || S.stockCreatePaused || !S.qSet) return;
  try {
    await stockSave(S.part, S.level, S.qSet, S.sceneImgUrl);
    // Auto-save vocab from this question set
    if (S.qSet.vocab && S.qSet.vocab.length) {
      await vocabAutoSave(S.qSet.vocab, S.part).catch(()=>{});
    }
    S.stockCreateCount = (S.stockCreateCount||0) + 1;
  } catch(e) { console.error("auto-stock error:", e); }
  // 目標達成チェック
  if (S.stockCreateCount >= S.stockCreateTarget) {
    stopSpeak(); S.stockCreateMode=false; S.graphicMode=false; S.screen="home";
    alert(`✅ ${S.stockCreateCount}問ストックしました！`);
    render(); return;
  }
  render(); // 進捗更新
  setTimeout(()=>{
    if(!S.stockCreateMode) return;
    // Graphic mode: cycle through graphic types, changing part
    if (S.graphicMode && S.graphicPool && S.graphicPool.length) {
      const gt = S.graphicPool[S.stockCreateCount % S.graphicPool.length];
      S.part = gt._gPart;
      // Override session type to this graphic type
      _sessionTypes[S.part] = [gt];
      S.sessionNum = 0;
    }
    loadNewSet();
  }, 500);
}

function handleAnswer(idx) {
  stopSpeak();
  const qi=S.qIdx, q=S.qSet.questions[qi];
  S.answers[qi]={selected:idx, answered:true};
  const isCorrect = idx===q.correct;
  if (isCorrect) { S.stats.correct++; S.streak++; }
  else           { S.stats.wrong++;   S.streak=0;  }
  // タイマー: 経過時間を記録、最終設問でのみ停止
  const elapsed=S.timerStart?Math.round((Date.now()-S.timerStart)/1000):0;
  const isLastQ=S.qIdx>=S.qSet.questions.length-1;
  if(isLastQ) {
    S.timerFrozen=elapsed;
    S.timerStart=0; // 最終設問 → 停止
  }
  // （途中の設問ではタイマー継続）
  // 判定モードON → 記録 + 不正解は自動ストック
  if (S.judgeMode && !S.stockCreateMode) {
    const typePool = _sessionTypes[S.part] || [];
    const typeObj = typePool[S.sessionNum-1] || {};
    judgeSave(S.part, S.level, typeObj.type, qi, isCorrect, q.question, elapsed).catch(()=>{});
    // 不正解 → 苦手問題として自動ストック（同一qSetで1回だけ）
    if (!isCorrect && S.qSet && !S.qSet._weakStocked) {
      S.qSet._weakStocked = true;
      stockSave(S.part, S.level, S.qSet, S.sceneImgUrl).then(()=>{
        console.log("📕 苦手問題を自動ストック");
      }).catch(()=>{});
    }
    // ストック学習中: 正解ストリーク追跡（3回連続正解で卒業提案）
    if (S.stockMode && S.stockId) {
      updateStockStreak(S.stockId, isCorrect).catch(()=>{});
    }
  }
  // Auto-save vocabulary from this question set (once per qSet)
  if (S.qSet && S.qSet.vocab && S.qSet.vocab.length && !S.qSet._vocabSaved) {
    S.qSet._vocabSaved = true;
    vocabAutoSave(S.qSet.vocab, S.part).then(()=>{
      console.log("📚 vocab auto-saved:", S.qSet.vocab.map(v=>v.word).join(", "));
    }).catch(()=>{});
  }
  render();
}

function advanceQuestion() {
  S.qIdx++;
  // タイマーはQ内で通し（リセットしない）。新しいQのloadNewSetでリセット。
  S.timerFrozen=0;
  render();
}

/* ──────────────────────────────────────────────
   PART 6 TEXT RENDERING (highlight active blank)
────────────────────────────────────────────── */
function renderP6Text(text, activeBlank) {
  const escaped=esc(text);
  return escaped.replace(/\((\d)\)/g, (match, n) => {
    const num=parseInt(n);
    const active=num===activeBlank;
    return `<span class="blank${active?" active":""}">(${n}) _______</span>`;
  });
}

/* ── ストック問題をStudy画面にロード ── */
function loadStockItem(item) {
  stopSpeak();
  S.part=item.part; S.level=item.level;
  S.screen="study"; S.stockMode=true; S.stockId=item.id;
  S.stats={correct:0,wrong:0}; S.streak=0;
  // 音声URLを再生成（Opus / gzip圧縮 / 旧PCM形式に対応）
  if (item.audioOpus) {
    item.qSet._audioUrl = opusToUrl(item.audioOpus);
  } else if (item.audioGzip) {
    decompressB64(item.audioGzip).then(pcm => {
      item.qSet._audioUrl = pcmToUrl(pcm, item.audioRate||12000);
      const pa=document.getElementById("playAudio");
      if(pa){pa.dataset.label="🔊 音声を再生 ✓";pa.textContent="🔊 音声を再生 ✓";}
    }).catch(()=>{});
  } else if (item.audioPcm) {
    item.qSet._audioUrl = pcmToUrl(item.audioPcm, 12000);
  }
  S.qSet=item.qSet;
  S.qSet.part=item.part; // partフィールドを復元
  S.sceneImgUrl=item.imgUrl||null;
  S.imageError=null;
  S.answers=S.qSet.questions.map(()=>({selected:null,answered:false}));
  S.qIdx=0; S.sessionNum=1;
  S.loading=false; S.error=null;
  render();
}

  S.stockPlayIdx++;
  if (S.stockPlayIdx >= S.stockPlaylist.length) {
    // プレイリスト終了
    S.screen="stockSelect"; S.stockMode=false; render(); return;
  }
  loadStockItem(S.stockPlaylist[S.stockPlayIdx]);
}

      ${total>0?`<button class="btn-s" id="stockExportBtn" style="font-size:12px">📤 エクスポート</button>`:""}

    tx.oncomplete=()=>render();
  };
}

    </div>`;

    else inner+=`<div style="font-size:11px;color:#4ade80;text-align:center;margin-top:4px">🔄 自動ストック中...</div>`;
    inner+=`<div style="font-size:11px;color:#64748b;text-align:center;margin-top:4px">ストック済み: ${S.stockCreateCount||0} / ${S.stockCreateTarget}問</div>`;
    // プログレスバー
    const pct=Math.round(((S.stockCreateCount||0)/S.stockCreateTarget)*100);
    inner+=`<div style="margin-top:6px;height:4px;background:#1e293b;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:#4ade80;transition:width 0.3s"></div></div>`;

    body=`<div class="q-card">${inner}</div>`;
  }

  app.innerHTML=`
    <div class="topbar">
      <button class="btn-s" id="backBtn">← 終了</button>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="tag" style="background:rgba(251,191,36,0.15);color:#fbbf24">📦 ${S.stockCreateCount||0}/${S.stockCreateTarget}</span>
        <span class="tag" style="background:rgba(129,140,248,0.15);color:#818cf8">${cp?.label||""}</span>
      </div>
    </div>
    ${body}`;

  // Event handlers
  const rb=$("retryBtn"); if(rb)rb.onclick=()=>{ S.error=null; loadNewSet(); };
  $("backBtn").onclick=()=>{ stopSpeak(); S.stockCreateMode=false; S.stockCreatePaused=false; S.screen="home"; render(); };

  // Audio
  const pa=$("playAudio");
  if (pa&&S.qSet?.audio) {
    pa.onclick=async()=>{
      if (_curAudio) { stopSpeak(); setAudioBtn(pa,"idle"); return; }
      const qs=S.qSet;
      if (qs._audioUrl) {
        setAudioBtn(pa,"playing");
        await playSeq([qs._audioUrl],()=>{setAudioBtn(pa,"idle");});
      } else {
        setAudioBtn(pa,"loading");
        const isConv=S.part==="part3";
        const fn=isConv ? (t,cb)=>speakConv(t,cb,qs.speakers) : speakGemini;
        await fn(qs.audio,(err)=>{
          setAudioBtn(pa,err?"error":"idle",err?String(err).slice(0,100):"");
          // 音声再生成功 → 自動フローに任せる（何もしない）
        });
        if (_curAudio) setAudioBtn(pa,"playing");
      }
    };
  }

  // Pause / Resume
  const sp=$("scPause"); if(sp) sp.onclick=()=>{
    S.stockCreatePaused = !S.stockCreatePaused;
    if (!S.stockCreatePaused) {
      // 再開 → 自動フロー再開
      autoStockAndNext();
    }
    render();
  };

  // Skip
  const sk=$("scSkip"); if(sk) sk.onclick=()=>{
    stopSpeak();
    S.stockCreatePaused = false;
    loadNewSet();
  };
}

/* ── 実力診断画面 ── */
async function renderDiagnosis() {
  const history = await judgeGetAll();
  const total = history.length;

  // パート別集計
  const byPart = {};
  PARTS.forEach(p => { byPart[p.id] = {correct:0, total:0}; });
  history.forEach(h => {
    if (!byPart[h.part]) byPart[h.part] = {correct:0, total:0};
    byPart[h.part].total++;
    if (h.correct) byPart[h.part].correct++;
  });

  // タイプ別集計（正答率の低い順）
  const byType = {};
  history.forEach(h => {
    const key = `${h.part}:${h.type||"unknown"}`;
    if (!byType[key]) byType[key] = {part:h.part, type:h.type||"unknown", correct:0, total:0};
    byType[key].total++;
    if (h.correct) byType[key].correct++;
  });
  const weakTypes = Object.values(byType)
    .filter(t => t.total >= 2) // 最低2問以上
    .map(t => ({...t, rate: Math.round(t.correct/t.total*100)}))
    .sort((a,b) => a.rate - b.rate)
    .slice(0, 8); // 上位8弱点

  // 推定スコア計算
  const lTotal = history.filter(h=>["part1","part2","part3","part4"].includes(h.part));
  const rTotal = history.filter(h=>["part5","part6","part7"].includes(h.part));
  const lRate = lTotal.length > 0 ? lTotal.filter(h=>h.correct).length / lTotal.length : 0;
  const rRate = rTotal.length > 0 ? rTotal.filter(h=>h.correct).length / rTotal.length : 0;
  const lScore = Math.round(lRate * 495);
  const rScore = Math.round(rRate * 495);
  const estScore = lScore + rScore;

  // レベル提案
  let suggestedLevel = "beginner";
  if (estScore >= 800) suggestedLevel = "advanced";
  else if (estScore >= 600) suggestedLevel = "intermediate";
  const suggestedLabel = LEVELS.find(l=>l.id===suggestedLevel)?.label || "";

  // パート別バー
  const partBars = PARTS.map(p => {
    const d = byPart[p.id];
    if (d.total === 0) return "";
    const rate = Math.round(d.correct/d.total*100);
    const color = rate >= 80 ? "#4ade80" : rate >= 60 ? "#fbbf24" : "#f87171";
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
        <span style="color:#cbd5e1">${p.icon} ${p.label}</span>
        <span style="color:${color}">${rate}% (${d.correct}/${d.total})</span>
      </div>
      <div style="height:6px;background:#1e293b;border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${rate}%;background:${color};transition:width 0.3s"></div>
      </div>
    </div>`;
  }).join("");

  // 弱点リスト
  const weakList = weakTypes.length > 0
    ? weakTypes.map(t => {
        const color = t.rate >= 60 ? "#fbbf24" : "#f87171";
        return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span style="font-size:12px;color:#94a3b8">${t.part} / ${t.type}</span>
          <span style="font-size:12px;color:${color};font-weight:700">${t.rate}% (${t.correct}/${t.total})</span>
        </div>`;
      }).join("")
    : `<div style="font-size:12px;color:#64748b">判定データが不足しています</div>`;

  // 全体正答率
  const overallRate = total > 0 ? Math.round(history.filter(h=>h.correct).length/total*100) : 0;

  // 週次比較
  const now=Date.now(), oneWeek=7*24*60*60*1000;
  const thisWeek=history.filter(h=>h.timestamp>now-oneWeek);
  const lastWeek=history.filter(h=>h.timestamp>now-2*oneWeek && h.timestamp<=now-oneWeek);
  let weeklyComparison = "";
  if (thisWeek.length >= 3) {
    const twRate=Math.round(thisWeek.filter(h=>h.correct).length/thisWeek.length*100);
    const lwRate=lastWeek.length>=3 ? Math.round(lastWeek.filter(h=>h.correct).length/lastWeek.length*100) : null;
    const twByPart={};
    thisWeek.forEach(h=>{if(!twByPart[h.part])twByPart[h.part]={c:0,t:0};twByPart[h.part].t++;if(h.correct)twByPart[h.part].c++;});
    const lwByPart={};
    lastWeek.forEach(h=>{if(!lwByPart[h.part])lwByPart[h.part]={c:0,t:0};lwByPart[h.part].t++;if(h.correct)lwByPart[h.part].c++;});
    let partDiffs = Object.keys(twByPart).map(p=>{
      const tw=Math.round(twByPart[p].c/twByPart[p].t*100);
      const lw=lwByPart[p]&&lwByPart[p].t>=2?Math.round(lwByPart[p].c/lwByPart[p].t*100):null;
      const diff=lw!==null?tw-lw:null;
      return {part:p,tw,lw,diff};
    });
    weeklyComparison = `<div style="font-size:12px;color:#94a3b8;margin-bottom:4px">今週: ${twRate}% (${thisWeek.length}問)${lwRate!==null?` ← 先週: ${lwRate}% (${lastWeek.length}問)`:""}</div>`;
    weeklyComparison += partDiffs.map(d=>{
      const arrow=d.diff===null?"":d.diff>0?`<span style="color:#4ade80">▲+${d.diff}%</span>`:d.diff<0?`<span style="color:#f87171">▼${d.diff}%</span>`:`<span style="color:#64748b">→±0</span>`;
      return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0"><span style="color:#94a3b8">${d.part}</span><span>${d.tw}% ${arrow}</span></div>`;
    }).join("");
  } else {
    weeklyComparison = `<div style="font-size:12px;color:#64748b">今週のデータが不足（3問以上必要）</div>`;
  }

  // 改善アドバイス生成
  let adviceItems = [];
  if (weakTypes.length > 0) {
    const worst = weakTypes[0];
    adviceItems.push(`📕 <strong>${worst.part} / ${worst.type}</strong> が正答率${worst.rate}%で最も弱いポイントです。重点的に練習しましょう。`);
  }
  if (lRate < rRate && lTotal.length >= 5) adviceItems.push("🎧 リスニングがリーディングより低いです。Part 3/4のストック学習を増やしましょう。");
  if (rRate < lRate && rTotal.length >= 5) adviceItems.push("📖 リーディングがリスニングより低いです。Part 5/7の演習を増やしましょう。");
  const avgElapsed = history.filter(h=>h.elapsed>0);
  if (avgElapsed.length > 0) {
    const avgSec = Math.round(avgElapsed.reduce((a,h)=>a+h.elapsed,0)/avgElapsed.length);
    if (avgSec > 30) adviceItems.push(`⏱ 平均回答時間${avgSec}秒。本番は1問20-30秒が目安です。スピードを意識しましょう。`);
  }
  if (estScore < 600) adviceItems.push("🎯 600点突破には Part 5 の品詞問題と Part 2 の基本WH問題を固めましょう。");
  else if (estScore < 800) adviceItems.push("🎯 800点突破には Part 7 の推測問題と Part 3 の含意問題がカギです。");
  else adviceItems.push("🎯 900点突破には全パートでケアレスミスを減らし、Part 7 のNOT/クロスリファレンスを完璧にしましょう。");
  const advice = adviceItems.length > 0
    ? adviceItems.map(a=>`<div style="font-size:12px;color:#94a3b8;margin-bottom:6px;line-height:1.5">${a}</div>`).join("")
    : `<div style="font-size:12px;color:#64748b">データが不足しています</div>`;

  app.innerHTML=`
    <div class="header">
      <h1 style="font-size:20px">📊 実力診断</h1>
      <div class="sub">判定データ: ${total}問</div>
    </div>

    ${total === 0 ? `<div style="text-align:center;color:#64748b;padding:40px 0">
      判定データがありません。<br>学習画面で「📊 判定ON」にして問題を解いてください。
    </div>` : `

    <div style="text-align:center;margin:16px 0">
      <div style="font-size:42px;font-weight:800;color:${estScore>=800?"#4ade80":estScore>=600?"#fbbf24":"#f87171"}">${estScore}</div>
      <div style="font-size:13px;color:#64748b">推定TOEICスコア</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:4px">L: ${lScore} (${Math.round(lRate*100)}%) ｜ R: ${rScore} (${Math.round(rRate*100)}%)</div>
    </div>

    <div style="display:flex;gap:8px;justify-content:center;margin:12px 0">
      <div style="text-align:center;padding:8px 16px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06)">
        <div style="font-size:20px;font-weight:700;color:#4ade80">${overallRate}%</div>
        <div style="font-size:10px;color:#64748b">全体正答率</div>
      </div>
      <div style="text-align:center;padding:8px 16px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06)">
        <div style="font-size:20px;font-weight:700;color:#818cf8">${suggestedLabel}</div>
        <div style="font-size:10px;color:#64748b">推奨レベル</div>
      </div>
    </div>

    ${S.level !== suggestedLevel ? `<div style="text-align:center;margin:8px 0">
      <button class="btn-s" id="applyLevelBtn" style="font-size:12px;color:#fbbf24">💡 レベルを「${suggestedLabel}」に変更する</button>
    </div>` : ""}

    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:8px">パート別正答率</div>
      ${partBars}
    </div>

    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:8px">📕 弱点タイプ（正答率の低い順）</div>
      ${weakList}
    </div>

    `}

    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:8px">📈 今週 vs 先週</div>
      ${weeklyComparison}
    </div>

    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:8px">💡 改善アドバイス</div>
      ${advice}
    </div>

    <button class="btn-s" id="diagBackBtn" style="margin:20px auto;display:block">← ホームに戻る</button>
    ${total>0?`<div style="margin-top:40px;text-align:center"><button class="btn-s" id="judgeClearBtn" style="color:#f87171;font-size:11px;opacity:0.6">🗑️ 判定データをリセット</button></div>`:""}`;

  // Handlers
  const db=$("diagBackBtn"); if(db)db.onclick=()=>{S.screen="home";render();};
  const al=$("applyLevelBtn"); if(al)al.onclick=()=>{
    S.level=suggestedLevel;
    al.textContent="✅ 変更しました"; al.disabled=true;
  };
  const jc=$("judgeClearBtn"); if(jc)jc.onclick=async()=>{
    if(!confirm("判定データをすべて削除しますか？")) return;
    await judgeClear();
    render();
  };
}

/* ── 単語帳画面 ── */
async function renderVocab() {
  const words = await vocabGetAll();
  const POS_LABELS = {noun:"名詞",verb:"動詞",adjective:"形容詞",adverb:"副詞",phrase:"フレーズ",other:"その他"};
  const POS_COLORS = {noun:"#60a5fa",verb:"#4ade80",adjective:"#fbbf24",adverb:"#c084fc",phrase:"#f472b6",other:"#94a3b8"};

  function renderWordList(list) {
    if (!list.length) return `<div style="text-align:center;color:#64748b;padding:20px">この品詞の単語はありません</div>`;
    return list.sort((a,b)=>b.timestamp-a.timestamp).map(w => {
      const meanings = (w.meaning||"").split("\n").filter(Boolean);
      const examples = (w.context||"").split("\n").filter(Boolean);
      const posLabel = POS_LABELS[w.pos]||w.pos||"";
      const posColor = POS_COLORS[w.pos]||"#94a3b8";
      let detailHtml;
      if (meanings.length <= 1) {
        detailHtml = `${meanings[0]?`<div style="font-size:12px;color:#818cf8">${esc(meanings[0])}</div>`:""}
          ${examples[0]?`<div style="font-size:11px;color:#94a3b8;margin-top:2px;display:flex;align-items:center;gap:4px"><button class="vocab-play-ex" data-vex="${esc(examples[0])}" style="background:none;border:none;cursor:pointer;font-size:11px;padding:0;flex-shrink:0">🔊</button>${esc(examples[0].slice(0,80))}</div>`:""}`;
      } else {
        detailHtml = meanings.map((m,i) => `<div style="font-size:12px;margin-top:${i?4:0}px">
          <span style="color:#818cf8">${"❶❷❸❹❺"[i]||"•"} ${esc(m)}</span>
          ${examples[i]?`<span style="color:#94a3b8;font-size:11px"> — <button class="vocab-play-ex" data-vex="${esc(examples[i])}" style="background:none;border:none;cursor:pointer;font-size:11px;padding:0;display:inline">🔊</button>${esc(examples[i].slice(0,60))}</span>`:""}
        </div>`).join("");
      }
      return `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:start;gap:6px">
        <button class="vocab-play" data-vword="${esc(w.word)}" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px;flex-shrink:0">🔊</button>
        <div style="flex:1">
          <div style="font-size:14px;color:#e2e8f0;font-weight:600">${esc(w.word)} <span style="font-size:10px;color:${posColor};font-weight:400">${posLabel}</span></div>
          ${detailHtml}
        </div>
        <button class="btn-s" data-vdel="${w.id}" style="font-size:10px;color:#f87171;padding:2px 6px;flex-shrink:0">✕</button>
      </div>`}).join("");
  }

  // Group by POS
  const groups = {};
  words.forEach(w => { const p=w.pos||"other"; if(!groups[p])groups[p]=[]; groups[p].push(w); });
  const posKeys = Object.keys(groups).sort();

  // Tab buttons
  const tabBtns = [`<button class="pos-tab active" data-pos="all">All (${words.length})</button>`]
    .concat(posKeys.map(p => `<button class="pos-tab" data-pos="${p}">${POS_LABELS[p]||p} (${groups[p].length})</button>`)).join("");

  // Tab content
  const allList = renderWordList(words);
  let tabContents = `<div class="pos-content" data-pos="all">${allList}</div>`;
  posKeys.forEach(p => {
    tabContents += `<div class="pos-content" data-pos="${p}" style="display:none">${renderWordList(groups[p])}</div>`;
  });

  app.innerHTML=`
    <div class="header"><h1 style="font-size:20px">📝 単語帳</h1><div class="sub">${words.length}語</div></div>
    ${words.length>=4?`<div style="display:flex;gap:6px;padding:6px 0"><button class="btn-s" id="vocabQuizEnJa" style="flex:1;background:rgba(129,140,248,0.15);color:#818cf8">🧠 英→日 Quiz</button><button class="btn-s" id="vocabQuizJaEn" style="flex:1;background:rgba(244,114,182,0.15);color:#f472b6">🧠 日→英 Quiz</button></div>`:""}
    ${words.length>0?`<div style="text-align:center;padding:4px 0"><button class="btn-s" id="vocabDedupeBtn" style="font-size:11px;color:#64748b">🧹 重複を整理</button> <button class="btn-s" id="vocabRebuildBtn" style="font-size:11px;color:#64748b;margin-left:4px">🔄 ストックから再構築</button></div>`:`<div style="text-align:center;padding:4px 0"><button class="btn-s" id="vocabRebuildBtn" style="font-size:11px;color:#818cf8">🔄 ストックから単語帳を構築</button></div>`}
    <div style="display:flex;gap:4px;overflow-x:auto;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1)">${tabBtns}</div>
    <style>.pos-tab{padding:4px 10px;border-radius:12px;font-size:11px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#94a3b8;cursor:pointer;white-space:nowrap}
    .pos-tab.active{background:rgba(129,140,248,0.2);color:#818cf8;border-color:rgba(129,140,248,0.4)}</style>
    <div id="posTabArea">${tabContents}</div>
    <button class="btn-s" id="vocabBackBtn" style="margin:16px auto;display:block">← ホームに戻る</button>`;

  // Tab switching
  document.querySelectorAll(".pos-tab").forEach(tab=>{
    tab.onclick=()=>{
      document.querySelectorAll(".pos-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      document.querySelectorAll(".pos-content").forEach(c=>c.style.display="none");
      const target=document.querySelector(`.pos-content[data-pos="${tab.dataset.pos}"]`);
      if(target) target.style.display="block";
    };
  });
  // Delete buttons
  document.querySelectorAll("[data-vdel]").forEach(el=>{
    el.onclick=async()=>{ await vocabDelete(parseInt(el.dataset.vdel)); render(); };
  });
  // Pronunciation buttons - words
  document.querySelectorAll(".vocab-play").forEach(btn=>{
    btn.onclick=async()=>{
      const word=btn.dataset.vword;
      if(!word)return;
      btn.textContent="⏳";
      try { await speakGemini(word, ()=>{ btn.textContent="🔊"; }); btn.textContent="🔊"; }
      catch(e){ btn.textContent="🔊"; }
    };
  });
  // Pronunciation buttons - examples
  document.querySelectorAll(".vocab-play-ex").forEach(btn=>{
    btn.onclick=async(e)=>{
      e.stopPropagation();
      const ex=btn.dataset.vex;
      if(!ex)return;
      btn.textContent="⏳";
      try { await speakGemini(ex, ()=>{ btn.textContent="🔊"; }); btn.textContent="🔊"; }
      catch(e2){ btn.textContent="🔊"; }
    };
  });
  $("vocabBackBtn").onclick=()=>{S.screen="home";render();};
  const dd=$("vocabDedupeBtn"); if(dd)dd.onclick=async()=>{
    dd.textContent="⏳ 整理中...";
    const r = await vocabDedupe();
    alert(`✅ 整理完了\n重複削除: ${r.merged}件\n意味統合: ${r.cleanedInternal}件`);
    render();
  };
  const rb=$("vocabRebuildBtn"); if(rb)rb.onclick=async()=>{
    rb.textContent="⏳ 再構築中...";
    const before = (await vocabGetAll()).length;
    const r = await vocabRebuildFromStocks();
    const after = (await vocabGetAll()).length;
    alert(`✅ 再構築完了\nストック: ${r.processed}/${r.total}問にvocabあり\nvocabエントリ: ${r.foundVocab}個を処理\n単語帳: ${before}語 → ${after}語 (+${after-before})`);
    render();
  };
  const qej=$("vocabQuizEnJa"); if(qej)qej.onclick=()=>{S.screen="vocabQuiz";S.vocabQuizMode="en_ja";S.vocabQuizScore={correct:0,total:0};S.vocabQuizQ=null;render();};
  const qje=$("vocabQuizJaEn"); if(qje)qje.onclick=()=>{S.screen="vocabQuiz";S.vocabQuizMode="ja_en";S.vocabQuizScore={correct:0,total:0};S.vocabQuizQ=null;render();};
}

/* ── 単語クイズ画面 ── */
async function renderVocabQuiz() {
  const words = await vocabGetAll();
  if (words.length < 4) { S.screen="vocab"; render(); return; }
  const mode = S.vocabQuizMode || "en_ja";
  const score = S.vocabQuizScore || {correct:0,total:0};

  // Generate question if needed
  if (!S.vocabQuizQ) {
    const target = words[Math.floor(Math.random()*words.length)];
    const others = words.filter(w=>w.word!==target.word);
    const shuffled = others.sort(()=>Math.random()-0.5).slice(0,3);
    const tMeaning = (target.meaning||"").split("\n")[0];
    let choices;
    if (mode === "en_ja") {
      choices = [tMeaning, ...shuffled.map(w=>(w.meaning||"").split("\n")[0])];
    } else {
      choices = [target.word, ...shuffled.map(w=>w.word)];
    }
    const indices = choices.map((_,i)=>i).sort(()=>Math.random()-0.5);
    S.vocabQuizQ = {
      target, tMeaning,
      choices: indices.map(i=>choices[i]),
      correct: indices.indexOf(0),
      answered: null
    };
  }
  const q = S.vocabQuizQ;
  const pct = score.total>0 ? Math.round(score.correct/score.total*100) : 0;

  let html = `
    <div class="header">
      <h1 style="font-size:18px">${mode==="en_ja"?"🇬🇧→🇯🇵 英→日":"🇯🇵→🇬🇧 日→英"} Quiz</h1>
      <div class="sub">${score.correct}/${score.total} (${pct}%)</div>
    </div>
    <div style="text-align:center;padding:24px;background:rgba(15,23,42,0.8);border-radius:16px;margin:12px 0;border:1px solid rgba(255,255,255,0.06)">
      <div style="font-size:${mode==="en_ja"?"32px":"26px"};font-weight:700;color:${mode==="en_ja"?"#e2e8f0":"#818cf8"}">${mode==="en_ja"?esc(q.target.word):esc(q.tMeaning)}</div>
      ${mode==="en_ja"?`<button class="btn-s" id="quizPlayWord" style="margin-top:8px;font-size:12px">🔊 発音</button>`:""}
    </div>
    <div style="font-size:13px;color:#64748b;text-align:center;margin-bottom:10px">${mode==="en_ja"?"この単語の意味は？":"この意味の英単語は？"}</div>`;

  // Choices
  q.choices.forEach((c,i) => {
    const isCorrect = i === q.correct;
    let style = "padding:12px;border-radius:10px;margin:6px 0;text-align:center;font-size:15px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);";
    let disabled = "";
    if (q.answered !== null) {
      disabled = "pointer-events:none;opacity:0.7;";
      if (i === q.answered && isCorrect) style += "background:rgba(74,222,128,0.2);border-color:#4ade80;color:#4ade80;";
      else if (i === q.answered && !isCorrect) style += "background:rgba(248,113,113,0.2);border-color:#f87171;color:#f87171;";
      else if (isCorrect) style += "background:rgba(74,222,128,0.1);border-color:#4ade80;color:#4ade80;";
      else style += "background:transparent;color:#64748b;";
    } else {
      style += "background:rgba(255,255,255,0.03);color:#e2e8f0;";
    }
    html += `<div class="quiz-choice" data-qi="${i}" style="${style}${disabled}">${esc(c)}</div>`;
  });

  // After answer: show example + next
  if (q.answered !== null) {
    const ex = (q.target.context||"").split("\n")[0] || "";
    html += `<div style="margin-top:12px;padding:12px;background:rgba(129,140,248,0.08);border-radius:10px">`;
    html += `<div style="font-size:14px;font-weight:600;color:#e2e8f0">${esc(q.target.word)} — <span style="color:#818cf8">${esc(q.tMeaning)}</span></div>`;
    if (ex) html += `<div style="font-size:12px;color:#94a3b8;margin-top:4px">💬 ${esc(ex)}</div>`;
    html += `<button class="btn-s" id="quizPlayEx" style="margin-top:6px;font-size:11px">🔊 例文を聴く</button>`;
    html += `</div>`;
    html += `<button class="btn-s" id="quizNext" style="margin:14px auto;display:block;padding:10px 32px;background:rgba(129,140,248,0.2);color:#818cf8;font-size:14px;font-weight:600;border-radius:12px">➡️ Next</button>`;
  }
  html += `<button class="btn-s" id="quizBackBtn" style="margin:16px auto;display:block;font-size:12px;color:#64748b">← 単語帳に戻る</button>`;

  app.innerHTML = html;

  // Handlers
  document.querySelectorAll(".quiz-choice").forEach(el=>{
    el.onclick=()=>{
      if(q.answered!==null) return;
      q.answered = parseInt(el.dataset.qi);
      score.total++;
      if(q.answered===q.correct) score.correct++;
      S.vocabQuizScore = score;
      render();
    };
  });
  const pw=$("quizPlayWord"); if(pw)pw.onclick=async()=>{
    pw.textContent="⏳";
    try { await speakGemini(q.target.word, ()=>{pw.textContent="🔊 発音";}); pw.textContent="🔊 発音"; }
    catch(e){pw.textContent="🔊 発音";}
  };
  const pe=$("quizPlayEx"); if(pe)pe.onclick=async()=>{
    const ex = (q.target.context||"").split("\n")[0];
    if(!ex) return;
    pe.textContent="⏳";
    try { await speakGemini(ex, ()=>{pe.textContent="🔊 例文を聴く";}); pe.textContent="🔊 例文を聴く"; }
    catch(e){pe.textContent="🔊 例文を聴く";}
  };
  const nb=$("quizNext"); if(nb)nb.onclick=()=>{ S.vocabQuizQ=null; render(); };
  const bb=$("quizBackBtn"); if(bb)bb.onclick=()=>{ S.screen="vocab"; render(); };
}

/* ── 流し聞きプレイヤー ── */
async function renderListenPlay() {
  const playlist = S.listenPlaylist || [];
  const idx = S.listenIdx || 0;
  if (idx >= playlist.length) {
    app.innerHTML = `<div style="text-align:center;padding:40px"><h2>🎧 流し聞き完了</h2><p style="color:#94a3b8">${playlist.length}問を再生しました</p><button class="btn-s" id="listenBackBtn" style="margin-top:16px">← ホームに戻る</button></div>`;
    $("listenBackBtn").onclick=()=>{S.listenMode=false;S.screen="home";render();};
    return;
  }
  const item = playlist[idx];
  const qs = item.qSet || {};
  const questions = qs.questions || [];
  const partLabel = {part2:"Part 2",part3:"Part 3",part4:"Part 4"}[item.part]||item.part;

  app.innerHTML = `
    <div class="header"><h1 style="font-size:18px">🎧 流し聞き</h1><div class="sub">${idx+1}/${playlist.length} ${partLabel}</div></div>
    <div id="listenStatus" style="text-align:center;padding:20px;font-size:16px;color:#818cf8">🔊 再生中...</div>
    <div id="listenText" style="padding:12px;background:#1e293b;border-radius:12px;margin:12px 0;font-size:13px;color:#94a3b8;max-height:200px;overflow-y:auto"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
      <button class="btn-s" id="listenPauseBtn">⏸️ Pause</button>
      <button class="btn-s" id="listenSkipBtn">⏭️ Skip</button>
      <button class="btn-s" id="listenStopBtn" style="color:#f87171">⏹️ Stop</button>
    </div>`;

  const statusEl = $("listenStatus");
  const textEl = $("listenText");
  let stopped = false;

  $("listenStopBtn").onclick=()=>{ stopped=true; stopSpeak(); S.listenMode=false; S.screen="home"; render(); };
  $("listenSkipBtn").onclick=()=>{ stopped=true; stopSpeak(); S.listenIdx=idx+1; render(); };
  let paused = false;
  $("listenPauseBtn").onclick=()=>{
    paused=!paused;
    $("listenPauseBtn").textContent=paused?"▶️ Resume":"⏸️ Pause";
    if(paused) stopSpeak();
  };

  async function speak(text, onEnd) {
    return new Promise(resolve=>{
      if(stopped){resolve();return;}
      speakGemini(text, (err)=>{ resolve(); });
    });
  }
  async function wait(ms) {
    return new Promise(resolve=>{
      const check=()=>{ if(stopped)return resolve(); if(paused)return setTimeout(check,200); setTimeout(resolve,ms); };
      check();
    });
  }

  // Play sequence
  try {
    // 1. Announce
    statusEl.textContent=`🔊 Question ${idx+1}`;
    await speak(`Question ${idx+1}.`);
    if(stopped) return;

    // 2. Main audio
    const audioText = qs.audio || qs.spoken || qs.talk || qs.conversation || "";
    if(audioText) {
      textEl.textContent = audioText.replace(/\\n/g,"\n");
      statusEl.textContent="🔊 問題再生中...";
      if(item.part==="part3") {
        await speakConv(audioText, ()=>{}, qs.speakers);
      } else {
        await speak(audioText);
      }
    }
    if(stopped) return;

    // 3. Think pause
    statusEl.textContent="⏳ 考え中...";
    await wait(3000);
    if(stopped) return;

    // 4. Answers for each question
    const letters = ["A","B","C","D"];
    for(let qi=0; qi<questions.length; qi++) {
      if(stopped) return;
      const q = questions[qi];
      const correct = q.correct || 0;
      const choices = q.choices || [];
      const correctText = (choices[correct]||"").replace(/^\([A-D]\)\s*/,"");
      const correctLetter = letters[correct] || "A";

      if(questions.length > 1) {
        statusEl.textContent=`🔊 Q${qi+1}: ${q.question?.slice(0,40)}...`;
        await speak(q.question || "");
        await wait(1500);
        if(stopped) return;
      }

      // Read choices (all 4 options)
      if (choices.length > 0) {
        statusEl.textContent=`🔊 選択肢を読み上げ中...`;
        const choicesText = choices.map((c,i)=>`(${letters[i]}) ${c.replace(/^\([A-D]\)\s*/,"")}`).join(". ");
        await speak(choicesText);
        await wait(2500); // pause to think
        if(stopped) return;
      }

      // Answer
      statusEl.textContent=`✅ Answer: ${correctLetter}`;
      textEl.textContent = `Answer: (${correctLetter}) ${correctText}`;
      await speak(`The answer is ${correctLetter}. ${correctText}`);
      await wait(1000);
      if(stopped) return;

      // English explanation
      const explEn = (q.explanation_en || "").trim();
      if(explEn) {
        statusEl.textContent=`💡 ${explEn.slice(0,40)}...`;
        await speak(explEn);
        await wait(1500);
        if(stopped) return;
      } else {
        await wait(500);
      }
    }

    // 5. Auto advance
    statusEl.textContent="➡️ Next...";
    await wait(1500);
    if(!stopped) { S.listenIdx=idx+1; render(); }
  } catch(e) {
    console.error("Listen error:", e);
    if(!stopped) { S.listenIdx=idx+1; render(); }
  }
}
