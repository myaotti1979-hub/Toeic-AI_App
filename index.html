        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書1: ${esc(qs.doc_type_1||"文書")}</div>${hdr1}<div class="passage-txt">${esc(qs.text_1)}</div></div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書2: ${esc(qs.doc_type_2||"文書")}</div>${hdr2}<div class="passage-txt">${esc(qs.text_2)}</div></div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書3: ${esc(qs.doc_type_3||"文書")}</div>${hdr3}<div class="passage-txt">${esc(qs.text_3)}</div></div>`;
        // 和訳は解説の後に表示
      } else if (qs.isDouble) {
        // Double passage
        const hdr1=qs.header_1?`<div class="doc-hdr">${esc(qs.header_1)}</div>`:"";
        const hdr2=qs.header_2?`<div class="doc-hdr">${esc(qs.header_2)}</div>`:"";
        inner+=`<div style="font-size:11px;color:#fbbf24;background:rgba(251,191,36,0.1);padding:4px 10px;border-radius:6px;margin-bottom:10px;display:inline-block">📄📄 ダブルパッセージ</div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書1: ${esc(qs.doc_type_1||"文書")}</div>${hdr1}<div class="passage-txt">${esc(qs.text_1)}</div></div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書2: ${esc(qs.doc_type_2||"文書")}</div>${hdr2}<div class="passage-txt">${esc(qs.text_2)}</div></div>`;
        // 和訳は解説の後に表示
      } else if (qs.text) {
        // Single passage
        const hdr=qs.header?`<div class="doc-hdr">${esc(qs.header)}</div>`:"";
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 ${esc(qs.doc_type||"文書")}</div>${hdr}<div class="passage-txt">${esc(qs.text)}</div></div>`;
        if (qs.graphic) inner+=renderGraphic(qs.graphic);
      }
    }

    // ── Question progress indicator ──
    if (numQ>1) {
      const dots=Array.from({length:numQ},(_,i)=>{
        const a=S.answers[i];
        let cls="q-dot";
        if (i===qi) cls+=" cur";
        else if (a.answered) cls+=(a.selected===qs.questions[i].correct?" ok":" ng");
        return `<span class="${cls}"></span>`;
      }).join("");
      inner+=`<div class="q-prog"><span>問 ${qi+1}/${numQ}</span>${dots}</div>`;
    }

    // ── Question text ──
    if (S.part==="part2" && !answered) {
      inner+=`<div class="q-txt" style="color:#64748b;font-style:italic">（音声を聴いて回答してください）</div>`;
    } else {
      inner+=`<div class="q-txt">${esc(q.question)}</div>`;
    }

    // ── Choices audio button (Part 3/4 only — Part 1/2 includes choices in main audio) ──
    if (isL && (S.part==="part3"||S.part==="part4")) {
      inner+=`<button class="btn-au" id="playChoices" data-label="🔊 選択肢を読み上げ">🔊 選択肢を読み上げ</button>`;
    }

    // ── Choices ──
    const isAudioOnly = (S.part==="part1"||S.part==="part2") && !answered;
    if (isAudioOnly) {
      inner+=`<div style="font-size:12px;color:#64748b;margin-bottom:10px">🎧 音声を聴いてから選択してください（本番と同じ形式）</div>`;
    }
    q.choices.forEach((c,i)=>{
      let cls="choice";
      if (answered) { if(i===q.correct)cls+=" ok"; else if(i===ans.selected)cls+=" ng"; }
      const label = isAudioOnly
        ? ["(A)","(B)","(C)","(D)"][i]
        : esc(c);
      inner+=`<button class="${cls}" data-c="${i}" ${answered?"disabled":""}>${label}</button>`;
    });

    // ── Explanation ──
    if (answered) {
      inner+=`<div class="expl ${isOk?"ok":"ng"}">
        <div class="res" style="color:${isOk?"#4ade80":"#f87171"}">${isOk?"🎉 正解！":"😥 不正解..."}</div>
        <div class="det">${esc(q.explanation_ja||"")}</div>
      </div>`;
      // 和訳トグル（解説の直後に表示 — Part 3,4,6,7）
      if (["part3","part4","part6","part7"].includes(S.part)) {
        const trJa = qs.translation_ja || qs.translation_ja_1;
        let trHtml;
        if (qs.translation_ja_1) {
          trHtml = `<div style="font-size:12px;color:#818cf8;margin-top:8px">文書1:</div><div style="white-space:pre-wrap;font-size:13px;color:#94a3b8">${esc(qs.translation_ja_1)}</div>` + (qs.translation_ja_2?`<div style="font-size:12px;color:#818cf8;margin-top:8px">文書2:</div><div style="white-space:pre-wrap;font-size:13px;color:#94a3b8">${esc(qs.translation_ja_2)}</div>`:"") + (qs.translation_ja_3?`<div style="font-size:12px;color:#818cf8;margin-top:8px">文書3:</div><div style="white-space:pre-wrap;font-size:13px;color:#94a3b8">${esc(qs.translation_ja_3)}</div>`:"");
        } else if (qs.translation_ja) {
          trHtml = `<div style="white-space:pre-wrap;font-size:13px;color:#94a3b8;margin-top:8px">${esc(qs.translation_ja)}</div>`;
        } else {
          trHtml = `<div style="font-size:13px;color:#64748b;margin-top:8px">（この問題には和訳データがありません）</div>`;
        }
        inner+=`<details style="margin-top:10px;padding:10px;background:rgba(251,191,36,0.05);border:1px solid rgba(251,191,36,0.15);border-radius:8px;cursor:pointer"><summary style="color:#fbbf24;font-size:13px;font-weight:600">📖 和訳を表示</summary>${trHtml}</details>`;
      }
      // ── Vocabulary Cards ──
      if (qs.vocab && qs.vocab.length > 0) {
        let vocHtml = qs.vocab.map((v,vi) => `
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <button class="vocab-speak" data-word="${esc(v.word||"")}" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px" title="発音">🔊</button>
            <div style="min-width:100px;font-weight:600;color:#e2e8f0;font-size:13px">${esc(v.word||"")}</div>
            <div style="min-width:60px;color:#818cf8;font-size:12px">${esc(v.ja||"")}</div>
            <div style="color:#94a3b8;font-size:11px;flex:1">${esc(v.example||"")}</div>
          </div>`).join("");
        inner+=`<details open style="margin-top:10px;padding:10px;background:rgba(129,140,248,0.05);border:1px solid rgba(129,140,248,0.15);border-radius:8px">
          <summary style="color:#818cf8;font-size:13px;font-weight:600">📚 Key Vocabulary</summary>
          <div style="margin-top:6px">${vocHtml}</div>
        </details>`;
      }
      // 単語保存ボタン
      inner+=`<div style="margin-top:8px;text-align:center"><button class="btn-s" id="vocabSaveBtn" style="font-size:11px;color:#818cf8">📝 単語を保存</button></div>`;
    }

    body=`<div class="q-card">${inner}</div>`;

    // ストック/ストック解除ボタン（最後の問いに回答済みの場合）
    if (answered && qi===numQ-1) {
      if (S.stockMode) {
        body+=`<button class="btn-s" id="unstockBtn" style="margin:10px auto;display:block;color:#f87171">🗑️ ストック解除</button>`;
        // 卒業チェック（3回連続正解の場合は次のrenderで反映）
      } else {
        const isL=["part1","part2","part3","part4"].includes(S.part);
        const hasAudio=!!(S.qSet._audioOpus||S.qSet._audioPcm);
        if(isL && !hasAudio) body+=`<div style="font-size:11px;color:#fbbf24;text-align:center;margin:6px 0">⚠️ 音声付きで保存するには先に🔊再生してください</div>`;
        body+=`<button class="btn-s" id="stockBtn" style="margin:10px auto;display:block">💾 この問題をストック${isL&&hasAudio?" (音声付き)":""}</button>`;
      }
    }

    if (answered) {
      const isLast=qi===numQ-1;
      if (isLast) {
        if (S.stockMode || S.sessionNum >= SESSION_SIZE) {
          const isLastStock = S.stockMode && S.stockPlayIdx >= S.stockPlaylist.length-1;
          const hasMoreStock = S.stockMode && !isLastStock;
          const msg = S.stockMode ? `ストック問題 (${S.stockPlayIdx+1}/${S.stockPlaylist.length})` : `${SESSION_SIZE}問終了しました`;
          body+=`<div style="text-align:center;padding:20px 0">
            <div style="font-size:20px;font-weight:700;color:#4ade80;margin-bottom:8px">✅ ${msg}</div>
            <div style="font-size:13px;color:#64748b;margin-bottom:16px">正答率: ${rate}%（${S.stats.correct}/${total}）</div>
            ${hasMoreStock?`<button class="btn-p" id="stockNextBtn">📦 次の問題 (${S.stockPlayIdx+2}/${S.stockPlaylist.length}) →</button>`:""}
            <button class="btn-${S.stockMode||isLastStock?"s":"p"}" id="backHomeBtn">${S.stockMode?"📦 ストック一覧に戻る":"ホームに戻る"}</button>
          </div>`;
        } else {
          body+=`<button class="btn-p" id="nextSetBtn">次の問題 (${S.sessionNum+1}/${SESSION_SIZE}) →</button>`;
        }
      } else {
        body+=`<button class="btn-p" id="nextQBtn">次の問い (${qi+2}/${numQ}) →</button>`;
      }
    }
  }

  app.innerHTML=`
    <div class="topbar">
      <button class="btn-s" id="backBtn">← 戻る</button>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="tag" style="background:${cl.color}20;color:${cl.color}">${cl.label}</span>
        <span class="tag" style="background:rgba(129,140,248,0.15);color:#818cf8;font-family:'JetBrains Mono',monospace">${cp.icon} ${cp.label}</span>
        <span class="tag judge-toggle" id="judgeToggle" style="background:${S.judgeMode?"rgba(74,222,128,0.15)":"rgba(100,116,139,0.1)"};color:${S.judgeMode?"#4ade80":"#64748b"};font-size:10px;cursor:pointer">${S.judgeMode?"📊 判定ON":"📊 OFF"}</span>
        <span class="tag" id="timerDisplay" style="background:rgba(100,116,139,0.1);color:#94a3b8;font-size:10px;font-family:monospace">⏱ 0s</span>
        ${S.stockMode
          ?`<span class="tag" style="background:rgba(251,191,36,0.15);color:#fbbf24;font-size:10px">📦 ${S.stockPlayIdx+1}/${S.stockPlaylist.length}</span>`
          :`<span class="tag" style="background:${PART_MODEL[S.part]===GEMINI_PRO?"rgba(168,85,247,0.15)":PART_MODEL[S.part]===GEMINI_FLASH?"rgba(59,130,246,0.15)":"rgba(100,116,139,0.1)"};color:${PART_MODEL[S.part]===GEMINI_PRO?"#a855f7":PART_MODEL[S.part]===GEMINI_FLASH?"#3b82f6":"#64748b"};font-size:10px">${PART_MODEL[S.part]===GEMINI_PRO?"Pro":PART_MODEL[S.part]===GEMINI_FLASH?"Flash":"Lite"}</span>
           <span class="tag" style="background:rgba(251,191,36,0.1);color:#fbbf24">${S.sessionNum}/${SESSION_SIZE}</span>`}
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="sl">出題数</div><div class="sv" style="color:#818cf8">${total}</div></div>
      <div class="stat"><div class="sl">正解</div><div class="sv" style="color:#4ade80">${S.stats.correct}</div></div>
      <div class="stat"><div class="sl">不正解</div><div class="sv" style="color:#f87171">${S.stats.wrong}</div></div>
      <div class="stat"><div class="sl">正答率</div><div class="sv" style="color:#fbbf24">${rate}%</div></div>
    </div>
    ${S.streak>=2?`<div class="streak">🔥 ${S.streak}問連続正解！</div>`:""}
    
    ${body}`;

  // Events
  const jt=$("judgeToggle"); if(jt) jt.onclick=()=>{
    S.judgeMode=!S.judgeMode;
    localStorage.setItem("judgeMode",JSON.stringify(S.judgeMode));
    render();
  };
  // タイマー更新（パート別の本番TOEIC目安時間で色変更）
  // Part 1/2: 音声後5-10秒で回答（選択肢は音声に含まれる）
  // Part 3/4: 設問ごとに8秒（本番の回答インターバル）
  // Part 5: 1問20秒（30問を10分）
  // Part 6: 1問40秒（16問を10分）
  // Part 7 SP: 1問50-60秒 / DP: 1問60-72秒 / TP: 1問72-84秒
  if(!S.stockCreateMode) {
    const td=$("timerDisplay");
    if(td) {
      const isL=["part1","part2","part3","part4"].includes(S.part);
      const numQ=S.qSet?.questions?.length||1;
      // タイマー停止中（解説画面 or Listening音声待ち）
      if(!S.timerStart) {
        if(isL && S.timerFrozen===0 && !S.answers?.[S.qIdx]?.answered) {
          td.textContent="🎧 音声再生後に開始";
          td.style.color="#64748b";
        } else {
          td.textContent=`⏱ ${S.timerFrozen||0}s`;
          td.style.color="#64748b";
        }
      } else {
        // 回答中：パート別の目安時間で色変更（Q全体の合計）
        let warnPerQ=15, dangerPerQ=30;
        if(S.part==="part1"||S.part==="part2") { warnPerQ=5; dangerPerQ=10; }
        else if(S.part==="part3"||S.part==="part4") { warnPerQ=8; dangerPerQ=15; }
        else if(S.part==="part5") { warnPerQ=15; dangerPerQ=25; }
        else if(S.part==="part6") { warnPerQ=37; dangerPerQ=50; }
        else if(S.part==="part7") {
          if(S.qSet?.isTriple)      { warnPerQ=72; dangerPerQ=100; }
          else if(S.qSet?.isDouble) { warnPerQ=65; dangerPerQ=90; }
          else                      { warnPerQ=50; dangerPerQ=75; }
        }
        const warn=warnPerQ*numQ, danger=dangerPerQ*numQ;
        const _ti=setInterval(()=>{
          if(!document.getElementById("timerDisplay")){clearInterval(_ti);return;}
          if(!S.timerStart){clearInterval(_ti);return;}
          const sec=Math.round((Date.now()-S.timerStart)/1000);
          td.textContent=`⏱ ${sec}s`;
          td.style.color=sec>danger?"#f87171":sec>warn?"#fbbf24":"#94a3b8";
        },1000);
      }
    }
  }
  $("backBtn").onclick=()=>{
    if(S.stockMode) { stopSpeak();S.stockMode=false;S.screen="stockSelect";render(); return; }
    if(S.sessionNum>0 && S.sessionNum<SESSION_SIZE) {
      if(!confirm(`セッション進行中です（${S.sessionNum}/${SESSION_SIZE}問完了）。\nホームに戻りますか？`)) return;
    }
    stopSpeak();S.screen="home";render();
  };
  const rb=$("retryBtn"); if(rb)rb.onclick=()=>loadNewSet();
  const nsb=$("nextSetBtn"); if(nsb)nsb.onclick=()=>{stopSpeak();loadNewSet();};
  const nqb=$("nextQBtn"); if(nqb)nqb.onclick=()=>advanceQuestion();
  const bhb=$("backHomeBtn"); if(bhb)bhb.onclick=()=>{
    const wasStock=S.stockMode;
    stopSpeak();S.stockMode=false;S.stockPlaylist=[];
    S.screen=wasStock?"stockSelect":"home";render();
  };
  const snb=$("stockNextBtn"); if(snb)snb.onclick=()=>{ loadNextStockItem(); };
  const stb=$("stockBtn"); if(stb)stb.onclick=async()=>{
    try {
      await stockSave(S.part, S.level, S.qSet, S.sceneImgUrl);
      // Also save vocab to vocab DB
      if (S.qSet.vocab && S.qSet.vocab.length) await vocabAutoSave(S.qSet.vocab, S.part).catch(()=>{});
      stb.textContent="✅ ストック済み"; stb.disabled=true; stb.style.color="#4ade80";
    } catch(e) { stb.textContent="❌ 保存失敗"; console.error(e); }
  };
  const usb=$("unstockBtn"); if(usb)usb.onclick=async()=>{
    try {
      if(S.stockId) await stockDelete(S.stockId);
      usb.textContent="✅ 削除済み"; usb.disabled=true; usb.style.color="#64748b";
    } catch(e) { usb.textContent="❌ 削除失敗"; console.error(e); }
  };
  document.querySelectorAll("[data-c]").forEach(el=>{
    el.onclick=()=>{if(!S.answers[S.qIdx].answered)handleAnswer(parseInt(el.dataset.c));};
  });

  // Audio buttons
  const pa=$("playAudio");
  if (pa&&S.qSet?.audio) {
    pa.onclick=async()=>{
      if (_curAudio) { stopSpeak(); setAudioBtn(pa,"idle"); return; }
      const qs=S.qSet;
      if (qs._audioUrl) {
        setAudioBtn(pa,"playing");
        await playSeq([qs._audioUrl],()=>{setAudioBtn(pa,"idle"); if(!S.timerStart){S.timerStart=Date.now();S.timerFrozen=0;} });
      } else {
        setAudioBtn(pa,"loading");
        const isConv=S.part==="part3";
        const fn=isConv ? (t,cb)=>speakConv(t,cb,qs.speakers) : speakGemini;
        await fn(qs.audio,(err)=>setAudioBtn(pa,err?"error":"idle",err?String(err).slice(0,100):""));
        if (_curAudio) setAudioBtn(pa,"playing");
      }
    };
  }

  const vsb=$("vocabSaveBtn"); if(vsb) vsb.onclick=()=>{
    const word=prompt("保存する単語または表現を入力:");
    if(!word)return;
    const meaning=prompt("意味（日本語）を入力（空欄可）:");
    vocabSave(word.trim(), meaning?.trim()||"", S.qSet?.questions?.[S.qIdx]?.question||"", S.part).then(()=>{
      vsb.textContent="✅ 保存しました"; vsb.disabled=true;
    }).catch(()=>{ vsb.textContent="❌ 保存失敗"; });
  };
  // Vocab pronunciation buttons
  document.querySelectorAll(".vocab-speak").forEach(btn=>{
    btn.onclick=async()=>{
      const word=btn.dataset.word;
      if(!word)return;
      btn.textContent="⏳";
      try { await speakGemini(word, ()=>{ btn.textContent="🔊"; }); btn.textContent="🔊"; }
      catch(e){ btn.textContent="🔊"; }
    };
  });
  const pc=$("playChoices");
  if (pc&&S.qSet?.questions) {
    pc.onclick=async()=>{
      if(_curAudio){stopSpeak();setAudioBtn(pc,"idle");return;}
      const letters=["A","B","C","D"];
      const choiceText=S.qSet.questions[S.qIdx].choices.map((c,i)=>`${letters[i]}. ${c.replace(/^\([A-Da-d]\)\s*/,"").trim()}`).join(". ");
      setAudioBtn(pc,"loading");
      await speakGemini(choiceText,(err)=>setAudioBtn(pc,err?"error":"idle",err?String(err).slice(0,40):""));
      if (_curAudio) setAudioBtn(pc,"playing");
    };
  }
}

function ctxBlock(icon, label, text) {
  return `<div class="ctx-block"><div class="ctx-lbl">${icon} ${label}</div><div class="ctx-txt">${esc(text)}</div></div>`;
}

function renderGraphic(g) {
  if (!g || !g.headers || !g.rows) return "";
  const title = g.title ? `<div style="font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:6px">📊 ${esc(g.title)}</div>` : "";
  const hdr = g.headers.map(h => `<th style="padding:6px 10px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:12px;text-align:left">${esc(h)}</th>`).join("");
  const rows = g.rows.map(row => {
    const cells = row.map(c => `<td style="padding:5px 10px;border:1px solid #334155;font-size:12px;color:#cbd5e1">${esc(String(c))}</td>`).join("");
    return `<tr>${cells}</tr>`;
  }).join("");
  return `<div class="ctx-block">${title}<table style="width:100%;border-collapse:collapse;border-radius:6px;overflow:hidden"><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

// Boot
render();
</script>
</body>
</html>
