        batchHtml += `<option value="__all__">全データ (${all.length}セット)</option>`;
        for (const bid of batchIds) {
          const b = batches[bid];
          const nq = b.items.reduce((s,r) => s + (r.qSet?.questions?.length||0), 0);
          batchHtml += `<option value="${bid}">${b.label} — ${nq}問 (${b.items.length}セット)</option>`;
        }
        batchHtml += "</select>";
      }
      // Per-batch list with delete — inside collapsible
      batchHtml += `<details style="margin-top:8px"><summary style="font-size:12px;color:#f87171;cursor:pointer">🗑️ バッチ管理・削除</summary><div style="margin-top:6px">`;
      for (const bid of batchIds) {
        const b = batches[bid];
        const nq = b.items.reduce((s,r) => s + (r.qSet?.questions?.length||0), 0);
        batchHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:rgba(255,255,255,0.03);border-radius:6px;margin-bottom:4px;font-size:12px">
          <span style="color:#dce6f0">${esc(b.label)} — ${nq}問 (${b.items.length}セット)</span>
          <button class="btn-s" data-del-mock-batch="${bid}" style="font-size:10px;padding:3px 8px;color:#f87171">🗑️</button>
        </div>`;
      }
      batchHtml += `<div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn-s" id="mockPurgeBtn" style="flex:1;font-size:11px;color:#fbbf24">🧹 壊れた問題を浄化</button>
        <button class="btn-s" id="mockClearBtn" style="flex:1;font-size:11px;color:#f87171">🗑️ 全データクリア</button>
      </div></div></details>`;
    }
    $("mockBatchSelect").innerHTML = batchHtml;

    // ── Stock summary ──
    const required_full = {part1:6, part2:25, part3:39, part4:30, part5:30, part6:16, part7:54};
    let html = "<div style='font-weight:600;color:#dce6f0;margin-bottom:6px'>📦 模試ストック状況</div>";
    if (all.length === 0) {
      html += "<div style='color:#7a8ea5;text-align:center;padding:8px'>データがありません。ジェネレーターで模試を生成してJSONをインポートしてください。</div>";
    } else {
      html += `<div style='font-size:11px;color:#a0b4c8;margin-bottom:4px'>${all.length}セット / ${all.reduce((s,r)=>s+(r.qSet?.questions?.length||0),0)}問</div>`;
      html += "<div style='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:10px'>";
      for (const p of ["part1","part2","part3","part4","part5","part6","part7"]) {
        const have = counts[p] || 0;
        const needFull = calcSetsNeeded(p, required_full[p]);
        const needHalf = Math.ceil(needFull / 2);
        const okFull = have >= needFull;
        const okHalf = have >= needHalf;
        const color = okFull ? "#4ade80" : okHalf ? "#fbbf24" : "#f87171";
        html += `<div style='text-align:center;padding:4px;background:rgba(255,255,255,0.03);border-radius:4px;color:${color}'>
          <div style='font-weight:700;color:#a0b4c8'>${p.toUpperCase().replace("PART","P")}</div>
          <div>${have}</div>
          <div style='font-size:9px;color:#7a8ea5'>要 ${needHalf}/${needFull}</div>
        </div>`;
      }
      html += "</div>";
      html += "<div style='font-size:10px;color:#7a8ea5;margin-top:6px'>緑=フル可 / 黄=ハーフ可 / 赤=不足</div>";
    }
    $("mockStockSummary").innerHTML = html;

    // Bind batch management handlers (elements now in DOM)
    document.querySelectorAll("[data-del-mock-batch]").forEach(btn => {
      btn.onclick = async () => {
        const bid = btn.dataset.delMockBatch;
        const label = btn.parentElement.querySelector("span").textContent;
        if (!confirm(`「${label}」を削除しますか？`)) return;
        await mockStockDeleteBatch(bid);
        render();
      };
    });
    const _purgeBtn = $("mockPurgeBtn");
    if (_purgeBtn) _purgeBtn.onclick = async () => {
      if (!confirm("音声や画像が欠損した模試問題を削除します。よろしいですか？")) return;
      try {
        const _all = await mockStockGetAll();
        const _db = await openMockDB();
        let purged = 0;
        for (const item of _all) {
          const v = validateStockItem(item);
          if (!v.ok) {
            await new Promise((resolve, reject) => {
              const tx = _db.transaction("mock","readwrite");
              tx.objectStore("mock").delete(item.id);
              tx.oncomplete = () => { purged++; resolve(); };
              tx.onerror = () => reject(tx.error);
            });
          }
        }
        alert(purged > 0 ? `🧹 ${purged}件削除` : "✅ 壊れた問題なし");
        render();
      } catch(err) { alert("浄化失敗: "+err.message); }
    };
    const _clearBtn = $("mockClearBtn");
    if (_clearBtn) _clearBtn.onclick = async () => {
      if (!confirm("模試データを全て削除しますか？")) return;
      await mockStockClear();
      render();
    };
  })();

  // File import
  $("mockImportFile").onchange = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    try {
      const text = await f.text();
      const items = JSON.parse(text);
      if (!Array.isArray(items)) { alert("JSONフォーマットが不正です（配列ではありません）"); return; }
      const n = await mockStockImport(items);
      let msg = `✅ ${n.added}セット追加`;
      if (n.skipped) msg += `、${n.skipped}セット重複スキップ`;
      if (n.rejected) msg += `\n⚠️ ${n.rejected}セットは音声/画像不完全のため除外されました`;
      alert(msg);
      render();
    } catch(err) {
      alert("インポートエラー: " + err.message);
    }
  };

  document.querySelectorAll("[data-mock-mode]").forEach(btn => {
    btn.onclick = async () => {
      const mode = btn.dataset.mockMode;
      let all = await mockStockGetAll();
      if (all.length === 0) { alert("模試データがありません。先にインポートしてください。"); return; }
      // Filter by selected batch
      const selEl = $("mockBatchSel");
      if (selEl && selEl.value && selEl.value !== "__all__") {
        all = all.filter(s => (s.batchId || "legacy") === selEl.value);
        if (all.length === 0) { alert("選択したバッチにデータがありません。"); return; }
      }
      // Normalize part7s/part7d/part7t → part7 for grouping
      const normPart = p => p && p.startsWith("part7") ? "part7" : p;
      const byPart = {};
      all.forEach(s => { const np = normPart(s.part); if(!byPart[np]) byPart[np]=[]; byPart[np].push(s); });
      const testItems = [];
      const dist = mode === "full" ? MOCK_FULL_DIST
        : mode === "half" ? Object.fromEntries(Object.entries(MOCK_FULL_DIST).map(([k,v])=>[k,Math.ceil(v/2)]))
        : Object.fromEntries(Object.entries(MOCK_FULL_DIST).map(([k,v])=>[k,Math.ceil(v/4)]));  // quarter
      const missing = [];
      for (const [p, qNeeded] of Object.entries(dist)) {
        const setsNeeded = calcSetsNeeded(p, qNeeded);
        const pool = (byPart[p] || []).slice();
        if (pool.length < setsNeeded) missing.push(`${p}: ${pool.length}/${setsNeeded}セット`);
        if (p === "part7") {
          // TOEIC order: Single → Double → Triple
          const singles = pool.filter(s => s.part === "part7s" || s.part === "part7");
          const doubles = pool.filter(s => s.part === "part7d");
          const triples = pool.filter(s => s.part === "part7t");
          singles.sort(()=>Math.random()-0.5);
          doubles.sort(()=>Math.random()-0.5);
          triples.sort(()=>Math.random()-0.5);
          const ordered = [...singles, ...doubles, ...triples];
          testItems.push(...ordered.slice(0, setsNeeded).map(s => ({...s, _mockTargetQ: qNeeded})));
        } else {
          pool.sort(()=>Math.random()-0.5);
          testItems.push(...pool.slice(0, setsNeeded).map(s => ({...s, _mockTargetQ: qNeeded})));
        }
      }
      if (missing.length > 0) {
        if (!confirm(`以下のパートが不足しています:\n${missing.join('\n')}\n\n不足分はそのまま進めますか？`)) return;
      }
      S.mockItems = testItems;
      S.mockMode = mode;
      // Flatten to count total questions, trim to exactly 200 (or 100 for half)
      let totalQ = testItems.reduce((s,it) => s + (it.qSet?.questions?.length || 0), 0);
      const targetQ = mode === "full" ? 200 : mode === "half" ? 100 : 50;
      // If over target, remove questions from the last set
      while (totalQ > targetQ && testItems.length > 0) {
        const lastItem = testItems[testItems.length - 1];
        const qs = lastItem.qSet?.questions;
        if (qs && qs.length > 1) { qs.pop(); totalQ--; }
        else { testItems.pop(); totalQ -= (qs?.length || 0); }
      }
      S.mockIdx = 0; S.mockQIdx = 0;
      S.mockAnswers = [];
      S.mockStartTime = Date.now();
      // Timer limit: Full=120min, Half=60min
      const timerToggle = $("mockTimerToggle");
      S.mockTimerEnabled = timerToggle && timerToggle.checked;
      S.mockTimeLimit = S.mockTimerEnabled ? (mode === "full" ? 7200 : mode === "half" ? 3600 : 1800) : 0;
      S.screen = "mockTest";
      render();
    };
  });

  $("mockBackBtn").onclick = () => { S.screen = "home"; render(); };
}

/* ─ MOCK STOCK (separate IndexedDB store) ─ */
const MOCK_DB = "toeic-mock-v1";
function openMockDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(MOCK_DB, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("mock")) {
        db.createObjectStore("mock", {keyPath:"id", autoIncrement:true});
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function mockStockGetAll() {
  const db = await openMockDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("mock","readonly");
    const req = tx.objectStore("mock").getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function mockStockImport(items) {
  const db = await openMockDB();
  const existing = await mockStockGetAll();
  const seen = new Set(existing.map(r => r.createdAt));
  let added = 0, skipped = 0, rejected = 0;
  for (const item of items) {
    if (!item.part || !item.qSet) { rejected++; continue; }
    // Reject listening items without audio
    const isListening = ["part1","part2","part3","part3_3p","part4"].includes(item.part);
    if (isListening && !item.audioOpus && !item.audioPcm) {
      console.warn("[MOCK IMPORT] Rejecting listening item without audio:", item.part);
      rejected++; continue;
    }
    // Reject Part 1 without image
    if (item.part === "part1" && !item.imgUrl) {
      console.warn("[MOCK IMPORT] Rejecting Part 1 without image");
      rejected++; continue;
    }
    // Graphic questions: table data validated at display time (image optional)
    if (item.qSet && item.qSet.graphic) {
      const g = item.qSet.graphic;
      if (!g.headers || !g.rows || !g.rows.length) {
        console.warn("[MOCK IMPORT] Rejecting graphic question without table data");
        rejected++; continue;
      }
    }
    const ts = item.createdAt || Date.now();
    if (seen.has(ts)) { skipped++; continue; }
    seen.add(ts);
    const data = {part:item.part, level:item.level, qSet:item.qSet,
                  imgUrl:item.imgUrl||null, audioOpus:item.audioOpus||null, audioPcm:item.audioPcm||null,
                  batchId:item.batchId||null, batchLabel:item.batchLabel||null,
                  createdAt: ts};
    await new Promise((resolve, reject) => {
      const tx = db.transaction("mock","readwrite");
      tx.objectStore("mock").add(data);
      tx.oncomplete = () => { added++; resolve(); };
      tx.onerror = () => reject(tx.error);
    });
  }
  return {added, skipped, rejected};
}
async function mockStockClear() {
  const db = await openMockDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("mock","readwrite");
    tx.objectStore("mock").clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function mockStockDeleteBatch(batchId) {
  const db = await openMockDB();
  const all = await mockStockGetAll();
  let deleted = 0;
  for (const item of all) {
    if ((item.batchId || "legacy") === batchId) {
      await new Promise((resolve, reject) => {
        const tx = db.transaction("mock","readwrite");
        tx.objectStore("mock").delete(item.id);
        tx.oncomplete = () => { deleted++; resolve(); };
        tx.onerror = () => reject(tx.error);
      });
    }
  }
  console.log(`[MOCK] Deleted batch ${batchId}: ${deleted} items`);
  return deleted;
}

function renderMockTest() {
  const items = S.mockItems || [];
  if (S.mockIdx >= items.length) { S.screen = "mockResult"; render(); return; }
  const item = items[S.mockIdx];
  const qs = item.qSet || {};
  const questions = qs.questions || [];
  const q = questions[S.mockQIdx];
  if (!q) {
    S.mockIdx++; S.mockQIdx = 0;
    render(); return;
  }

  // Unique key for this question (to detect question change vs timer update)
  const qKey = `${S.mockIdx}_${S.mockQIdx}`;
  const isTimerOnly = (S._lastMockQKey === qKey);
  S._lastMockQKey = qKey;

  // Timer-only update: just refresh the clock, don't rebuild DOM
  if (isTimerOnly) {
    const timerEl = document.getElementById("mockTimer");
    if (timerEl) {
      const elapsed = Math.floor((Date.now() - S.mockStartTime) / 1000);
      if (S.mockTimeLimit > 0) {
        const remaining = Math.max(0, S.mockTimeLimit - elapsed);
        const rm = String(Math.floor(remaining/60)).padStart(2,"0");
        const rs = String(remaining%60).padStart(2,"0");
        timerEl.textContent = `⏱️ 残り ${rm}:${rs}`;
        timerEl.style.color = remaining < 300 ? "#f87171" : remaining < 600 ? "#fbbf24" : "";
      } else {
        timerEl.textContent = `⏱️ ${String(Math.floor(elapsed/60)).padStart(2,"0")}:${String(elapsed%60).padStart(2,"0")}`;
      }
    }
    setTimeout(() => { if (S.screen === "mockTest") render(); }, 1000);
    return;
  }

  // Full rebuild (question changed)
  // Total progress
  let totalQ = 0, doneQ = 0;
  items.forEach((it, ii) => {
    const qq = (it.qSet?.questions || []).length;
    totalQ += qq;
    if (ii < S.mockIdx) doneQ += qq;
    else if (ii === S.mockIdx) doneQ += S.mockQIdx;
  });
  const elapsed = Math.floor((Date.now() - S.mockStartTime) / 1000);
  let timerDisplay;
  if (S.mockTimeLimit > 0) {
    const remaining = Math.max(0, S.mockTimeLimit - elapsed);
    const rm = String(Math.floor(remaining/60)).padStart(2,"0");
    const rs = String(remaining%60).padStart(2,"0");
    const timerColor = remaining < 300 ? "color:#f87171" : remaining < 600 ? "color:#fbbf24" : "";
    timerDisplay = `<span id="mockTimer" style="${timerColor}">⏱️ 残り ${rm}:${rs}</span>`;
  } else {
    const mm = String(Math.floor(elapsed/60)).padStart(2,"0");
    const ss = String(elapsed%60).padStart(2,"0");
    timerDisplay = `<span id="mockTimer">⏱️ ${mm}:${ss}</span>`;
  }

  let html = `
    <div class="header" style="display:flex;justify-content:space-between;align-items:center">
      <div><h1 style="font-size:16px">🎯 模試 ${item.part.toUpperCase()}</h1>
        <div class="sub">${doneQ+1}/${totalQ}問 | ${timerDisplay}</div></div>
      <button class="btn-s" id="mockAbortBtn" style="font-size:11px;color:#f87171">中断</button>
    </div>`;

  // Audio (Part 1-4) — cache blob URL on item to avoid recreating
  if (["part1","part2","part3","part4"].includes(item.part) && (item.audioOpus || item.audioPcm)) {
    if (!item._blobUrl) {
      item._blobUrl = stockAudioUrl(item);
    }
    // autoplay only on first sub-question of this set
    const autoplay = S.mockQIdx === 0 ? "autoplay" : "";
    html += `<div style="margin:8px 0"><audio id="mockAudio" controls ${autoplay} style="width:100%;height:36px" src="${item._blobUrl}"></audio></div>`;
  } else if (["part1","part2","part3","part4"].includes(item.part)) {
    html += `<div style="margin:8px 0;padding:6px;background:#7f1d1d;border-radius:6px;font-size:12px">⚠️ 音声データなし</div>`;
  }

  // Image
  if (item.imgUrl) {
    html += `<div style="margin:8px 0"><img src="${item.imgUrl}" style="width:100%;border-radius:8px"></div>`;
  }

  // Graphic table (if available — shown alongside image for reference, or as fallback if no image)
  if (qs.graphic) {
    html += renderGraphic(qs.graphic);
  }

  // Reading text (Part 5/6/7 including part7s/part7d/part7t)
  const isReadingPart = item.part === "part6" || item.part.startsWith("part7");
  if (isReadingPart) {
    const docType = qs.doc_type || qs.doc_type_1 || "";
    if (qs.text || qs.text_1) {
      const docs = [];
      if (qs.text_1) {
        // Multi-passage (double/triple)
        const dt1 = qs.doc_type_1 || "";
        if (qs.header_1) docs.push(`<pre style='background:#1e2d3d;padding:8px;border-radius:6px;font-size:11px;white-space:pre-wrap'>${esc(normText(qs.header_1))}</pre>`);
        docs.push(`<div style='font-size:13px;line-height:1.9;color:#b8cce8'>${formatPassage(qs.text_1, dt1)}</div>`);
        if (qs.text_2) {
          const dt2 = qs.doc_type_2 || "";
          if (qs.header_2) docs.push(`<pre style='background:#1e2d3d;padding:8px;border-radius:6px;font-size:11px;margin-top:12px;white-space:pre-wrap'>${esc(normText(qs.header_2))}</pre>`);
          docs.push(`<div style='font-size:13px;line-height:1.9;color:#b8cce8;margin-top:8px'>${formatPassage(qs.text_2, dt2)}</div>`);
        }
        if (qs.text_3) {
          const dt3 = qs.doc_type_3 || "";
          if (qs.header_3) docs.push(`<pre style='background:#1e2d3d;padding:8px;border-radius:6px;font-size:11px;margin-top:12px;white-space:pre-wrap'>${esc(normText(qs.header_3))}</pre>`);
          docs.push(`<div style='font-size:13px;line-height:1.9;color:#b8cce8;margin-top:8px'>${formatPassage(qs.text_3, dt3)}</div>`);
        }
      } else {
        // Single passage (or Part 6)
        if (qs.header) docs.push(`<pre style='background:#1e2d3d;padding:8px;border-radius:6px;font-size:11px;white-space:pre-wrap'>${esc(normText(qs.header))}</pre>`);
        if (item.part === "part6") {
          // Part 6: show blanks
          docs.push(`<div style='font-size:13px;line-height:1.9;color:#b8cce8'>${formatP6(qs.text, q.blank||0)}</div>`);
        } else {
          docs.push(`<div style='font-size:13px;line-height:1.9;color:#b8cce8'>${formatPassage(qs.text, docType)}</div>`);
        }
      }
      html += `<div style='margin:8px 0;padding:12px;background:#243040;border-radius:10px;max-height:400px;overflow-y:auto'>${docs.join("")}</div>`;
    }
  } else if (item.part === "part5") {
    html += `<div style='margin:12px 0;padding:12px;background:#243040;border-radius:10px;font-size:14px;line-height:1.6'>${formatPassage(q.question)}</div>`;
  }

  // Question (not shown for Part 1/2 — audio-only in real TOEIC)
  const isAudioOnlyPart = ["part1","part2"].includes(item.part);
  if (item.part === "part5") {
    // Part 5: question IS the sentence
  } else if (isAudioOnlyPart) {
    html += `<div style='margin:12px 0;font-size:12px;color:#7a8ea5'>🎧 音声を聴いて正しい選択肢を選んでください</div>`;
  } else {
    html += `<div style='margin:12px 0;font-weight:600;font-size:14px'>Q${S.mockQIdx+1}. ${esc(q.question)}</div>`;
  }

  // Choices (Part 1/2: labels only, no English text — matches real TOEIC)
  const choices = q.choices || [];
  const letters = ["(A)","(B)","(C)","(D)"];
  choices.forEach((c, ci) => {
    const label = isAudioOnlyPart ? letters[ci] : esc(c);
    html += `<button class="mock-choice" data-ci="${ci}" style="display:block;width:100%;text-align:left;padding:10px 12px;margin:4px 0;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-size:13px;color:#dce6f0;cursor:pointer">${label}</button>`;
  });

  app.innerHTML = html;

  document.querySelectorAll(".mock-choice").forEach(btn => {
    btn.onclick = () => {
      const sel = parseInt(btn.dataset.ci);
      const isCorrect = sel === q.correct;
      const normPart = p => p && p.startsWith("part7") ? "part7" : p;
      S.mockAnswers.push({part: item.part, normPart: normPart(item.part), correct: isCorrect,
        level: item.level||"intermediate", type: qs._questionType||qs.talk_type||qs.doc_type||"unknown"});
      // Save to judgeDB for weakness analysis
      const qText = q.question || qs.sentence || qs.spoken || "";
      const elapsed = Math.floor((Date.now() - S.mockStartTime) / 1000);
      judgeSave(item.part, item.level||"intermediate",
        qs._questionType||qs.talk_type||qs.doc_type||"unknown",
        S.mockQIdx, isCorrect, qText, elapsed).catch(()=>{});
      // Advance
      S.mockQIdx++;
      if (S.mockQIdx >= questions.length) {
        S.mockIdx++;
        S.mockQIdx = 0;
      }
      // Check if part target reached (using normalized part for part7s/d/t)
      const targetQ = item._mockTargetQ;
      const np = normPart(item.part);
      const partAnswered = S.mockAnswers.filter(a => (a.normPart||a.part) === np).length;
      if (targetQ && partAnswered >= targetQ) {
        // Skip remaining items of this normalized part
        while (S.mockIdx < S.mockItems.length && normPart(S.mockItems[S.mockIdx].part) === np) {
          S.mockIdx++;
        }
      }
      render();
    };
  });
  $("mockAbortBtn").onclick = () => {
    if (confirm("模試を中断してホームに戻りますか？\n途中結果は破棄されます。")) {
      S.mockMode = null; S.mockItems = []; S.mockAnswers = [];
      S.screen = "home"; render();
    }
  };

  // Auto-update timer
  setTimeout(() => { if (S.screen === "mockTest") render(); }, 1000);
}

function renderMockResult() {
  const answers = S.mockAnswers || [];
  const elapsed = Math.floor((Date.now() - S.mockStartTime) / 1000);
  const mm = Math.floor(elapsed / 60);

  // Normalize part7s/d/t → part7
  const normPart = p => p && p.startsWith("part7") ? "part7" : p;

  // Per-part stats (normalized)
  const partStats = {};
  for (const a of answers) {
    const np = a.normPart || normPart(a.part);
    if (!partStats[np]) partStats[np] = {correct:0, total:0};
    partStats[np].total++;
    if (a.correct) partStats[np].correct++;
  }

  // Section totals
  const lParts = ["part1","part2","part3","part4"];
  const rParts = ["part5","part6","part7"];
  let lCorrect=0, lTotal=0, rCorrect=0, rTotal=0;
  for (const p of lParts) {
    if (partStats[p]) { lCorrect += partStats[p].correct; lTotal += partStats[p].total; }
  }
  for (const p of rParts) {
    if (partStats[p]) { rCorrect += partStats[p].correct; rTotal += partStats[p].total; }
  }

  // Score: scale to 100 questions per section, then look up score
  const lScaled = lTotal > 0 ? Math.round(lCorrect / lTotal * 100) : 0;
  const rScaled = rTotal > 0 ? Math.round(rCorrect / rTotal * 100) : 0;
  const lScore = scoreFromRaw(lScaled, true);
  const rScore = scoreFromRaw(rScaled, false);
  const totalScore = lScore + rScore;

  // Save to mock history (localStorage)
  const modeLabel = S.mockMode === "full" ? "200問" : S.mockMode === "half" ? "100問" : "50問";
  const historyEntry = {
    date: Date.now(), mode: S.mockMode, modeLabel,
    score: totalScore, lScore, rScore,
    lCorrect, lTotal, rCorrect, rTotal,
    elapsed, partStats
  };
  try {
    const hist = JSON.parse(localStorage.getItem("mockHistory")||"[]");
    hist.push(historyEntry);
    // Keep last 50 entries
    if (hist.length > 50) hist.splice(0, hist.length - 50);
    localStorage.setItem("mockHistory", JSON.stringify(hist));
  } catch(e) { console.warn("[MOCK HISTORY] Save failed:", e); }

  // Stylish score display
  const lLevel = lScore >= 400 ? "🥇" : lScore >= 300 ? "🥈" : lScore >= 200 ? "🥉" : "📚";
  const rLevel = rScore >= 400 ? "🥇" : rScore >= 300 ? "🥈" : rScore >= 200 ? "🥉" : "📚";

  let partTable = "";
  for (const p of [...lParts, ...rParts]) {
    if (!partStats[p]) continue;
    const s = partStats[p];
    const pct = Math.round(s.correct/s.total*100);
    const color = pct >= 80 ? "#4ade80" : pct >= 60 ? "#fbbf24" : "#f87171";
    partTable += `<div style='display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px'>
      <span style='color:#a0b4c8'>${p.toUpperCase()}</span>
      <span style='color:${color};font-weight:600'>${s.correct}/${s.total} (${pct}%)</span>
    </div>`;
  }

  app.innerHTML = `
    <div class="header" style="display:flex;justify-content:space-between;align-items:center">
      <div><h1 style="font-size:22px;margin:0">🎯 模試結果</h1>
      <div class="sub">${modeLabel} | ⏱️ ${mm}分</div></div>
      <button class="btn-s" id="mockHomeBtn" style="font-size:12px;padding:6px 14px">← 戻る</button>
    </div>

    <div style="text-align:center;margin:24px 0;padding:24px;background:linear-gradient(135deg,rgba(129,140,248,0.15),rgba(244,114,182,0.15));border-radius:16px;border:1px solid rgba(129,140,248,0.3)">
      <div style="font-size:11px;color:#a0b4c8;letter-spacing:2px">YOUR ESTIMATED SCORE</div>
      <div style="font-size:56px;font-weight:900;color:#dce6f0;margin:8px 0;letter-spacing:-2px">${totalScore}<span style="font-size:24px;color:#7a8ea5">/990</span></div>
      <div style="display:flex;gap:16px;justify-content:center;margin-top:12px">
        <div><div style="font-size:11px;color:#a0b4c8">${lLevel} Listening</div><div style="font-size:24px;font-weight:700;color:#7b9cf7">${lScore}</div><div style="font-size:10px;color:#7a8ea5">${lCorrect}/${lTotal} (${Math.round(lCorrect/Math.max(lTotal,1)*100)}%)</div></div>
        <div><div style="font-size:11px;color:#a0b4c8">${rLevel} Reading</div><div style="font-size:24px;font-weight:700;color:#f472b6">${rScore}</div><div style="font-size:10px;color:#7a8ea5">${rCorrect}/${rTotal} (${Math.round(rCorrect/Math.max(rTotal,1)*100)}%)</div></div>
      </div>
    </div>

    <div style="margin:16px 0">
      <div style="font-size:13px;font-weight:700;color:#dce6f0;margin-bottom:6px">📊 パート別正答率</div>
      <div style="background:#243040;border-radius:10px;padding:4px 0">${partTable}</div>
    </div>

    <div style="margin:16px 0;padding:12px;background:rgba(251,191,36,0.05);border:1px solid rgba(251,191,36,0.15);border-radius:10px;font-size:11px;color:#a0b4c8">
      💡 これは公式問題集5の換算表に基づく目安です。実際の本番では±50点程度の誤差があります。
    </div>

    <button class="btn-p" id="mockRetryBtn" style="margin-top:16px">🔄 もう一度</button>
    <div style="margin-top:8px;text-align:center;font-size:11px;color:#4ade80">✅ 判定データに記録済み（実力診断に反映されます）</div>
    ${(()=>{
      try {
        const hist = JSON.parse(localStorage.getItem("mockHistory")||"[]");
        if (hist.length <= 1) return "";
        const recent = hist.slice(-10).reverse();
        let rows = recent.map(h => {
          const d = new Date(h.date);
          const dt = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
          const col = h.score >= 800 ? "#4ade80" : h.score >= 600 ? "#fbbf24" : "#f87171";
          return `<div style="display:flex;justify-content:space-between;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px">
            <span style="color:#a0b4c8">${dt} (${h.modeLabel||h.mode})</span>
            <span style="color:${col};font-weight:600">${h.score} <span style="color:#7a8ea5;font-weight:400">L${h.lScore} R${h.rScore}</span></span>
          </div>`;
        }).join("");
        return `<div style="margin-top:20px"><div style="font-size:13px;font-weight:700;color:#dce6f0;margin-bottom:6px">📈 模試スコア履歴</div><div style="background:#243040;border-radius:10px;padding:4px 0">${rows}</div></div>`;
      } catch(e) { return ""; }
    })()}`;

  $("mockRetryBtn").onclick = () => { S.screen = "mockSetup"; render(); };
  $("mockHomeBtn").onclick = () => { S.screen = "home"; render(); };
}

    </div>
    ${groups}
    <div style="text-align:center;font-size:10px;color:#7a8ea5;margin-top:4px">▶通常 🆕未回答 🔥苦手特訓</div>
    <div id="judgeHomeToggle" style="text-align:center;margin-top:10px;cursor:pointer">
      <span style="display:inline-block;padding:6px 16px;border-radius:8px;font-size:13px;font-weight:600;background:${S.judgeMode?"rgba(74,222,128,0.12)":"rgba(100,116,139,0.08)"};color:${S.judgeMode?"#4ade80":"#64748b"};border:1px solid ${S.judgeMode?"rgba(74,222,128,0.3)":"rgba(100,116,139,0.15)"}">
        ${S.judgeMode?"📊 判定モード ON — 回答を記録中":"📊 判定モード OFF — タップでON"}
      </span>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
      <button class="btn-s" id="stockManageBtn" style="color:#60a5fa">📦+ 問題生成・管理</button>
      <button class="btn-s" id="listenModeBtn" style="color:#7b9cf7">🎧 流し聞き</button>
      <button class="btn-s" id="mockTestBtn" style="color:#fbbf24">🎯 模試</button>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:14px">
      <button class="btn-s" id="diagnosisBtn" style="flex:1;padding:14px 0;font-size:15px;font-weight:700;background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.25);color:#4ade80">📊 実力診断</button>
      <button class="btn-s" id="vocabBtn" style="flex:1;padding:14px 0;font-size:15px;font-weight:700;background:rgba(129,140,248,0.08);border-color:rgba(129,140,248,0.25);color:#7b9cf7">📝 単語帳</button>

    <div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
      <button class="btn-s" id="homeExportBtn" style="font-size:12px;color:#60a5fa">📤 エクスポート</button>
      <button class="btn-s" id="homeImportBtn" style="font-size:12px;color:#4ade80">📥 インポート</button>

      <button class="btn-s" id="changeKey">🔑 APIキー変更</button>
    </div>`;

  // Async: load stock counts and IRT level
  stockCountByPart().then(counts => {
    for (const p of PARTS) {
      const el = document.getElementById(`sc_${p.id}`);
      if (el) el.textContent = counts[p.id] ? `${counts[p.id]}問` : "0";
    }
  });
  judgeGetAll().then(history => {
    const toeicH = history.filter(h => h.part !== "vocab");
    const el = $("homeLevel");
    if (!el) return;
    if (toeicH.length < 5) {
      el.innerHTML = `<div style="font-size:10px;color:#7a8ea5;letter-spacing:1px">ESTIMATED LEVEL</div>
        <div style="font-size:15px;font-weight:700;color:#94a3b8;margin-top:2px">データ不足（${toeicH.length}/5問）</div>
        <div style="font-size:10px;color:#7a8ea5">学習を進めると実力レベルが表示されます</div>`;
      return;
    }
    const rate = toeicH.filter(h=>h.correct).length / toeicH.length;
    const estLevel = rate >= 0.75 ? "advanced" : rate >= 0.5 ? "intermediate" : "beginner";
    const lvInfo = LEVELS.find(l=>l.id===estLevel);
    // Simple IRT score
    const SCORE_TABLE = {
      beginner:[[0,200],[0.50,300],[0.70,400],[0.85,600],[1.00,950]],
      intermediate:[[0,200],[0.40,400],[0.60,600],[0.83,800],[1.00,960]],
      advanced:[[0,200],[0.30,500],[0.45,700],[0.60,800],[0.80,900],[1.00,980]]
    };
    function irt(acc, lv) {
      const t = SCORE_TABLE[lv]||SCORE_TABLE.intermediate;
      for (let i=1;i<t.length;i++) { if (acc<=t[i][0]) { const [x0,y0]=t[i-1],[x1,y1]=t[i]; return Math.round(y0+(acc-x0)/(x1-x0)*(y1-y0)); } }
      return t[t.length-1][1];
    }
    const byLv = {};
    toeicH.forEach(h => {
      const lv = h.level||"intermediate";

      byLv[lv].t++; if (h.correct) byLv[lv].c++;
    });
    let ws=0, wt=0;
    for (const [lv,d] of Object.entries(byLv)) {
      if (d.t>=2) { const s=irt(d.c/d.t,lv); ws+=s*d.t; wt+=d.t; }
    }
    const estScore = wt>0 ? Math.round(ws/wt) : 0;

  }).catch(()=>{});

      const items = await stockGetAllLight(el.dataset.homeRnd);

      for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]];}

      await loadStockItem(items[0].id);
    };
  });
  document.querySelectorAll("[data-home-new]").forEach(el=>{
    el.onclick=async()=>{
      el.textContent="⏳";
      const items = await stockGetAllLight(el.dataset.homeNew);
      if(!items.length){alert("このパートのストックがありません。");el.textContent="🆕";return;}
      const unplayed = items.filter(it=>!it.lastPracticed);
      if(!unplayed.length){alert("未回答の問題がありません。全問回答済みです。");el.textContent="🆕";return;}
      for(let i=unplayed.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[unplayed[i],unplayed[j]]=[unplayed[j],unplayed[i]];}
      S._stockReturnScreen = "home";
      S.stockPlaylist = unplayed.map(it=>({id:it.id, part:it.part}));
      S.stockPlayIdx = 0; S._stockPlaylistActive = false;
      await loadStockItem(unplayed[0].id);
    };
  });
  document.querySelectorAll("[data-home-weak]").forEach(el=>{
    el.onclick=async()=>{
      el.textContent="⏳";
      const partId = el.dataset.homeWeak;
      try {
        const history = await judgeGetAll();
        const partH = history.filter(h => h.part === partId);
        if (partH.length < 3) { alert("このパートの判定データが不足しています。\nまず通常学習か模試で問題を解いてください。"); el.textContent="🔥"; return; }
        // Find weak types (accuracy < 70%)
        const byType = {};
        partH.forEach(h => {
          const t = h.type||"unknown";
          if (!byType[t]) byType[t] = {c:0,t:0};
          byType[t].t++; if (h.correct) byType[t].c++;
        });
        const weakTypes = Object.entries(byType)
          .filter(([t,d]) => d.t >= 2 && d.c/d.t < 0.7)
          .map(([t,d]) => t);
        if (!weakTypes.length) { alert("苦手タイプが見つかりません（全タイプ70%以上）。\nもっと学習データを蓄積してください。"); el.textContent="🔥"; return; }
        // Load stock items and filter by weak types
        const items = await stockGetAllLight(partId);
        const weakItems = items.filter(it => weakTypes.includes(it.qSet?._questionType));
        if (!weakItems.length) { alert(`苦手タイプ（${weakTypes.join(", ")}）のストック問題がありません。\n問題を生成してストックしてください。`); el.textContent="🔥"; return; }
        for(let i=weakItems.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[weakItems[i],weakItems[j]]=[weakItems[j],weakItems[i]];}
        S._stockReturnScreen = "home";
        S.stockPlaylist = weakItems.map(it=>({id:it.id, part:it.part}));

        await loadStockItem(weakItems[0].id);
      } catch(e) { alert("苦手分析に失敗: "+e.message); el.textContent="🔥"; }

  // Navigation handlers
  $("stockManageBtn").onclick=()=>{ S.screen="stockSelect"; render(); };
  $("listenModeBtn").onclick=async()=>{
    const [p2, p3, p4] = await Promise.all([
      stockGetAllLight("part2"), stockGetAllLight("part3"), stockGetAllLight("part4")

    const listenStocks = [...p2, ...p3, ...p4];
    if(listenStocks.length===0){alert("Listening問題のストックがありません。");return;}
    S.screen = "listenSetup";
    S.listenAllStocks = listenStocks;
    render();

  $("diagnosisBtn").onclick=()=>{ S.screen="diagnosis"; render(); };
  $("vocabBtn").onclick=()=>{ S.screen="vocab"; render(); };
  $("mockTestBtn").onclick=()=>{ S.screen="mockSetup"; render(); };
  const heb=$("homeExportBtn"); if(heb) heb.onclick=()=>{ S.screen="stockSelect"; render(); };
  const hib=$("homeImportBtn"); if(hib) hib.onclick=()=>$("homeFileInput").click();
  const hfi=$("homeFileInput"); if(hfi) hfi.onchange=async(e)=>{
    const files = Array.from(e.target.files);
    if (!files.length) return;
    hib.textContent=`⏳ ${files.length}ファイル...`;

      } catch(err) { results.push(`${f.name}: ❌ ${err.message}`); }
    }
    alert(`インポート結果:\n${results.join("\n")}`);
    hib.textContent="📥 インポート"; hfi.value=""; render();
  };
  $("judgeHomeToggle").onclick=()=>{
    S.judgeMode=!S.judgeMode;
    localStorage.setItem("judgeMode",JSON.stringify(S.judgeMode));
    render();
  };
  $("changeKey").onclick=()=>{ localStorage.removeItem("gemini_api_key"); S.apiKey=""; S.screen="apikey"; render(); };

/* ── Study (main game screen) ── */
function renderStudy() {
  const cp=PARTS.find(p=>p.id===S.part);
  const cl=LEVELS.find(l=>l.id===S.level);
  const total=S.stats.correct+S.stats.wrong;
  const rate=total>0?Math.round(S.stats.correct/total*100):0;
  const isL=["part1","part2","part3","part4"].includes(S.part);

  let body="";

  if (S.loading) {
    body=`<div class="loading"><div class="spin"></div>${S.loadMsg}</div>`;
  } else if (S.error) {
    body=`<div class="errbox"><div style="white-space:pre-wrap">${esc(S.error)}</div><button id="retryBtn">リトライ</button></div>`;
  } else if (S.qSet) {
    const qs=S.qSet, qi=S.qIdx, numQ=qs.questions.length;
    const q=qs.questions[qi], ans=S.answers[qi];
    const answered=ans.answered, isOk=ans.selected===q.correct;
    let inner="";

    // ── Part 1: Scene image (photo ONLY — no text description in real TOEIC) ──
    if (S.part==="part1") {
      if (S.sceneImgUrl) inner+=`<div class="scene-img"><img src="${S.sceneImgUrl}" alt="TOEIC Scene"></div>`;
      else {
        // No image available — show placeholder, NOT the scene text (that would give away the answer)
        inner+=`<div style="padding:40px;text-align:center;background:#243040;border-radius:12px;margin-bottom:12px">
          <div style="font-size:48px;margin-bottom:8px">📷</div>
          <div style="font-size:12px;color:#7a8ea5">写真を生成中 または 画像なし</div>
          ${S.imageError?`<div style="font-size:11px;color:#f87171;margin-top:6px">⚠️ ${esc(S.imageError)}</div>`:""}
        </div>`;
      }
    }

    // ── Audio button (Parts 1-4) ──
    if (isL && qs.audio) {
      const cached=qs._audioUrl?" ✓":"";
      const label=`🔊 音声を再生${cached}`;
      inner+=`<button class="btn-au" id="playAudio" data-label="${label}">${label}</button>`;
    }

    // ── Conversation (Part 3) ──
    if (S.part==="part3"&&qs.conversation) {
      inner+=ctxBlock("🗣️","会話",qs.conversation);
      if (qs.graphic) inner+=renderGraphic(qs.graphic);
    }

    // ── Talk (Part 4) ──
    if (S.part==="part4"&&qs.talk) {
      const ttype=qs.talk_type?` (${qs.talk_type})`:"";
      inner+=ctxBlock("🎙️",`トーク${ttype}`,qs.talk);
      if (qs.graphic) inner+=renderGraphic(qs.graphic);
    }

    // ── Part 6: Document ──
    if (S.part==="part6"&&qs.text) {
      const hdr=qs.header?`<div class="doc-hdr">${esc(qs.header)}</div>`:"";
      const txt=renderP6Text(qs.text, q.blank||0);
      inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 ${esc(qs.doc_type||"文書")}</div>${hdr}${txt}</div>`;
    }

    // ── Part 7: Single or Double passage ──
    if (S.part==="part7") {
      if (qs.isTriple) {
        // Triple passage
        const hdr1=qs.header_1?`<div class="doc-hdr">${esc(normText(qs.header_1))}</div>`:"";
        const hdr2=qs.header_2?`<div class="doc-hdr">${esc(normText(qs.header_2))}</div>`:"";
        const hdr3=qs.header_3?`<div class="doc-hdr">${esc(normText(qs.header_3))}</div>`:"";
        inner+=`<div style="font-size:11px;color:#f472b6;background:rgba(244,114,182,0.1);padding:4px 10px;border-radius:6px;margin-bottom:10px;display:inline-block">📄📄📄 トリプルパッセージ</div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書1: ${esc(qs.doc_type_1||"文書")}</div>${hdr1}<div class="passage-txt">${formatPassage(qs.text_1, qs.doc_type_1)}</div></div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書2: ${esc(qs.doc_type_2||"文書")}</div>${hdr2}<div class="passage-txt">${formatPassage(qs.text_2, qs.doc_type_2)}</div></div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書3: ${esc(qs.doc_type_3||"文書")}</div>${hdr3}<div class="passage-txt">${formatPassage(qs.text_3, qs.doc_type_3)}</div></div>`;
        // 和訳は解説の後に表示
      } else if (qs.isDouble) {
        // Double passage
        const hdr1=qs.header_1?`<div class="doc-hdr">${esc(normText(qs.header_1))}</div>`:"";
        const hdr2=qs.header_2?`<div class="doc-hdr">${esc(normText(qs.header_2))}</div>`:"";
        inner+=`<div style="font-size:11px;color:#fbbf24;background:rgba(251,191,36,0.1);padding:4px 10px;border-radius:6px;margin-bottom:10px;display:inline-block">📄📄 ダブルパッセージ</div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書1: ${esc(qs.doc_type_1||"文書")}</div>${hdr1}<div class="passage-txt">${formatPassage(qs.text_1, qs.doc_type_1)}</div></div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書2: ${esc(qs.doc_type_2||"文書")}</div>${hdr2}<div class="passage-txt">${formatPassage(qs.text_2, qs.doc_type_2)}</div></div>`;
        // 和訳は解説の後に表示
      } else if (qs.text) {
        // Single passage
        const hdr=qs.header?`<div class="doc-hdr">${esc(normText(qs.header))}</div>`:"";
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 ${esc(qs.doc_type||"文書")}</div>${hdr}<div class="passage-txt">${formatPassage(qs.text, qs.doc_type)}</div></div>`;
        if (qs.graphic) inner+=renderGraphic(qs.graphic);
      }
    }

    // ── Question progress indicator ──
    if (numQ>1) {
      const dots=Array.from({length:numQ},(_,i)=>{
        const a=S.answers[i];
        let cls="q-dot";
        if (i===qi) cls+=" cur";
        else if (a.answered) cls+=(a.selected===qs.questions[i].correct?" ok":" ng");
        return `<span class="${cls}"></span>`;
      }).join("");
      inner+=`<div class="q-prog"><span>問 ${qi+1}/${numQ}</span>${dots}</div>`;
    }

    // ── Question text ──
    if (S.part==="part2" && !answered) {
      inner+=`<div class="q-txt" style="color:#7a8ea5;font-style:italic">（音声を聴いて回答してください）</div>`;
    } else {
      inner+=`<div class="q-txt">${esc(q.question)}</div>`;
    }

    // ── Choices audio button (Part 3/4 only — Part 1/2 includes choices in main audio) ──
    if (isL && (S.part==="part3"||S.part==="part4")) {
      inner+=`<button class="btn-au" id="playChoices" data-label="🔊 選択肢を読み上げ">🔊 選択肢を読み上げ</button>`;
    }

    // ── Choices ──
    const isAudioOnly = (S.part==="part1"||S.part==="part2") && !answered;
    if (isAudioOnly) {
      inner+=`<div style="font-size:12px;color:#7a8ea5;margin-bottom:10px">🎧 音声を聴いてから選択してください（本番と同じ形式）</div>`;
    }
    q.choices.forEach((c,i)=>{
      let cls="choice";
      if (answered) { if(i===q.correct)cls+=" ok"; else if(i===ans.selected)cls+=" ng"; }
      const label = isAudioOnly
        ? ["(A)","(B)","(C)","(D)"][i]
        : esc(c);
      inner+=`<button class="${cls}" data-c="${i}" ${answered?"disabled":""}>${label}</button>`;
    });

    // ── Explanation ──
    if (answered) {
      inner+=`<div class="expl ${isOk?"ok":"ng"}">
        <div class="res" style="color:${isOk?"#4ade80":"#f87171"}">${isOk?"🎉 正解！":"😥 不正解..."}</div>
        ${q.explanation_en?`<details style="margin-bottom:8px"><summary style="font-size:13px;color:#60a5fa;cursor:pointer;user-select:none">💡 English Explanation</summary><div style="font-size:14px;line-height:1.9;color:#a0b4c8;margin-top:4px;padding:8px;background:rgba(96,165,250,0.06);border-radius:6px">${esc(q.explanation_en)}</div></details>`:""}
        <div class="det">${esc(q.explanation_ja||"")}</div>
      </div>`;
      // 和訳トグル（解説の直後に表示 — Part 3,4,6,7）
      if (["part3","part4","part6","part7"].includes(S.part)) {
        const trJa = qs.translation_ja || qs.translation_ja_1;
        let trHtml;
        if (qs.translation_ja_1) {
          trHtml = `<div style="font-size:13px;color:#7b9cf7;font-weight:600;margin-top:8px">文書1:</div><div style="white-space:pre-wrap;font-size:14px;color:#dce6f0;line-height:1.8;padding:8px;background:rgba(30,45,61,0.5);border-radius:6px;margin-top:4px">${esc(qs.translation_ja_1)}</div>` + (qs.translation_ja_2?`<div style="font-size:13px;color:#7b9cf7;font-weight:600;margin-top:12px">文書2:</div><div style="white-space:pre-wrap;font-size:14px;color:#dce6f0;line-height:1.8;padding:8px;background:rgba(30,45,61,0.5);border-radius:6px;margin-top:4px">${esc(qs.translation_ja_2)}</div>`:"") + (qs.translation_ja_3?`<div style="font-size:13px;color:#7b9cf7;font-weight:600;margin-top:12px">文書3:</div><div style="white-space:pre-wrap;font-size:14px;color:#dce6f0;line-height:1.8;padding:8px;background:rgba(30,45,61,0.5);border-radius:6px;margin-top:4px">${esc(qs.translation_ja_3)}</div>`:"");
        } else if (qs.translation_ja) {
          trHtml = `<div style="white-space:pre-wrap;font-size:14px;color:#dce6f0;line-height:1.8;padding:8px;background:rgba(30,45,61,0.5);border-radius:6px;margin-top:8px">${esc(qs.translation_ja)}</div>`;
        } else {
          trHtml = `<div style="font-size:13px;color:#7a8ea5;margin-top:8px">（この問題には和訳データがありません）</div>`;
        }
        inner+=`<details style="margin-top:10px;padding:10px;background:rgba(251,191,36,0.05);border:1px solid rgba(251,191,36,0.15);border-radius:8px;cursor:pointer"><summary style="color:#fbbf24;font-size:13px;font-weight:600">📖 和訳を表示</summary>${trHtml}</details>`;
      }
      // ── Vocabulary Cards ──
      if (qs.vocab && qs.vocab.length > 0) {
        let vocHtml = qs.vocab.map((v,vi) => `
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <button class="vocab-speak" data-word="${esc(v.word||"")}" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px" title="発音">🔊</button>
            <div style="min-width:100px;font-weight:600;color:#dce6f0;font-size:13px">${esc(v.word||"")}</div>
            <div style="min-width:60px;color:#7b9cf7;font-size:12px">${esc(v.ja||"")}</div>
            <div style="color:#a0b4c8;font-size:11px;flex:1">${esc(v.example||"")}</div>
          </div>`).join("");
        inner+=`<details open style="margin-top:10px;padding:10px;background:rgba(129,140,248,0.05);border:1px solid rgba(129,140,248,0.15);border-radius:8px">
          <summary style="color:#7b9cf7;font-size:13px;font-weight:600">📚 Key Vocabulary</summary>
          <div style="margin-top:6px">${vocHtml}</div>
        </details>`;
      }
      // 単語保存ボタン
      inner+=`<div style="margin-top:8px;text-align:center"><button class="btn-s" id="vocabSaveBtn" style="font-size:11px;color:#7b9cf7">📝 単語を保存</button></div>`;
    }

    body=`<div class="q-card">${inner}</div>`;

    // ストック/ストック解除ボタン（最後の問いに回答済みの場合）
    if (answered && qi===numQ-1) {
      if (S.stockMode) {
        body+=`<button class="btn-s" id="unstockBtn" style="margin:10px auto;display:block;color:#f87171">🗑️ ストック解除</button>`;
        // 卒業チェック（3回連続正解の場合は次のrenderで反映）
      } else {
        const isL=["part1","part2","part3","part4"].includes(S.part);
        const hasAudio=!!(S.qSet._audioOpus||S.qSet._audioPcm);
        if(isL && !hasAudio) body+=`<div style="font-size:11px;color:#fbbf24;text-align:center;margin:6px 0">⚠️ 音声付きで保存するには先に🔊再生してください</div>`;
        body+=`<button class="btn-s" id="stockBtn" style="margin:10px auto;display:block">💾 この問題をストック${isL&&hasAudio?" (音声付き)":""}</button>`;
      }
    }

    if (answered) {
      const isLast=qi===numQ-1;
      const allAnswered = numQ > 1 && S.answers.every(a => a.answered);

      // Review navigation: show when all questions answered and multi-question set
      if (allAnswered) {
        body+=`<div style="display:flex;gap:8px;justify-content:center;align-items:center;margin:12px 0;padding:8px;background:rgba(129,140,248,0.06);border-radius:8px">
          ${qi > 0 ? `<button class="btn-s" id="prevQBtn" style="font-size:12px">◀ Q${qi}</button>` : `<span style="width:60px"></span>`}
          <span style="font-size:12px;color:#7b9cf7;font-weight:600">Q${qi+1} / ${numQ}</span>
          ${qi < numQ-1 ? `<button class="btn-s" id="nextQReviewBtn" style="font-size:12px">Q${qi+2} ▶</button>` : `<span style="width:60px"></span>`}
        </div>`;
      }

      if (isLast) {
        if (S.stockMode || S.sessionNum >= SESSION_SIZE) {
          const isLastStock = S.stockMode && S.stockPlayIdx >= S.stockPlaylist.length-1;
          const hasMoreStock = S.stockMode && !isLastStock;
          const msg = S.stockMode ? `ストック問題 (${S.stockPlayIdx+1}/${S.stockPlaylist.length})` : `${SESSION_SIZE}問終了しました`;
          body+=`<div style="text-align:center;padding:20px 0">
            <div style="font-size:20px;font-weight:700;color:#4ade80;margin-bottom:8px">✅ ${msg}</div>
            <div style="font-size:13px;color:#7a8ea5;margin-bottom:16px">正答率: ${rate}%（${S.stats.correct}/${total}）</div>
            ${hasMoreStock?`<button class="btn-p" id="stockNextBtn">📦 次の問題 (${S.stockPlayIdx+2}/${S.stockPlaylist.length}) →</button>`:""}
            <button class="btn-${S.stockMode||isLastStock?"s":"p"}" id="backHomeBtn">${S.stockMode?"📦 ストック一覧に戻る":"ホームに戻る"}</button>
          </div>`;
        } else {
          body+=`<button class="btn-p" id="nextSetBtn">次の問題 (${S.sessionNum+1}/${SESSION_SIZE}) →</button>`;
        }
      } else {
        body+=`<button class="btn-p" id="nextQBtn">次の問い (${qi+2}/${numQ}) →</button>`;
      }
    }
  }

  app.innerHTML=`
    <div class="topbar">
      <button class="btn-s" id="backBtn">← 戻る</button>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="tag" style="background:${cl.color}20;color:${cl.color}">${cl.label}</span>
        <span class="tag" style="background:rgba(129,140,248,0.15);color:#7b9cf7;font-family:'JetBrains Mono',monospace">${cp.icon} ${cp.label}</span>
        <span class="tag judge-toggle" id="judgeToggle" style="background:${S.judgeMode?"rgba(74,222,128,0.15)":"rgba(100,116,139,0.1)"};color:${S.judgeMode?"#4ade80":"#64748b"};font-size:10px;cursor:pointer">${S.judgeMode?"📊 判定ON":"📊 OFF"}</span>
        <span class="tag" id="timerDisplay" style="background:rgba(100,116,139,0.1);color:#a0b4c8;font-size:10px;font-family:monospace">⏱ 0s</span>
        ${S.stockMode
          ?`<span class="tag" style="background:rgba(251,191,36,0.15);color:#fbbf24;font-size:10px">📦 ${S.stockPlayIdx+1}/${S.stockPlaylist.length}</span>`
          :`<span class="tag" style="background:${PART_MODEL[S.part]===GEMINI_3FLASH?"rgba(52,211,153,0.15)":PART_MODEL[S.part]===GEMINI_PRO?"rgba(168,85,247,0.15)":PART_MODEL[S.part]===GEMINI_FLASH?"rgba(59,130,246,0.15)":"rgba(100,116,139,0.1)"};color:${PART_MODEL[S.part]===GEMINI_3FLASH?"#34d399":PART_MODEL[S.part]===GEMINI_PRO?"#a855f7":PART_MODEL[S.part]===GEMINI_FLASH?"#3b82f6":"#64748b"};font-size:10px">${PART_MODEL[S.part]===GEMINI_3FLASH?"3-Flash":PART_MODEL[S.part]===GEMINI_PRO?"Pro":PART_MODEL[S.part]===GEMINI_FLASH?"Flash":"Lite"}</span>
           <span class="tag" style="background:rgba(251,191,36,0.1);color:#fbbf24">${S.sessionNum}/${SESSION_SIZE}</span>`}
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="sl">出題数</div><div class="sv" style="color:#7b9cf7">${total}</div></div>
      <div class="stat"><div class="sl">正解</div><div class="sv" style="color:#4ade80">${S.stats.correct}</div></div>
      <div class="stat"><div class="sl">不正解</div><div class="sv" style="color:#f87171">${S.stats.wrong}</div></div>
      <div class="stat"><div class="sl">正答率</div><div class="sv" style="color:#fbbf24">${rate}%</div></div>
    </div>
    ${S.streak>=2?`<div class="streak">🔥 ${S.streak}問連続正解！</div>`:""}
    
    ${body}`;

  // Events
  const jt=$("judgeToggle"); if(jt) jt.onclick=()=>{
    S.judgeMode=!S.judgeMode;
    localStorage.setItem("judgeMode",JSON.stringify(S.judgeMode));
    render();
  };
  // タイマー更新（パート別の本番TOEIC目安時間で色変更）
  // Part 1/2: 音声後5-10秒で回答（選択肢は音声に含まれる）
  // Part 3/4: 設問ごとに8秒（本番の回答インターバル）
  // Part 5: 1問20秒（30問を10分）
  // Part 6: 1問40秒（16問を10分）
  // Part 7 SP: 1問50-60秒 / DP: 1問60-72秒 / TP: 1問72-84秒
  if(!S.stockCreateMode) {
    const td=$("timerDisplay");
    if(td) {
      const isL=["part1","part2","part3","part4"].includes(S.part);
      const numQ=S.qSet?.questions?.length||1;
      // タイマー停止中（解説画面 or Listening音声待ち）
      if(!S.timerStart) {
        if(isL && S.timerFrozen===0 && !S.answers?.[S.qIdx]?.answered) {
          td.textContent="🎧 音声再生後に開始";
          td.style.color="#64748b";
        } else {
          td.textContent=`⏱ ${S.timerFrozen||0}s`;
          td.style.color="#64748b";
        }
      } else {
        // 回答中：パート別の目安時間で色変更（Q全体の合計）
        let warnPerQ=15, dangerPerQ=30;
        if(S.part==="part1"||S.part==="part2") { warnPerQ=5; dangerPerQ=10; }
        else if(S.part==="part3"||S.part==="part4") { warnPerQ=8; dangerPerQ=15; }
        else if(S.part==="part5") { warnPerQ=15; dangerPerQ=25; }
        else if(S.part==="part6") { warnPerQ=37; dangerPerQ=50; }
        else if(S.part==="part7") {
          if(S.qSet?.isTriple)      { warnPerQ=72; dangerPerQ=100; }
          else if(S.qSet?.isDouble) { warnPerQ=65; dangerPerQ=90; }
          else                      { warnPerQ=50; dangerPerQ=75; }
        }
        const warn=warnPerQ*numQ, danger=dangerPerQ*numQ;
        const _ti=setInterval(()=>{
          if(!document.getElementById("timerDisplay")){clearInterval(_ti);return;}
          if(!S.timerStart){clearInterval(_ti);return;}
          const sec=Math.round((Date.now()-S.timerStart)/1000);
          td.textContent=`⏱ ${sec}s`;
          td.style.color=sec>danger?"#f87171":sec>warn?"#fbbf24":"#94a3b8";
        },1000);
      }
    }
  }
  $("backBtn").onclick=()=>{
    if(S.stockMode) { stopSpeak();S.stockMode=false;S.screen=S._stockReturnScreen||"home";render(); return; }
    if(S.sessionNum>0 && S.sessionNum<SESSION_SIZE) {
      if(!confirm(`セッション進行中です（${S.sessionNum}/${SESSION_SIZE}問完了）。\nホームに戻りますか？`)) return;
    }
    stopSpeak();S.screen="home";render();
  };
  const rb=$("retryBtn"); if(rb)rb.onclick=()=>loadNewSet();
  const nsb=$("nextSetBtn"); if(nsb)nsb.onclick=()=>{stopSpeak();loadNewSet();};
  const nqb=$("nextQBtn"); if(nqb)nqb.onclick=()=>advanceQuestion();
  const pqb=$("prevQBtn"); if(pqb)pqb.onclick=()=>{ S.qIdx--; render(); };
  const nqr=$("nextQReviewBtn"); if(nqr)nqr.onclick=()=>{ S.qIdx++; render(); };
  const bhb=$("backHomeBtn"); if(bhb)bhb.onclick=()=>{
    const wasStock=S.stockMode;
    stopSpeak();S.stockMode=false;S.stockPlaylist=[];
    S.screen=wasStock?"stockSelect":"home";render();
  };
  const snb=$("stockNextBtn"); if(snb)snb.onclick=()=>{ loadNextStockItem(); };
  const stb=$("stockBtn"); if(stb)stb.onclick=async()=>{
    try {
      await stockSave(S.part, S.level, S.qSet, S.sceneImgUrl);
      // Also save vocab to vocab DB
      if (S.qSet.vocab && S.qSet.vocab.length) await vocabAutoSave(S.qSet.vocab, S.part).catch(e=>console.warn('vocab auto-save failed:', e));
      stb.textContent="✅ ストック済み"; stb.disabled=true; stb.style.color="#4ade80";
    } catch(e) { stb.textContent="❌ 保存失敗"; console.error(e); }
  };
  const usb=$("unstockBtn"); if(usb)usb.onclick=async()=>{
    try {
      if(S.stockId) await stockDelete(S.stockId);
      usb.textContent="✅ 削除済み"; usb.disabled=true; usb.style.color="#64748b";
    } catch(e) { usb.textContent="❌ 削除失敗"; console.error(e); }
  };
  document.querySelectorAll("[data-c]").forEach(el=>{
    el.onclick=()=>{if(!S.answers[S.qIdx].answered)handleAnswer(parseInt(el.dataset.c));};
  });

  // Audio buttons
  const pa=$("playAudio");
  if (pa&&S.qSet?.audio) {
    pa.onclick=async()=>{
      if (_curAudio) { stopSpeak(); setAudioBtn(pa,"idle"); return; }
      const qs=S.qSet;
      if (qs._audioUrl) {
        setAudioBtn(pa,"playing");
        await playSeq([qs._audioUrl],()=>{setAudioBtn(pa,"idle"); if(!S.timerStart){S.timerStart=Date.now();S.timerFrozen=0;} });
      } else {
        setAudioBtn(pa,"loading");
        const isConv=S.part==="part3";
        const fn=isConv ? (t,cb)=>speakConv(t,cb,qs.speakers) : speakGemini;
        await fn(qs.audio,(err)=>setAudioBtn(pa,err?"error":"idle",err?String(err).slice(0,100):""));
        if (_curAudio) setAudioBtn(pa,"playing");
      }
    };
  }

  const vsb=$("vocabSaveBtn"); if(vsb) vsb.onclick=()=>{
    const word=prompt("保存する単語または表現を入力:");
    if(!word)return;
    const meaning=prompt("意味（日本語）を入力（空欄可）:");
    vocabSave(word.trim(), meaning?.trim()||"", S.qSet?.questions?.[S.qIdx]?.question||"", S.part).then(()=>{
      vsb.textContent="✅ 保存しました"; vsb.disabled=true;
    }).catch(()=>{ vsb.textContent="❌ 保存失敗"; });
  };
  // Vocab pronunciation buttons
  document.querySelectorAll(".vocab-speak").forEach(btn=>{
    btn.onclick=async()=>{
      const word=btn.dataset.word;
      if(!word)return;
      btn.textContent="⏳";
      try {
        await new Promise((resolve, reject) => {
          speakGemini(word, (err) => { if (err) reject(err); else resolve(); });
        });
        btn.textContent="🔊";
      } catch(e){
        // Gemini 429 → Web Speech fallback
        try {
          if (window.speechSynthesis) {
            await new Promise(resolve => {
              const utter = new SpeechSynthesisUtterance(word);
              utter.lang = "en-US"; utter.rate = 0.9;
              utter.onend = () => resolve();
              utter.onerror = () => resolve();
              speechSynthesis.speak(utter);
            });
            btn.textContent="🔊";
            return;
          }
        } catch(e2) {}
        btn.textContent="⚠️";
        btn.title=String(e).slice(0,60);
        setTimeout(()=>{ btn.textContent="🔊"; btn.title="発音"; }, 3000);
      }
    };
  });
  const pc=$("playChoices");
  if (pc&&S.qSet?.questions) {
    pc.onclick=async()=>{
      if(_curAudio){stopSpeak();setAudioBtn(pc,"idle");return;}
      const letters=["A","B","C","D"];
      const choiceText=S.qSet.questions[S.qIdx].choices.map((c,i)=>`${letters[i]}. ${c.replace(/^\([A-Da-d]\)\s*/,"").trim()}`).join(". ");
      setAudioBtn(pc,"loading");
      await speakGemini(choiceText,(err)=>setAudioBtn(pc,err?"error":"idle",err?String(err).slice(0,40):""));
      if (_curAudio) setAudioBtn(pc,"playing");
    };
  }
}

function ctxBlock(icon, label, text) {
  return `<div class="ctx-block"><div class="ctx-lbl">${icon} ${label}</div><div class="ctx-txt">${esc(normText(text))}</div></div>`;
}

function renderGraphic(g) {
  if (!g || !g.headers || !g.rows) return "";
  const title = g.title ? `<div style="font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:6px">📊 ${esc(g.title)}</div>` : "";
  const hdr = g.headers.map(h => `<th style="padding:6px 10px;border:1px solid #3a4d63;background:#243040;color:#dce6f0;font-size:12px;text-align:left">${esc(h)}</th>`).join("");
  const rows = g.rows.map(row => {
    const cells = row.map(c => `<td style="padding:5px 10px;border:1px solid #3a4d63;font-size:12px;color:#cbd5e1">${esc(String(c))}</td>`).join("");
    return `<tr>${cells}</tr>`;
  }).join("");
  return `<div class="ctx-block">${title}<table style="width:100%;border-collapse:collapse;border-radius:6px;overflow:hidden"><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

// Service Worker registration (offline PWA)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'activated' && navigator.serviceWorker.controller) {
          console.log('[SW] New version available — reload to update');
        }
      });
    });
  }).catch(e => console.warn('[SW] Registration failed:', e));
}

// Boot
render();
</script>
