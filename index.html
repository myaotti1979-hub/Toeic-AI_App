/* ── 単語帳画面 ── */
async function renderVocab() {
  const words = await vocabGetAll();
  const POS_LABELS = {noun:"名詞",verb:"動詞",adjective:"形容詞",adverb:"副詞",phrase:"フレーズ",other:"その他"};
  const POS_COLORS = {noun:"#60a5fa",verb:"#4ade80",adjective:"#fbbf24",adverb:"#c084fc",phrase:"#f472b6",other:"#94a3b8"};

  function renderWordList(list) {
    if (!list.length) return `<div style="text-align:center;color:#7a8ea5;padding:20px">この品詞の単語はありません</div>`;
    return list.sort((a,b)=>b.timestamp-a.timestamp).map(w => {
      const meanings = (w.meaning||"").split("\n").filter(Boolean);
      const examples = (w.context||"").split("\n").filter(Boolean);
      const posLabel = POS_LABELS[w.pos]||w.pos||"";
      const posColor = POS_COLORS[w.pos]||"#94a3b8";
      let detailHtml;
      if (meanings.length <= 1) {
        detailHtml = `${meanings[0]?`<div style="font-size:12px;color:#7b9cf7">${esc(meanings[0])}</div>`:""}
          ${examples[0]?`<div style="font-size:11px;color:#a0b4c8;margin-top:2px;display:flex;align-items:center;gap:4px"><button class="vocab-play-ex" data-vex="${esc(examples[0])}" data-vid="${w.id}" style="background:none;border:none;cursor:pointer;font-size:11px;padding:0;flex-shrink:0">🔊</button>${esc(examples[0].slice(0,80))}</div>`:""}`;
      } else {
        detailHtml = meanings.map((m,i) => `<div style="font-size:12px;margin-top:${i?4:0}px">
          <span style="color:#7b9cf7">${"❶❷❸❹❺"[i]||"•"} ${esc(m)}</span>
          ${examples[i]?`<span style="color:#a0b4c8;font-size:11px"> — <button class="vocab-play-ex" data-vex="${esc(examples[i])}" data-vid="${w.id}" style="background:none;border:none;cursor:pointer;font-size:11px;padding:0;display:inline">🔊</button>${esc(examples[i].slice(0,60))}</span>`:""}
        </div>`).join("");
      }
      return `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:start;gap:6px">
        <button class="vocab-play" data-vword="${esc(w.word)}" data-vid="${w.id}" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px;flex-shrink:0">🔊</button>
        <div style="flex:1">
          <div style="font-size:14px;color:#dce6f0;font-weight:600">${esc(w.word)} <span style="font-size:10px;color:${posColor};font-weight:400">${posLabel}</span></div>
          ${detailHtml}
        </div>
        <button class="btn-s" data-vdel="${w.id}" style="font-size:10px;color:#f87171;padding:2px 6px;flex-shrink:0">✕</button>
      </div>`}).join("");
  }

  // Group by POS
  const groups = {};
  words.forEach(w => { const p=w.pos||"other"; if(!groups[p])groups[p]=[]; groups[p].push(w); });
  const posKeys = Object.keys(groups).sort();

  // Tab buttons
  const tabBtns = [`<button class="pos-tab active" data-pos="all">All (${words.length})</button>`]
    .concat(posKeys.map(p => `<button class="pos-tab" data-pos="${p}">${POS_LABELS[p]||p} (${groups[p].length})</button>`)).join("");

  // Tab content
  const allList = renderWordList(words);
  let tabContents = `<div class="pos-content" data-pos="all">${allList}</div>`;
  posKeys.forEach(p => {
    tabContents += `<div class="pos-content" data-pos="${p}" style="display:none">${renderWordList(groups[p])}</div>`;
  });

  app.innerHTML=`
    <div class="header"><h1 style="font-size:20px">📝 単語帳</h1><div class="sub">${words.length}語</div></div>
    ${words.length>=4?`<div style="display:flex;gap:6px;padding:6px 0"><button class="btn-s" id="vocabQuizEnJa" style="flex:1;background:rgba(129,140,248,0.15);color:#7b9cf7">🧠 英→日 Quiz</button><button class="btn-s" id="vocabQuizJaEn" style="flex:1;background:rgba(244,114,182,0.15);color:#f472b6">🧠 日→英 Quiz</button></div>`:""}
    ${words.length>0?`<div style="text-align:center;padding:4px 0"><button class="btn-s" id="vocabDedupeBtn" style="font-size:11px;color:#7a8ea5">🧹 重複を整理</button> <button class="btn-s" id="vocabRebuildBtn" style="font-size:11px;color:#7a8ea5;margin-left:4px">🔄 ストックから再構築</button></div>`:`<div style="text-align:center;padding:4px 0"><button class="btn-s" id="vocabRebuildBtn" style="font-size:11px;color:#7b9cf7">🔄 ストックから単語帳を構築</button></div>`}
    <div style="display:flex;gap:4px;overflow-x:auto;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1)">${tabBtns}</div>
    <style>.pos-tab{padding:4px 10px;border-radius:12px;font-size:11px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#a0b4c8;cursor:pointer;white-space:nowrap}
    .pos-tab.active{background:rgba(129,140,248,0.2);color:#7b9cf7;border-color:rgba(129,140,248,0.4)}</style>
    <div id="posTabArea">${tabContents}</div>
    <button class="btn-s" id="vocabBackBtn" style="margin:16px auto;display:block">← ホームに戻る</button>`;

  // Tab switching
  document.querySelectorAll(".pos-tab").forEach(tab=>{
    tab.onclick=()=>{
      document.querySelectorAll(".pos-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      document.querySelectorAll(".pos-content").forEach(c=>c.style.display="none");
      const target=document.querySelector(`.pos-content[data-pos="${tab.dataset.pos}"]`);
      if(target) target.style.display="block";
    };
  });
  // Delete buttons
  document.querySelectorAll("[data-vdel]").forEach(el=>{
    el.onclick=async()=>{ await vocabDelete(parseInt(el.dataset.vdel)); render(); };
  });
  // Play audio from base64 Opus (if stored), else fallback to Gemini TTS
  async function playVocabAudio(btn, originalLabel, storedAudio, fallbackText) {
    btn.textContent = "⏳";
    if (storedAudio) {
      try {
        const bin = atob(storedAudio);
        const bytes = new Uint8Array(bin.length);
        for (let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], {type: "audio/webm;codecs=opus"});
        const url = URL.createObjectURL(blob);
        const a = new Audio(url);
        a.onended = () => { URL.revokeObjectURL(url); btn.textContent = originalLabel; };
        a.onerror = () => { URL.revokeObjectURL(url); btn.textContent = originalLabel; };
        await a.play();
        return;
      } catch(e) {
        console.warn("Stored audio playback failed, falling back to Gemini:", e);
      }
    }
    // Fallback: Gemini TTS
    if (!fallbackText) { btn.textContent = originalLabel; return; }
    try { speakGemini(fallbackText, () => { btn.textContent = originalLabel; }); }
    catch(e) { btn.textContent = originalLabel; }
    setTimeout(() => { btn.textContent = originalLabel; }, 500);
  }
  // Pronunciation buttons - words (prefer stored audio)
  document.querySelectorAll(".vocab-play").forEach(btn=>{
    btn.onclick=async()=>{
      const word = btn.dataset.vword;
      const wid = parseInt(btn.dataset.vid);
      if(!word)return;
      // Lookup stored audio from DB
      const w = words.find(w => w.id === wid);
      await playVocabAudio(btn, "🔊", w?.audio || "", word);
    };
  });
  // Pronunciation buttons - examples (prefer stored audio)
  document.querySelectorAll(".vocab-play-ex").forEach(btn=>{
    btn.onclick=async(e)=>{
      e.stopPropagation();
      const ex = btn.dataset.vex;
      const wid = parseInt(btn.dataset.vid);
      if(!ex)return;
      const w = words.find(w => w.id === wid);
      await playVocabAudio(btn, "🔊", w?.exampleAudio || "", ex);
    };
  });
  $("vocabBackBtn").onclick=()=>{S.screen="home";render();};
  const dd=$("vocabDedupeBtn"); if(dd)dd.onclick=async()=>{
    dd.textContent="⏳ 整理中...";
    const r = await vocabDedupe();
    alert(`✅ 整理完了\n重複削除: ${r.merged}件\n意味統合: ${r.cleanedInternal}件`);
    render();
  };
  const rb=$("vocabRebuildBtn"); if(rb)rb.onclick=async()=>{
    rb.textContent="⏳ 再構築中...";
    const before = (await vocabGetAll()).length;
    const r = await vocabRebuildFromStocks();
    const after = (await vocabGetAll()).length;
    alert(`✅ 再構築完了\nストック: ${r.processed}/${r.total}問にvocabあり\nvocabエントリ: ${r.foundVocab}個を処理\n単語帳: ${before}語 → ${after}語 (+${after-before})`);
    render();
  };
  const qej=$("vocabQuizEnJa"); if(qej)qej.onclick=()=>{S.screen="vocabQuiz";S.vocabQuizMode="en_ja";S.vocabQuizScore={correct:0,total:0};S.vocabQuizQ=null;render();};
  const qje=$("vocabQuizJaEn"); if(qje)qje.onclick=()=>{S.screen="vocabQuiz";S.vocabQuizMode="ja_en";S.vocabQuizScore={correct:0,total:0};S.vocabQuizQ=null;render();};
}

/* ── 単語クイズ画面 ── */
async function renderVocabQuiz() {
  const words = await vocabGetAll();
  if (words.length < 4) { S.screen="vocab"; render(); return; }
  const mode = S.vocabQuizMode || "en_ja";
  const score = S.vocabQuizScore || {correct:0,total:0};

  // Generate question if needed
  if (!S.vocabQuizQ) {
    const target = words[Math.floor(Math.random()*words.length)];
    const others = words.filter(w=>w.word!==target.word);
    const shuffled = others.sort(()=>Math.random()-0.5).slice(0,3);
    const tMeaning = (target.meaning||"").split("\n")[0];
    let choices;
    if (mode === "en_ja") {
      choices = [tMeaning, ...shuffled.map(w=>(w.meaning||"").split("\n")[0])];
    } else {
      choices = [target.word, ...shuffled.map(w=>w.word)];
    }
    const indices = choices.map((_,i)=>i).sort(()=>Math.random()-0.5);
    S.vocabQuizQ = {
      target, tMeaning,
      choices: indices.map(i=>choices[i]),
      correct: indices.indexOf(0),
      answered: null
    };
  }
  const q = S.vocabQuizQ;
  const pct = score.total>0 ? Math.round(score.correct/score.total*100) : 0;

  let html = `
    <div class="header">
      <h1 style="font-size:18px">${mode==="en_ja"?"🇬🇧→🇯🇵 英→日":"🇯🇵→🇬🇧 日→英"} Quiz</h1>
      <div class="sub">${score.correct}/${score.total} (${pct}%)</div>
    </div>
    <div style="text-align:center;padding:24px;background:rgba(15,23,42,0.8);border-radius:16px;margin:12px 0;border:1px solid rgba(255,255,255,0.06)">
      <div style="font-size:${mode==="en_ja"?"32px":"26px"};font-weight:700;color:${mode==="en_ja"?"#e2e8f0":"#818cf8"}">${mode==="en_ja"?esc(q.target.word):esc(q.tMeaning)}</div>
      ${mode==="en_ja"?`<button class="btn-s" id="quizPlayWord" style="margin-top:8px;font-size:12px">🔊 発音</button>`:""}
    </div>
    <div style="font-size:13px;color:#7a8ea5;text-align:center;margin-bottom:10px">${mode==="en_ja"?"この単語の意味は？":"この意味の英単語は？"}</div>`;

  // Choices
  q.choices.forEach((c,i) => {
    const isCorrect = i === q.correct;
    let style = "padding:12px;border-radius:10px;margin:6px 0;text-align:center;font-size:15px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);";
    let disabled = "";
    if (q.answered !== null) {
      disabled = "pointer-events:none;opacity:0.7;";
      if (i === q.answered && isCorrect) style += "background:rgba(74,222,128,0.2);border-color:#4ade80;color:#4ade80;";
      else if (i === q.answered && !isCorrect) style += "background:rgba(248,113,113,0.2);border-color:#f87171;color:#f87171;";
      else if (isCorrect) style += "background:rgba(74,222,128,0.1);border-color:#4ade80;color:#4ade80;";
      else style += "background:transparent;color:#7a8ea5;";
    } else {
      style += "background:rgba(255,255,255,0.03);color:#dce6f0;";
    }
    html += `<div class="quiz-choice" data-qi="${i}" style="${style}${disabled}">${esc(c)}</div>`;
  });

  // After answer: show example + next
  if (q.answered !== null) {
    const ex = (q.target.context||"").split("\n")[0] || "";
    html += `<div style="margin-top:12px;padding:12px;background:rgba(129,140,248,0.08);border-radius:10px">`;
    html += `<div style="font-size:14px;font-weight:600;color:#dce6f0;display:flex;align-items:center;gap:6px"><button class="btn-s" id="quizPlayWord2" style="font-size:11px;padding:2px 8px">🔊</button>${esc(q.target.word)} — <span style="color:#7b9cf7">${esc(q.tMeaning)}</span></div>`;
    if (ex) html += `<div style="font-size:12px;color:#a0b4c8;margin-top:4px">💬 ${esc(ex)}</div>`;
    html += `<button class="btn-s" id="quizPlayEx" style="margin-top:6px;font-size:11px">🔊 例文を聴く</button>`;
    html += `</div>`;
    html += `<button class="btn-s" id="quizNext" style="margin:14px auto;display:block;padding:10px 32px;background:rgba(129,140,248,0.2);color:#7b9cf7;font-size:14px;font-weight:600;border-radius:12px">➡️ Next</button>`;
  }
  html += `<button class="btn-s" id="quizBackBtn" style="margin:16px auto;display:block;font-size:12px;color:#7a8ea5">← 単語帳に戻る</button>`;

  app.innerHTML = html;

  // Handlers
  document.querySelectorAll(".quiz-choice").forEach(el=>{
    el.onclick=()=>{
      if(q.answered!==null) return;
      q.answered = parseInt(el.dataset.qi);
      score.total++;
      if(q.answered===q.correct) score.correct++;
      S.vocabQuizScore = score;
      render();
    };
  });
  // Word pronunciation buttons (both the top one for en_ja mode and the answer-block one)
  const playWord = async (btn, originalText) => {
    const word = q.target.word;
    const storedAudio = q.target.audio || "";
    if (!word) { alert("単語がありません"); return; }
    btn.textContent="⏳";
    if (storedAudio) {
      try {
        const bin = atob(storedAudio);
        const bytes = new Uint8Array(bin.length);
        for (let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], {type:"audio/webm;codecs=opus"});
        const url = URL.createObjectURL(blob);
        const a = new Audio(url);
        a.onended = () => { URL.revokeObjectURL(url); btn.textContent = originalText; };
        a.onerror = () => { URL.revokeObjectURL(url); btn.textContent = originalText; };
        await a.play();
        return;
      } catch(e) { console.warn("stored audio fail:", e); }
    }
    if (!S.apiKey) { alert("APIキーが設定されていません"); btn.textContent=originalText; return; }
    try {
      speakGemini(word, (err)=>{ if(err)alert("音声エラー: "+err); btn.textContent=originalText; });
      setTimeout(()=>{btn.textContent=originalText;}, 500);
    } catch(e) {
      btn.textContent = originalText;
    }
  };
  const pw = $("quizPlayWord");
  if (pw) pw.onclick = () => playWord(pw, "🔊 発音");
  const pw2 = $("quizPlayWord2");
  if (pw2) pw2.onclick = () => playWord(pw2, "🔊");
  const pe = $("quizPlayEx");
  if (pe) pe.onclick = async () => {
    const ex = (q.target.context||"").split("\n")[0];
    if(!ex) return;
    const storedAudio = q.target.exampleAudio || "";
    pe.textContent="⏳";
    if (storedAudio) {
      try {
        const bin = atob(storedAudio);
        const bytes = new Uint8Array(bin.length);
        for (let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], {type:"audio/webm;codecs=opus"});
        const url = URL.createObjectURL(blob);
        const a = new Audio(url);
        a.onended = () => { URL.revokeObjectURL(url); pe.textContent="🔊 例文を聴く"; };
        a.onerror = () => { URL.revokeObjectURL(url); pe.textContent="🔊 例文を聴く"; };
        await a.play();
        return;
      } catch(e) { console.warn("stored example audio fail:", e); }
    }
    try {
      speakGemini(ex, ()=>{ pe.textContent="🔊 例文を聴く"; });
      setTimeout(()=>{pe.textContent="🔊 例文を聴く";}, 500);
    } catch(e) { pe.textContent="🔊 例文を聴く"; }
  };
  const nb=$("quizNext"); if(nb)nb.onclick=()=>{ S.vocabQuizQ=null; render(); };
  const bb=$("quizBackBtn"); if(bb)bb.onclick=()=>{ S.screen="vocab"; render(); };
}

/* ── 流し聞きプレイヤー ── */
async function renderListenPlay() {
  const playlist = S.listenPlaylist || [];
  const idx = S.listenIdx || 0;
  if (idx >= playlist.length) {
    app.innerHTML = `<div style="text-align:center;padding:40px"><h2>🎧 流し聞き完了</h2><p style="color:#a0b4c8">${playlist.length}問を再生しました</p><button class="btn-s" id="listenBackBtn" style="margin-top:16px">← ホームに戻る</button></div>`;
    $("listenBackBtn").onclick=()=>{S.listenMode=false;S.screen="home";render();};
    return;
  }
  const item = playlist[idx];
  const qs = item.qSet || {};
  const questions = qs.questions || [];
  const partLabel = {part2:"Part 2",part3:"Part 3",part4:"Part 4"}[item.part]||item.part;

  app.innerHTML = `
    <div class="header"><h1 style="font-size:18px">🎧 流し聞き</h1><div class="sub">${idx+1}/${playlist.length} ${partLabel}</div></div>
    <div id="listenStatus" style="text-align:center;padding:20px;font-size:16px;color:#7b9cf7">🔊 再生中...</div>
    <div id="listenText" style="padding:12px;background:#243040;border-radius:12px;margin:12px 0;font-size:13px;color:#a0b4c8;max-height:200px;overflow-y:auto"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
      <button class="btn-s" id="listenPauseBtn">⏸️ Pause</button>
      <button class="btn-s" id="listenSkipBtn">⏭️ Skip</button>
      <button class="btn-s" id="listenStopBtn" style="color:#f87171">⏹️ Stop</button>
    </div>`;

  const statusEl = $("listenStatus");
  const textEl = $("listenText");
  let stopped = false;

  $("listenStopBtn").onclick=()=>{ stopped=true; stopSpeak(); S.listenMode=false; S.screen="home"; render(); };
  $("listenSkipBtn").onclick=()=>{ stopped=true; stopSpeak(); S.listenIdx=idx+1; render(); };
  let paused = false;
  $("listenPauseBtn").onclick=()=>{
    paused=!paused;
    $("listenPauseBtn").textContent=paused?"▶️ Resume":"⏸️ Pause";
    if(paused) stopSpeak();
  };

  async function speakAndWait(text) {
    return new Promise(resolve=>{
      if(stopped){resolve();return;}
      // speakGemini calls onEnd only when playback actually ends
      speakGemini(text, (err)=>{ resolve(); });
    });
  }
  async function speakConvWait(text, speakers) {
    return new Promise(resolve=>{
      if(stopped){resolve();return;}
      speakConv(text, (err)=>{ resolve(); }, speakers);
    });
  }
  async function wait(ms) {
    return new Promise(resolve=>{
      const check=()=>{ if(stopped)return resolve(); if(paused)return setTimeout(check,200); setTimeout(resolve,ms); };
      check();
    });
  }

  // Play stored stock audio (Opus base64 → blob → Audio). Returns true if played.
  async function playStoredStock(item) {
    const audioData = item.audioOpus;
    if (!audioData) return false;
    try {
      const bin = atob(audioData);
      const bytes = new Uint8Array(bin.length);
      for (let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const blob = new Blob([bytes], {type:"audio/webm;codecs=opus"});
      const url = URL.createObjectURL(blob);
      return new Promise(resolve => {
        const a = new Audio(url);
        _curAudio = a;
        a.onended = () => { URL.revokeObjectURL(url); _curAudio=null; resolve(true); };
        a.onerror = () => { URL.revokeObjectURL(url); _curAudio=null; resolve(false); };
        a.play().catch(e => { URL.revokeObjectURL(url); resolve(false); });
      });
    } catch(e) { console.warn("stored stock audio fail:", e); return false; }
  }

  // Play sequence
  try {
    // 1. Announce
    statusEl.textContent=`🔊 Question ${idx+1}`;
    await speakAndWait(`Question ${idx+1}.`);
    if(stopped) return;

    // 2. Main audio (prefer stored Opus audio, fallback to live TTS)
    const audioText = qs.audio || qs.spoken || qs.talk || qs.conversation || "";
    if(audioText) {
      textEl.textContent = audioText.replace(/\\n/g,"\n");
      statusEl.textContent="🔊 問題再生中...";
      const played = await playStoredStock(item);
      if (!played) {
        // Fallback to live generation
        if(item.part==="part3") {
          await speakConvWait(audioText, qs.speakers);
        } else {
          await speakAndWait(audioText);
        }
      }
    }
    if(stopped) return;

    // 3. Think pause
    statusEl.textContent="⏳ 考え中...";
    await wait(LISTEN_THINK_MS);
    if(stopped) return;

    // 4. Answers for each question
    const letters = ["A","B","C","D"];
    for(let qi=0; qi<questions.length; qi++) {
      if(stopped) return;
      const q = questions[qi];
      const correct = q.correct || 0;
      const choices = q.choices || [];
      const correctText = (choices[correct]||"").replace(/^\([A-D]\)\s*/,"");
      const correctLetter = letters[correct] || "A";

      if(questions.length > 1) {
        statusEl.textContent=`🔊 Q${qi+1}: ${q.question?.slice(0,40)}...`;
        await speakAndWait(q.question || "");
        await wait(LISTEN_AFTER_EXPL_MS);
        if(stopped) return;
      }

      // Read choices (Part 3/4 only — Part 1/2 already include choices in main audio)
      const needChoiceRead = !["part1","part2"].includes(item.part);
      if (needChoiceRead && choices.length > 0) {
        statusEl.textContent=`🔊 選択肢を読み上げ中...`;
        const choicesText = choices.map((c,i)=>`(${letters[i]}) ${c.replace(/^\([A-D]\)\s*/,"")}`).join(". ");
        await speakAndWait(choicesText);
        await wait(LISTEN_CHOICES_PAUSE_MS);
        if(stopped) return;
      }

      // Answer
      statusEl.textContent=`✅ Answer: ${correctLetter}`;
      textEl.textContent = `Answer: (${correctLetter}) ${correctText}`;
      await speakAndWait(`The answer is ${correctLetter}. ${correctText}`);
      await wait(LISTEN_AFTER_ANSWER_MS);
      if(stopped) return;

      // English explanation
      const explEn = (q.explanation_en || "").trim();
      if(explEn) {
        statusEl.textContent=`💡 ${explEn.slice(0,40)}...`;
        await speakAndWait(explEn);
        await wait(LISTEN_AFTER_EXPL_MS);
        if(stopped) return;
      } else {
        await wait(500);
      }
    }

    // 5. Auto advance
    statusEl.textContent="➡️ Next...";
    await wait(1500);
    if(!stopped) { S.listenIdx=idx+1; render(); }
  } catch(e) {
    console.error("Listen error:", e);
    if(!stopped) { S.listenIdx=idx+1; render(); }
  }
}

   MOCK TEST (実力テスト) — 本番形式の模試

// TOEIC本番のパート別問題数 (フル200問)
const MOCK_FULL_DIST = {
  part1: 6, part2: 25, part3: 39, part4: 30,  // L: 100
  part5: 30, part6: 16, part7: 54              // R: 100
};
// 注: Part 3/4は1セット3問、Part 6は1セット4問、Part 7は1セット2-5問
// → 必要なストックセット数を計算（切り上げ）
function calcSetsNeeded(part, questions) {
  const perSet = {part1:1, part2:1, part3:3, part4:3, part5:1, part6:4, part7:3}; // part7は平均3問/セット
  return Math.ceil(questions / (perSet[part] || 1));
}

// 公式問題集5ベース換算表 (素点 → スコア中央値)
function scoreFromRaw(raw, isListening) {
  raw = Math.max(0, Math.min(100, raw));
  // 補間用テーブル: [正答数, スコア中央値]
  const tableL = [[0,5],[5,15],[10,30],[15,45],[20,60],[25,80],[30,110],[35,135],[40,170],
                  [45,210],[50,250],[55,290],[60,330],[65,370],[70,400],[75,425],[80,455],
                  [85,475],[90,485],[95,495],[100,495]];
  const tableR = [[0,5],[5,15],[10,25],[15,45],[20,60],[25,75],[30,95],[35,120],[40,150],
                  [45,185],[50,220],[55,255],[60,290],[65,325],[70,355],[75,385],[80,420],
                  [85,445],[90,470],[95,485],[100,495]];
  const tbl = isListening ? tableL : tableR;
  for (let i=0; i<tbl.length-1; i++) {
    const [r1,s1] = tbl[i], [r2,s2] = tbl[i+1];
    if (raw >= r1 && raw <= r2) {
      const ratio = (raw - r1) / (r2 - r1);
      return Math.round((s1 + (s2-s1)*ratio) / 5) * 5; // 5点刻み
    }
  }
  return 5;
}

        if (all.length === 0) { alert("選択したバッチにデータがありません。"); return; }
      }
      // Normalize part7s/part7d/part7t → part7 for grouping
      const normPart = p => p && p.startsWith("part7") ? "part7" : p;
      const byPart = {};
      all.forEach(s => { const np = normPart(s.part); if(!byPart[np]) byPart[np]=[]; byPart[np].push(s); });
      const testItems = [];
      const dist = mode === "full" ? MOCK_FULL_DIST : Object.fromEntries(Object.entries(MOCK_FULL_DIST).map(([k,v])=>[k,Math.ceil(v/2)]));
      const missing = [];
      for (const [p, qNeeded] of Object.entries(dist)) {
        const setsNeeded = calcSetsNeeded(p, qNeeded);
        const pool = (byPart[p] || []).slice();
        if (pool.length < setsNeeded) missing.push(`${p}: ${pool.length}/${setsNeeded}セット`);
        pool.sort(()=>Math.random()-0.5);
        testItems.push(...pool.slice(0, setsNeeded).map(s => ({...s, _mockTargetQ: qNeeded})));
      }
      if (missing.length > 0) {
        if (!confirm(`以下のパートが不足しています:\n${missing.join('\n')}\n\n不足分はそのまま進めますか？`)) return;
      }
      S.mockItems = testItems;
      S.mockMode = mode;
      // Flatten to count total questions, trim to exactly 200 (or 100 for half)
      let totalQ = testItems.reduce((s,it) => s + (it.qSet?.questions?.length || 0), 0);
      const targetQ = mode === "full" ? 200 : 100;
      // If over target, remove questions from the last set
      while (totalQ > targetQ && testItems.length > 0) {
        const lastItem = testItems[testItems.length - 1];
        const qs = lastItem.qSet?.questions;
        if (qs && qs.length > 1) { qs.pop(); totalQ--; }
        else { testItems.pop(); totalQ -= (qs?.length || 0); }
      }
      S.mockIdx = 0; S.mockQIdx = 0;
      S.mockAnswers = [];
      S.mockStartTime = Date.now();
      S.screen = "mockTest";
      render();
    };
  });

  $("mockPurgeBtn").onclick = async () => {
    if (!confirm("音声や画像が欠損した模試問題を削除します。よろしいですか？")) return;
    try {
      const all = await mockStockGetAll();
      const db = await openMockDB();
      let purged = 0;
      for (const item of all) {
        const v = validateStockItem(item);
        if (!v.ok) {
          console.warn(`[MOCK PURGE] id=${item.id} (${item.part}): ${v.reason}`);
          await new Promise((resolve, reject) => {
            const tx = db.transaction("mock","readwrite");
            tx.objectStore("mock").delete(item.id);
            tx.oncomplete = () => { purged++; resolve(); };
            tx.onerror = () => reject(tx.error);
          });
        }
      }
      if (purged > 0) alert(`🧹 ${purged}件の壊れた模試問題を削除しました`);
      else alert("✅ 壊れた問題はありませんでした");
      render();
    } catch(err) { alert("浄化失敗: "+err.message); }
  };
  $("mockClearBtn").onclick = async () => {
    if (!confirm("模試データを全て削除しますか？")) return;
    await mockStockClear();
    render();
  };
  $("mockBackBtn").onclick = () => { S.screen = "home"; render(); };
}

/* ─ MOCK STOCK (separate IndexedDB store) ─ */
const MOCK_DB = "toeic-mock-v1";
function openMockDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(MOCK_DB, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("mock")) {
        db.createObjectStore("mock", {keyPath:"id", autoIncrement:true});
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function mockStockGetAll() {
  const db = await openMockDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("mock","readonly");
    const req = tx.objectStore("mock").getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function mockStockImport(items) {
  const db = await openMockDB();
  const existing = await mockStockGetAll();
  const seen = new Set(existing.map(r => r.createdAt));
  let added = 0, skipped = 0, rejected = 0;
  for (const item of items) {
    if (!item.part || !item.qSet) { rejected++; continue; }
    // Reject listening items without audio
    const isListening = ["part1","part2","part3","part4"].includes(item.part);
    if (isListening && !item.audioOpus) {
      console.warn("[MOCK IMPORT] Rejecting listening item without audio:", item.part);
      rejected++; continue;
    }
    // Reject Part 1 without image
    if (item.part === "part1" && !item.imgUrl) {
      console.warn("[MOCK IMPORT] Rejecting Part 1 without image");
      rejected++; continue;
    }
    // Reject graphic questions without image (maps/floorplans can't be tables)
    if (item.qSet && item.qSet.graphic && !item.imgUrl) {
      console.warn("[MOCK IMPORT] Rejecting graphic question without image");
      rejected++; continue;
    }
    const ts = item.createdAt || Date.now();
    if (seen.has(ts)) { skipped++; continue; }
    seen.add(ts);
    const data = {part:item.part, level:item.level, qSet:item.qSet,
                  imgUrl:item.imgUrl||null, audioOpus:item.audioOpus||null,
                  batchId:item.batchId||null, batchLabel:item.batchLabel||null,
                  createdAt: ts};
    await new Promise((resolve, reject) => {
      const tx = db.transaction("mock","readwrite");
      tx.objectStore("mock").add(data);
      tx.oncomplete = () => { added++; resolve(); };
      tx.onerror = () => reject(tx.error);
    });
  }
  return {added, skipped, rejected};
}
async function mockStockClear() {
  const db = await openMockDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("mock","readwrite");
    tx.objectStore("mock").clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function renderMockTest() {
  const items = S.mockItems || [];
  if (S.mockIdx >= items.length) { S.screen = "mockResult"; render(); return; }
  const item = items[S.mockIdx];
  const qs = item.qSet || {};
  const questions = qs.questions || [];
  const q = questions[S.mockQIdx];
  if (!q) {
    S.mockIdx++; S.mockQIdx = 0;
    render(); return;
  }

  // Unique key for this question (to detect question change vs timer update)
  const qKey = `${S.mockIdx}_${S.mockQIdx}`;
  const isTimerOnly = (S._lastMockQKey === qKey);
  S._lastMockQKey = qKey;

  // Timer-only update: just refresh the clock, don't rebuild DOM
  if (isTimerOnly) {
    const timerEl = document.getElementById("mockTimer");
    if (timerEl) {
      const elapsed = Math.floor((Date.now() - S.mockStartTime) / 1000);
      timerEl.textContent = `⏱️ ${String(Math.floor(elapsed/60)).padStart(2,"0")}:${String(elapsed%60).padStart(2,"0")}`;
    }
    setTimeout(() => { if (S.screen === "mockTest") render(); }, 1000);
    return;
  }

  // Full rebuild (question changed)
  // Total progress
  let totalQ = 0, doneQ = 0;
  items.forEach((it, ii) => {
    const qq = (it.qSet?.questions || []).length;
    totalQ += qq;
    if (ii < S.mockIdx) doneQ += qq;
    else if (ii === S.mockIdx) doneQ += S.mockQIdx;
  });
  const elapsed = Math.floor((Date.now() - S.mockStartTime) / 1000);
  const mm = String(Math.floor(elapsed/60)).padStart(2,"0");

      <button class="btn-s" id="mockAbortBtn" style="font-size:11px;color:#f87171">中断</button>

  // Audio (Part 1-4) — cache blob URL on item to avoid recreating
  if (["part1","part2","part3","part4"].includes(item.part) && item.audioOpus) {
    if (!item._blobUrl) {
      item._blobUrl = opusToUrl(item.audioOpus);

  }

  // Graphic table (if available — shown alongside image for reference, or as fallback if no image)
  if (qs.graphic) {
    html += renderGraphic(qs.graphic);
  }

  // Reading text (Part 5/6/7 including part7s/part7d/part7t)

        if (qs.text_2) {

          docs.push(`<div style='font-size:13px;line-height:1.9;color:#b8cce8;margin-top:8px'>${formatPassage(qs.text_2, dt2)}</div>`);
        }
        if (qs.text_3) {
          const dt3 = qs.doc_type_3 || "";

          docs.push(`<div style='font-size:13px;line-height:1.9;color:#b8cce8;margin-top:8px'>${formatPassage(qs.text_3, dt3)}</div>`);
        }
      } else {
        // Single passage (or Part 6)

        if (item.part === "part6") {

  const isAudioOnlyPart = ["part1","part2"].includes(item.part);

    // Part 5: question IS the sentence
  } else if (isAudioOnlyPart) {
    html += `<div style='margin:12px 0;font-size:12px;color:#7a8ea5'>🎧 音声を聴いて正しい選択肢を選んでください</div>`;

    html += `<div style='margin:12px 0;font-weight:600;font-size:14px'>Q${S.mockQIdx+1}. ${esc(q.question)}</div>`;
  }

  // Choices (Part 1/2: labels only, no English text — matches real TOEIC)
  const choices = q.choices || [];
  const letters = ["(A)","(B)","(C)","(D)"];
  choices.forEach((c, ci) => {
    const label = isAudioOnlyPart ? letters[ci] : esc(c);

  });

  app.innerHTML = html;

  document.querySelectorAll(".mock-choice").forEach(btn => {
    btn.onclick = () => {
      const sel = parseInt(btn.dataset.ci);
      const isCorrect = sel === q.correct;
      const normPart = p => p && p.startsWith("part7") ? "part7" : p;
      S.mockAnswers.push({part: item.part, normPart: normPart(item.part), correct: isCorrect});
      // Advance
      S.mockQIdx++;
      if (S.mockQIdx >= questions.length) {
        S.mockIdx++;
        S.mockQIdx = 0;
      }
      // Check if part target reached (using normalized part for part7s/d/t)
      const targetQ = item._mockTargetQ;
      const np = normPart(item.part);
      const partAnswered = S.mockAnswers.filter(a => (a.normPart||a.part) === np).length;
      if (targetQ && partAnswered >= targetQ) {
        // Skip remaining items of this normalized part
        while (S.mockIdx < S.mockItems.length && normPart(S.mockItems[S.mockIdx].part) === np) {
          S.mockIdx++;
        }
      }
      render();
    };
  });
  $("mockAbortBtn").onclick = () => {
    if (confirm("模試を中断してホームに戻りますか？\n途中結果は破棄されます。")) {
      S.mockMode = null; S.mockItems = []; S.mockAnswers = [];
      S.screen = "home"; render();
    }
  };

  // Auto-update timer
  setTimeout(() => { if (S.screen === "mockTest") render(); }, 1000);
}

function renderMockResult() {
  const answers = S.mockAnswers || [];
  const elapsed = Math.floor((Date.now() - S.mockStartTime) / 1000);
  const mm = Math.floor(elapsed / 60);

  // Normalize part7s/d/t → part7
  const normPart = p => p && p.startsWith("part7") ? "part7" : p;

  // Per-part stats (normalized)
  const partStats = {};
  for (const a of answers) {
    const np = a.normPart || normPart(a.part);
    if (!partStats[np]) partStats[np] = {correct:0, total:0};
    partStats[np].total++;
    if (a.correct) partStats[np].correct++;
  }

  // Section totals
  const lParts = ["part1","part2","part3","part4"];
  const rParts = ["part5","part6","part7"];
  let lCorrect=0, lTotal=0, rCorrect=0, rTotal=0;
  for (const p of lParts) {
    if (partStats[p]) { lCorrect += partStats[p].correct; lTotal += partStats[p].total; }
  }
  for (const p of rParts) {
    if (partStats[p]) { rCorrect += partStats[p].correct; rTotal += partStats[p].total; }
  }

  // Score: scale to 100 questions per section, then look up score
  const lScaled = lTotal > 0 ? Math.round(lCorrect / lTotal * 100) : 0;
  const rScaled = rTotal > 0 ? Math.round(rCorrect / rTotal * 100) : 0;
  const lScore = scoreFromRaw(lScaled, true);
  const rScore = scoreFromRaw(rScaled, false);
  const totalScore = lScore + rScore;

  // Stylish score display
  const lLevel = lScore >= 400 ? "🥇" : lScore >= 300 ? "🥈" : lScore >= 200 ? "🥉" : "📚";
  const rLevel = rScore >= 400 ? "🥇" : rScore >= 300 ? "🥈" : rScore >= 200 ? "🥉" : "📚";

  let partTable = "";
  for (const p of [...lParts, ...rParts]) {
    if (!partStats[p]) continue;
    const s = partStats[p];
    const pct = Math.round(s.correct/s.total*100);
    const color = pct >= 80 ? "#4ade80" : pct >= 60 ? "#fbbf24" : "#f87171";
    partTable += `<div style='display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px'>
      <span style='color:#a0b4c8'>${p.toUpperCase()}</span>
      <span style='color:${color};font-weight:600'>${s.correct}/${s.total} (${pct}%)</span>
    </div>`;
  }

  app.innerHTML = `
    <div class="header"><h1 style="font-size:22px">🎯 模試結果</h1>
      <div class="sub">${S.mockMode === "full" ? "本番フォーマット (200問)" : "ハーフ模試 (100問)"} | ⏱️ ${mm}分</div></div>

    <div style="text-align:center;margin:24px 0;padding:24px;background:linear-gradient(135deg,rgba(129,140,248,0.15),rgba(244,114,182,0.15));border-radius:16px;border:1px solid rgba(129,140,248,0.3)">
      <div style="font-size:11px;color:#a0b4c8;letter-spacing:2px">YOUR ESTIMATED SCORE</div>
      <div style="font-size:56px;font-weight:900;color:#dce6f0;margin:8px 0;letter-spacing:-2px">${totalScore}<span style="font-size:24px;color:#7a8ea5">/990</span></div>
      <div style="display:flex;gap:16px;justify-content:center;margin-top:12px">
        <div><div style="font-size:11px;color:#a0b4c8">${lLevel} Listening</div><div style="font-size:24px;font-weight:700;color:#7b9cf7">${lScore}</div><div style="font-size:10px;color:#7a8ea5">${lCorrect}/${lTotal} (${Math.round(lCorrect/Math.max(lTotal,1)*100)}%)</div></div>
        <div><div style="font-size:11px;color:#a0b4c8">${rLevel} Reading</div><div style="font-size:24px;font-weight:700;color:#f472b6">${rScore}</div><div style="font-size:10px;color:#7a8ea5">${rCorrect}/${rTotal} (${Math.round(rCorrect/Math.max(rTotal,1)*100)}%)</div></div>
      </div>
    </div>

    <div style="margin:16px 0">
      <div style="font-size:13px;font-weight:700;color:#dce6f0;margin-bottom:6px">📊 パート別正答率</div>
      <div style="background:#243040;border-radius:10px;padding:4px 0">${partTable}</div>
    </div>

    <div style="margin:16px 0;padding:12px;background:rgba(251,191,36,0.05);border:1px solid rgba(251,191,36,0.15);border-radius:10px;font-size:11px;color:#a0b4c8">

    </div>

    <button class="btn-s" id="mockHomeBtn" style="margin:12px auto;display:block">← ホームに戻る</button>`;

    S.stats={correct:0,wrong:0}; S.streak=0; S.sessionNum=0;
    _nextQ=null; _prefetching=false;
    // Override part to graphic types
    const gt = gTypes[Math.floor(Math.random()*gTypes.length)];
    S.part = gt._gPart;
    shuffleSessionTypes();
    loadNewSet();
  };
  $("vocabBtn").onclick=()=>{ S.screen="vocab"; render(); };
  $("mockTestBtn").onclick=()=>{ S.screen="mockSetup"; render(); };
  $("judgeHomeToggle").onclick=()=>{
    S.judgeMode=!S.judgeMode;
    localStorage.setItem("judgeMode",JSON.stringify(S.judgeMode));
    render();
  };
  $("changeKey").onclick=()=>{ localStorage.removeItem("gemini_api_key"); S.apiKey=""; S.screen="apikey"; render(); };
}

/* ── Study (main game screen) ── */
function renderStudy() {
  const cp=PARTS.find(p=>p.id===S.part);
  const cl=LEVELS.find(l=>l.id===S.level);
  const total=S.stats.correct+S.stats.wrong;
  const rate=total>0?Math.round(S.stats.correct/total*100):0;
  const isL=["part1","part2","part3","part4"].includes(S.part);

  let body="";

  if (S.loading) {
    body=`<div class="loading"><div class="spin"></div>${S.loadMsg}</div>`;
  } else if (S.error) {
    body=`<div class="errbox"><div style="white-space:pre-wrap">${esc(S.error)}</div><button id="retryBtn">リトライ</button></div>`;
  } else if (S.qSet) {
    const qs=S.qSet, qi=S.qIdx, numQ=qs.questions.length;
    const q=qs.questions[qi], ans=S.answers[qi];
    const answered=ans.answered, isOk=ans.selected===q.correct;
    let inner="";

    // ── Part 1: Scene image (photo ONLY — no text description in real TOEIC) ──
    if (S.part==="part1") {
      if (S.sceneImgUrl) inner+=`<div class="scene-img"><img src="${S.sceneImgUrl}" alt="TOEIC Scene"></div>`;
      else {
        // No image available — show placeholder, NOT the scene text (that would give away the answer)
        inner+=`<div style="padding:40px;text-align:center;background:#243040;border-radius:12px;margin-bottom:12px">
          <div style="font-size:48px;margin-bottom:8px">📷</div>
          <div style="font-size:12px;color:#7a8ea5">写真を生成中 または 画像なし</div>
          ${S.imageError?`<div style="font-size:11px;color:#f87171;margin-top:6px">⚠️ ${esc(S.imageError)}</div>`:""}
        </div>`;
      }
    }

    // ── Audio button (Parts 1-4) ──
    if (isL && qs.audio) {
      const cached=qs._audioUrl?" ✓":"";
      const label=`🔊 音声を再生${cached}`;
      inner+=`<button class="btn-au" id="playAudio" data-label="${label}">${label}</button>`;
    }

    // ── Conversation (Part 3) ──
    if (S.part==="part3"&&qs.conversation) {
      inner+=ctxBlock("🗣️","会話",qs.conversation);
      if (qs.graphic) inner+=renderGraphic(qs.graphic);
    }

    // ── Talk (Part 4) ──
    if (S.part==="part4"&&qs.talk) {
      const ttype=qs.talk_type?` (${qs.talk_type})`:"";
      inner+=ctxBlock("🎙️",`トーク${ttype}`,qs.talk);
      if (qs.graphic) inner+=renderGraphic(qs.graphic);
    }

    // ── Part 6: Document ──
    if (S.part==="part6"&&qs.text) {
      const hdr=qs.header?`<div class="doc-hdr">${esc(qs.header)}</div>`:"";
      const txt=renderP6Text(qs.text, q.blank||0);
      inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 ${esc(qs.doc_type||"文書")}</div>${hdr}${txt}</div>`;
    }

    // ── Part 7: Single or Double passage ──
    if (S.part==="part7") {
      if (qs.isTriple) {
        // Triple passage
        const hdr1=qs.header_1?`<div class="doc-hdr">${esc(normText(qs.header_1))}</div>`:"";
        const hdr2=qs.header_2?`<div class="doc-hdr">${esc(normText(qs.header_2))}</div>`:"";
        const hdr3=qs.header_3?`<div class="doc-hdr">${esc(normText(qs.header_3))}</div>`:"";
        inner+=`<div style="font-size:11px;color:#f472b6;background:rgba(244,114,182,0.1);padding:4px 10px;border-radius:6px;margin-bottom:10px;display:inline-block">📄📄📄 トリプルパッセージ</div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書1: ${esc(qs.doc_type_1||"文書")}</div>${hdr1}<div class="passage-txt">${formatPassage(qs.text_1, qs.doc_type_1)}</div></div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書2: ${esc(qs.doc_type_2||"文書")}</div>${hdr2}<div class="passage-txt">${formatPassage(qs.text_2, qs.doc_type_2)}</div></div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書3: ${esc(qs.doc_type_3||"文書")}</div>${hdr3}<div class="passage-txt">${formatPassage(qs.text_3, qs.doc_type_3)}</div></div>`;
        // 和訳は解説の後に表示
      } else if (qs.isDouble) {
        // Double passage
        const hdr1=qs.header_1?`<div class="doc-hdr">${esc(normText(qs.header_1))}</div>`:"";
        const hdr2=qs.header_2?`<div class="doc-hdr">${esc(normText(qs.header_2))}</div>`:"";
        inner+=`<div style="font-size:11px;color:#fbbf24;background:rgba(251,191,36,0.1);padding:4px 10px;border-radius:6px;margin-bottom:10px;display:inline-block">📄📄 ダブルパッセージ</div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書1: ${esc(qs.doc_type_1||"文書")}</div>${hdr1}<div class="passage-txt">${formatPassage(qs.text_1, qs.doc_type_1)}</div></div>`;
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 文書2: ${esc(qs.doc_type_2||"文書")}</div>${hdr2}<div class="passage-txt">${formatPassage(qs.text_2, qs.doc_type_2)}</div></div>`;
        // 和訳は解説の後に表示
      } else if (qs.text) {
        // Single passage
        const hdr=qs.header?`<div class="doc-hdr">${esc(normText(qs.header))}</div>`:"";
        inner+=`<div class="ctx-block"><div class="ctx-lbl">📄 ${esc(qs.doc_type||"文書")}</div>${hdr}<div class="passage-txt">${formatPassage(qs.text, qs.doc_type)}</div></div>`;
        if (qs.graphic) inner+=renderGraphic(qs.graphic);
      }
    }

    // ── Question progress indicator ──
    if (numQ>1) {
      const dots=Array.from({length:numQ},(_,i)=>{
        const a=S.answers[i];
        let cls="q-dot";
        if (i===qi) cls+=" cur";
        else if (a.answered) cls+=(a.selected===qs.questions[i].correct?" ok":" ng");
        return `<span class="${cls}"></span>`;
      }).join("");
      inner+=`<div class="q-prog"><span>問 ${qi+1}/${numQ}</span>${dots}</div>`;
    }

    // ── Question text ──
    if (S.part==="part2" && !answered) {
      inner+=`<div class="q-txt" style="color:#7a8ea5;font-style:italic">（音声を聴いて回答してください）</div>`;
    } else {
      inner+=`<div class="q-txt">${esc(q.question)}</div>`;
    }

    // ── Choices audio button (Part 3/4 only — Part 1/2 includes choices in main audio) ──
    if (isL && (S.part==="part3"||S.part==="part4")) {
      inner+=`<button class="btn-au" id="playChoices" data-label="🔊 選択肢を読み上げ">🔊 選択肢を読み上げ</button>`;
    }

    // ── Choices ──
    const isAudioOnly = (S.part==="part1"||S.part==="part2") && !answered;
    if (isAudioOnly) {
      inner+=`<div style="font-size:12px;color:#7a8ea5;margin-bottom:10px">🎧 音声を聴いてから選択してください（本番と同じ形式）</div>`;
    }
    q.choices.forEach((c,i)=>{
      let cls="choice";
      if (answered) { if(i===q.correct)cls+=" ok"; else if(i===ans.selected)cls+=" ng"; }
      const label = isAudioOnly
        ? ["(A)","(B)","(C)","(D)"][i]
        : esc(c);
      inner+=`<button class="${cls}" data-c="${i}" ${answered?"disabled":""}>${label}</button>`;
    });

    // ── Explanation ──
    if (answered) {
      inner+=`<div class="expl ${isOk?"ok":"ng"}">
        <div class="res" style="color:${isOk?"#4ade80":"#f87171"}">${isOk?"🎉 正解！":"😥 不正解..."}</div>
        ${q.explanation_en?`<div style="font-size:12px;color:#a0b4c8;font-style:italic;margin-bottom:6px">💡 ${esc(q.explanation_en)}</div>`:""}
        <div class="det">${esc(q.explanation_ja||"")}</div>
      </div>`;
      // 和訳トグル（解説の直後に表示 — Part 3,4,6,7）
      if (["part3","part4","part6","part7"].includes(S.part)) {
        const trJa = qs.translation_ja || qs.translation_ja_1;
        let trHtml;
        if (qs.translation_ja_1) {
          trHtml = `<div style="font-size:12px;color:#7b9cf7;margin-top:8px">文書1:</div><div style="white-space:pre-wrap;font-size:13px;color:#a0b4c8">${esc(qs.translation_ja_1)}</div>` + (qs.translation_ja_2?`<div style="font-size:12px;color:#7b9cf7;margin-top:8px">文書2:</div><div style="white-space:pre-wrap;font-size:13px;color:#a0b4c8">${esc(qs.translation_ja_2)}</div>`:"") + (qs.translation_ja_3?`<div style="font-size:12px;color:#7b9cf7;margin-top:8px">文書3:</div><div style="white-space:pre-wrap;font-size:13px;color:#a0b4c8">${esc(qs.translation_ja_3)}</div>`:"");
        } else if (qs.translation_ja) {
          trHtml = `<div style="white-space:pre-wrap;font-size:13px;color:#a0b4c8;margin-top:8px">${esc(qs.translation_ja)}</div>`;
        } else {
          trHtml = `<div style="font-size:13px;color:#7a8ea5;margin-top:8px">（この問題には和訳データがありません）</div>`;
        }
        inner+=`<details style="margin-top:10px;padding:10px;background:rgba(251,191,36,0.05);border:1px solid rgba(251,191,36,0.15);border-radius:8px;cursor:pointer"><summary style="color:#fbbf24;font-size:13px;font-weight:600">📖 和訳を表示</summary>${trHtml}</details>`;
      }
      // ── Vocabulary Cards ──
      if (qs.vocab && qs.vocab.length > 0) {
        let vocHtml = qs.vocab.map((v,vi) => `
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <button class="vocab-speak" data-word="${esc(v.word||"")}" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px" title="発音">🔊</button>
            <div style="min-width:100px;font-weight:600;color:#dce6f0;font-size:13px">${esc(v.word||"")}</div>
            <div style="min-width:60px;color:#7b9cf7;font-size:12px">${esc(v.ja||"")}</div>
            <div style="color:#a0b4c8;font-size:11px;flex:1">${esc(v.example||"")}</div>
          </div>`).join("");
        inner+=`<details open style="margin-top:10px;padding:10px;background:rgba(129,140,248,0.05);border:1px solid rgba(129,140,248,0.15);border-radius:8px">
          <summary style="color:#7b9cf7;font-size:13px;font-weight:600">📚 Key Vocabulary</summary>
          <div style="margin-top:6px">${vocHtml}</div>
        </details>`;
      }
      // 単語保存ボタン
      inner+=`<div style="margin-top:8px;text-align:center"><button class="btn-s" id="vocabSaveBtn" style="font-size:11px;color:#7b9cf7">📝 単語を保存</button></div>`;
    }

    body=`<div class="q-card">${inner}</div>`;

    // ストック/ストック解除ボタン（最後の問いに回答済みの場合）
    if (answered && qi===numQ-1) {
      if (S.stockMode) {
        body+=`<button class="btn-s" id="unstockBtn" style="margin:10px auto;display:block;color:#f87171">🗑️ ストック解除</button>`;
        // 卒業チェック（3回連続正解の場合は次のrenderで反映）
      } else {
        const isL=["part1","part2","part3","part4"].includes(S.part);
        const hasAudio=!!(S.qSet._audioOpus||S.qSet._audioPcm);
        if(isL && !hasAudio) body+=`<div style="font-size:11px;color:#fbbf24;text-align:center;margin:6px 0">⚠️ 音声付きで保存するには先に🔊再生してください</div>`;
        body+=`<button class="btn-s" id="stockBtn" style="margin:10px auto;display:block">💾 この問題をストック${isL&&hasAudio?" (音声付き)":""}</button>`;
      }
    }

    if (answered) {
      const isLast=qi===numQ-1;
      if (isLast) {
        if (S.stockMode || S.sessionNum >= SESSION_SIZE) {
          const isLastStock = S.stockMode && S.stockPlayIdx >= S.stockPlaylist.length-1;
          const hasMoreStock = S.stockMode && !isLastStock;
          const msg = S.stockMode ? `ストック問題 (${S.stockPlayIdx+1}/${S.stockPlaylist.length})` : `${SESSION_SIZE}問終了しました`;
          body+=`<div style="text-align:center;padding:20px 0">
            <div style="font-size:20px;font-weight:700;color:#4ade80;margin-bottom:8px">✅ ${msg}</div>
            <div style="font-size:13px;color:#7a8ea5;margin-bottom:16px">正答率: ${rate}%（${S.stats.correct}/${total}）</div>
            ${hasMoreStock?`<button class="btn-p" id="stockNextBtn">📦 次の問題 (${S.stockPlayIdx+2}/${S.stockPlaylist.length}) →</button>`:""}
            <button class="btn-${S.stockMode||isLastStock?"s":"p"}" id="backHomeBtn">${S.stockMode?"📦 ストック一覧に戻る":"ホームに戻る"}</button>
          </div>`;
        } else {
          body+=`<button class="btn-p" id="nextSetBtn">次の問題 (${S.sessionNum+1}/${SESSION_SIZE}) →</button>`;
        }
      } else {
        body+=`<button class="btn-p" id="nextQBtn">次の問い (${qi+2}/${numQ}) →</button>`;
      }
    }
  }

  app.innerHTML=`
    <div class="topbar">
      <button class="btn-s" id="backBtn">← 戻る</button>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="tag" style="background:${cl.color}20;color:${cl.color}">${cl.label}</span>
        <span class="tag" style="background:rgba(129,140,248,0.15);color:#7b9cf7;font-family:'JetBrains Mono',monospace">${cp.icon} ${cp.label}</span>
        <span class="tag judge-toggle" id="judgeToggle" style="background:${S.judgeMode?"rgba(74,222,128,0.15)":"rgba(100,116,139,0.1)"};color:${S.judgeMode?"#4ade80":"#64748b"};font-size:10px;cursor:pointer">${S.judgeMode?"📊 判定ON":"📊 OFF"}</span>
        <span class="tag" id="timerDisplay" style="background:rgba(100,116,139,0.1);color:#a0b4c8;font-size:10px;font-family:monospace">⏱ 0s</span>
        ${S.stockMode
          ?`<span class="tag" style="background:rgba(251,191,36,0.15);color:#fbbf24;font-size:10px">📦 ${S.stockPlayIdx+1}/${S.stockPlaylist.length}</span>`
          :`<span class="tag" style="background:${PART_MODEL[S.part]===GEMINI_PRO?"rgba(168,85,247,0.15)":PART_MODEL[S.part]===GEMINI_FLASH?"rgba(59,130,246,0.15)":"rgba(100,116,139,0.1)"};color:${PART_MODEL[S.part]===GEMINI_PRO?"#a855f7":PART_MODEL[S.part]===GEMINI_FLASH?"#3b82f6":"#64748b"};font-size:10px">${PART_MODEL[S.part]===GEMINI_PRO?"Pro":PART_MODEL[S.part]===GEMINI_FLASH?"Flash":"Lite"}</span>
           <span class="tag" style="background:rgba(251,191,36,0.1);color:#fbbf24">${S.sessionNum}/${SESSION_SIZE}</span>`}
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="sl">出題数</div><div class="sv" style="color:#7b9cf7">${total}</div></div>
      <div class="stat"><div class="sl">正解</div><div class="sv" style="color:#4ade80">${S.stats.correct}</div></div>
      <div class="stat"><div class="sl">不正解</div><div class="sv" style="color:#f87171">${S.stats.wrong}</div></div>
      <div class="stat"><div class="sl">正答率</div><div class="sv" style="color:#fbbf24">${rate}%</div></div>
    </div>
    ${S.streak>=2?`<div class="streak">🔥 ${S.streak}問連続正解！</div>`:""}
    
    ${body}`;

  // Events
  const jt=$("judgeToggle"); if(jt) jt.onclick=()=>{
    S.judgeMode=!S.judgeMode;
    localStorage.setItem("judgeMode",JSON.stringify(S.judgeMode));
    render();
  };
  // タイマー更新（パート別の本番TOEIC目安時間で色変更）
  // Part 1/2: 音声後5-10秒で回答（選択肢は音声に含まれる）
  // Part 3/4: 設問ごとに8秒（本番の回答インターバル）
  // Part 5: 1問20秒（30問を10分）
  // Part 6: 1問40秒（16問を10分）
  // Part 7 SP: 1問50-60秒 / DP: 1問60-72秒 / TP: 1問72-84秒
  if(!S.stockCreateMode) {
    const td=$("timerDisplay");
    if(td) {
      const isL=["part1","part2","part3","part4"].includes(S.part);
      const numQ=S.qSet?.questions?.length||1;
      // タイマー停止中（解説画面 or Listening音声待ち）
      if(!S.timerStart) {
        if(isL && S.timerFrozen===0 && !S.answers?.[S.qIdx]?.answered) {
          td.textContent="🎧 音声再生後に開始";
          td.style.color="#64748b";
        } else {
          td.textContent=`⏱ ${S.timerFrozen||0}s`;
          td.style.color="#64748b";
        }
      } else {
        // 回答中：パート別の目安時間で色変更（Q全体の合計）
        let warnPerQ=15, dangerPerQ=30;
        if(S.part==="part1"||S.part==="part2") { warnPerQ=5; dangerPerQ=10; }
        else if(S.part==="part3"||S.part==="part4") { warnPerQ=8; dangerPerQ=15; }
        else if(S.part==="part5") { warnPerQ=15; dangerPerQ=25; }
        else if(S.part==="part6") { warnPerQ=37; dangerPerQ=50; }
        else if(S.part==="part7") {
          if(S.qSet?.isTriple)      { warnPerQ=72; dangerPerQ=100; }
          else if(S.qSet?.isDouble) { warnPerQ=65; dangerPerQ=90; }
          else                      { warnPerQ=50; dangerPerQ=75; }
        }
        const warn=warnPerQ*numQ, danger=dangerPerQ*numQ;
        const _ti=setInterval(()=>{
          if(!document.getElementById("timerDisplay")){clearInterval(_ti);return;}
          if(!S.timerStart){clearInterval(_ti);return;}
          const sec=Math.round((Date.now()-S.timerStart)/1000);
          td.textContent=`⏱ ${sec}s`;
          td.style.color=sec>danger?"#f87171":sec>warn?"#fbbf24":"#94a3b8";
        },1000);
      }
    }
  }
  $("backBtn").onclick=()=>{
    if(S.stockMode) { stopSpeak();S.stockMode=false;S.screen="stockSelect";render(); return; }
    if(S.sessionNum>0 && S.sessionNum<SESSION_SIZE) {
      if(!confirm(`セッション進行中です（${S.sessionNum}/${SESSION_SIZE}問完了）。\nホームに戻りますか？`)) return;
    }
    stopSpeak();S.screen="home";render();
  };
  const rb=$("retryBtn"); if(rb)rb.onclick=()=>loadNewSet();
  const nsb=$("nextSetBtn"); if(nsb)nsb.onclick=()=>{stopSpeak();loadNewSet();};
  const nqb=$("nextQBtn"); if(nqb)nqb.onclick=()=>advanceQuestion();
  const bhb=$("backHomeBtn"); if(bhb)bhb.onclick=()=>{
    const wasStock=S.stockMode;
    stopSpeak();S.stockMode=false;S.stockPlaylist=[];
    S.screen=wasStock?"stockSelect":"home";render();
  };
  const snb=$("stockNextBtn"); if(snb)snb.onclick=()=>{ loadNextStockItem(); };
  const stb=$("stockBtn"); if(stb)stb.onclick=async()=>{
    try {
      await stockSave(S.part, S.level, S.qSet, S.sceneImgUrl);
      // Also save vocab to vocab DB
      if (S.qSet.vocab && S.qSet.vocab.length) await vocabAutoSave(S.qSet.vocab, S.part).catch(e=>console.warn('vocab auto-save failed:', e));
      stb.textContent="✅ ストック済み"; stb.disabled=true; stb.style.color="#4ade80";
    } catch(e) { stb.textContent="❌ 保存失敗"; console.error(e); }
  };
  const usb=$("unstockBtn"); if(usb)usb.onclick=async()=>{
    try {
      if(S.stockId) await stockDelete(S.stockId);
      usb.textContent="✅ 削除済み"; usb.disabled=true; usb.style.color="#64748b";
    } catch(e) { usb.textContent="❌ 削除失敗"; console.error(e); }
  };
  document.querySelectorAll("[data-c]").forEach(el=>{
    el.onclick=()=>{if(!S.answers[S.qIdx].answered)handleAnswer(parseInt(el.dataset.c));};
  });

  // Audio buttons
  const pa=$("playAudio");
  if (pa&&S.qSet?.audio) {
    pa.onclick=async()=>{
      if (_curAudio) { stopSpeak(); setAudioBtn(pa,"idle"); return; }
      const qs=S.qSet;
      if (qs._audioUrl) {
        setAudioBtn(pa,"playing");
        await playSeq([qs._audioUrl],()=>{setAudioBtn(pa,"idle"); if(!S.timerStart){S.timerStart=Date.now();S.timerFrozen=0;} });
      } else {
        setAudioBtn(pa,"loading");
        const isConv=S.part==="part3";
        const fn=isConv ? (t,cb)=>speakConv(t,cb,qs.speakers) : speakGemini;
        await fn(qs.audio,(err)=>setAudioBtn(pa,err?"error":"idle",err?String(err).slice(0,100):""));
        if (_curAudio) setAudioBtn(pa,"playing");
      }
    };
  }

  const vsb=$("vocabSaveBtn"); if(vsb) vsb.onclick=()=>{
    const word=prompt("保存する単語または表現を入力:");
    if(!word)return;
    const meaning=prompt("意味（日本語）を入力（空欄可）:");
    vocabSave(word.trim(), meaning?.trim()||"", S.qSet?.questions?.[S.qIdx]?.question||"", S.part).then(()=>{
      vsb.textContent="✅ 保存しました"; vsb.disabled=true;
    }).catch(()=>{ vsb.textContent="❌ 保存失敗"; });
  };
  // Vocab pronunciation buttons
  document.querySelectorAll(".vocab-speak").forEach(btn=>{
    btn.onclick=async()=>{
      const word=btn.dataset.word;
      if(!word)return;
      btn.textContent="⏳";
      try { await speakGemini(word, ()=>{ btn.textContent="🔊"; }); btn.textContent="🔊"; }
      catch(e){ btn.textContent="🔊"; }
    };
  });
  const pc=$("playChoices");
  if (pc&&S.qSet?.questions) {
    pc.onclick=async()=>{
      if(_curAudio){stopSpeak();setAudioBtn(pc,"idle");return;}
      const letters=["A","B","C","D"];
      const choiceText=S.qSet.questions[S.qIdx].choices.map((c,i)=>`${letters[i]}. ${c.replace(/^\([A-Da-d]\)\s*/,"").trim()}`).join(". ");
      setAudioBtn(pc,"loading");
      await speakGemini(choiceText,(err)=>setAudioBtn(pc,err?"error":"idle",err?String(err).slice(0,40):""));
      if (_curAudio) setAudioBtn(pc,"playing");
    };
  }
}

function ctxBlock(icon, label, text) {
  return `<div class="ctx-block"><div class="ctx-lbl">${icon} ${label}</div><div class="ctx-txt">${esc(normText(text))}</div></div>`;
}

function renderGraphic(g) {
  if (!g || !g.headers || !g.rows) return "";
  const title = g.title ? `<div style="font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:6px">📊 ${esc(g.title)}</div>` : "";
  const hdr = g.headers.map(h => `<th style="padding:6px 10px;border:1px solid #3a4d63;background:#243040;color:#dce6f0;font-size:12px;text-align:left">${esc(h)}</th>`).join("");
  const rows = g.rows.map(row => {
    const cells = row.map(c => `<td style="padding:5px 10px;border:1px solid #3a4d63;font-size:12px;color:#cbd5e1">${esc(String(c))}</td>`).join("");
    return `<tr>${cells}</tr>`;
  }).join("");
  return `<div class="ctx-block">${title}<table style="width:100%;border-collapse:collapse;border-radius:6px;overflow:hidden"><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

// Boot
render();
</script>
</body>
</html>
